<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASU 113 - Deduplicated MCQ Bank</title>
<style>
:root{--bg:#070b14;--panel:#121a2a;--panel2:#182337;--line:#2f405c;--text:#e8edf8;--muted:#95a4bf;--accent:#7aa2ff;--exam:#f59e0b;--correct:#22c55e;--wrong:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
html,body{scroll-behavior:smooth}
body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:radial-gradient(1200px 500px at 20% -10%,#1d2b4f 0,transparent 60%),radial-gradient(1000px 450px at 100% -20%,#3a204f 0,transparent 55%),var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.header{position:sticky;top:0;z-index:20;background:rgba(8,12,20,.72);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:16px}
.h-wrap{max-width:1120px;margin:0 auto;display:grid;gap:12px}
.title{font-size:clamp(20px,2.2vw,28px);font-weight:800;letter-spacing:.2px}
.subtitle{font-size:13px;color:var(--muted)}
.controls{display:grid;gap:10px;grid-template-columns:1fr}
@media(min-width:930px){.controls{grid-template-columns:auto minmax(260px,1fr) 220px auto auto;align-items:center}}
.seg{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:linear-gradient(180deg,#17243a 0,#121b2d 100%);color:var(--text);padding:9px 12px;border-radius:11px;cursor:pointer;font-size:13px;transition:all .2s ease}
.btn.active{border-color:var(--accent);background:linear-gradient(180deg,#223458 0,#182744 100%);box-shadow:0 0 0 1px rgba(122,162,255,.2) inset}
.btn.exam.active{border-color:var(--exam);background:linear-gradient(180deg,#3a2b12 0,#2a2011 100%);color:#fde68a}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent}
input,select{background:rgba(20,31,49,.9);border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:11px;font-size:13px;min-width:0;outline:none;transition:border-color .2s ease,box-shadow .2s ease}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(122,162,255,.16)}
.stat{font-size:12px;color:var(--muted);white-space:nowrap}
.hint{font-size:12px;color:var(--muted)}
.kbd{padding:1px 6px;border:1px solid #405882;border-bottom-color:#506e9f;border-radius:6px;background:#1a2b46;color:#d5e3ff;font-size:11px}
#countInfo{grid-column:1/-1}
.main{max-width:1120px;margin:20px auto;padding:0 16px 36px}
.summary{border:1px solid var(--line);background:linear-gradient(180deg,rgba(20,31,49,.85) 0,rgba(15,23,36,.85) 100%);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.summary-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
.summary-title{font-size:13px;font-weight:700;color:#d7e4fb}
.progress-track{width:100%;height:8px;background:#1b2a44;border-radius:999px;overflow:hidden;border:1px solid #2f466c}
.progress-fill{width:0;height:100%;background:linear-gradient(90deg,#3b82f6 0%,#22c55e 100%);transition:width .25s ease}
.cards{display:grid;gap:14px}
.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(20,31,49,.92) 0,rgba(15,23,36,.92) 100%);border-radius:14px;padding:16px;box-shadow:0 8px 26px rgba(0,0,0,.25);transition:transform .2s ease,border-color .2s ease;animation:fadeUp .2s ease}
.card:hover{transform:translateY(-2px);border-color:#4b6087}
.meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.badge{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:rgba(17,28,44,.9)}
.badge.section-lecture{border-color:#375996;color:#9bc5ff;background:#13233f}
.badge.section-exam{border-color:#8d5a18;color:#fde68a;background:#37280f}
.q{font-size:15px;margin:6px 0 12px}
.opts{display:grid;gap:8px}
.opt-btn{width:100%;text-align:left;border:1px solid #324766;background:#1a2a43;color:#dce6f7;border-radius:10px;padding:10px 12px;font-size:14px;cursor:pointer;transition:all .2s ease}
.opt-btn:hover{border-color:#5d78a8;background:#203456}
.opt-btn:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(122,162,255,.25)}
.opt-btn:disabled{cursor:default;opacity:1}
.opt-btn.right-answer{border-color:rgba(34,197,94,.5)}
.opt-btn.correct{border-color:rgba(34,197,94,.7);background:rgba(34,197,94,.16);color:#d9ffe8}
.opt-btn.wrong{border-color:rgba(239,68,68,.75);background:rgba(239,68,68,.13);color:#ffd8d8}
.opt-letter{display:inline-block;min-width:22px;font-weight:700;color:#b8c7e6}
.actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.note{font-size:12px;color:var(--muted)}
.result{font-size:12px;padding:5px 10px;border-radius:999px;border:1px solid}
.result.ok{color:#c9f8dc;border-color:rgba(34,197,94,.45);background:rgba(34,197,94,.14)}
.result.bad{color:#ffd0d0;border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.14)}
.result.neutral{color:#d5e0f5;border-color:#405882;background:#17253d}
.exp{margin-top:10px;border-left:3px solid var(--accent);padding:9px 11px;background:#14233b;border-radius:0 10px 10px 0;font-size:13px;color:#d7e5fb}
.empty{padding:48px 0;text-align:center;color:var(--muted)}
.pager{display:flex;gap:8px;align-items:center;justify-content:flex-end}
.to-top{position:fixed;right:18px;bottom:18px;z-index:30;border:1px solid #4d648b;background:linear-gradient(180deg,#23395f 0,#192c4a 100%);color:#e7efff;width:42px;height:42px;border-radius:50%;font-size:18px;cursor:pointer;opacity:0;transform:translateY(8px);pointer-events:none;transition:all .2s ease}
.to-top.visible{opacity:1;transform:translateY(0);pointer-events:auto}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<header class="header">
  <div class="h-wrap">
    <div>
      <div class="title">ASU 113 - Deduplicated MCQ Bank</div>
      <div class="subtitle">Collected from all HTML files. Duplicate questions removed. Exam files are in a separate section.</div>
    </div>
    <div class="controls">
      <div class="seg"><button id="secLecture" class="btn active" type="button">Lectures</button><button id="secExam" class="btn exam" type="button">Exams</button></div>
      <input id="search" type="text" placeholder="Search questions..." autocomplete="off">
      <select id="source"></select>
      <div class="pager"><button id="prev" class="btn" type="button">Prev</button><span id="pageInfo" class="stat"></span><button id="next" class="btn" type="button">Next</button></div>
      <div class="seg"><button id="clearFilters" class="btn btn-ghost" type="button">Clear filters</button><button id="resetAnswers" class="btn btn-ghost" type="button">Reset answers</button></div>
      <div id="countInfo" class="stat"></div>
    </div>
    <div class="hint">Shortcuts: <span class="kbd">/</span> search, <span class="kbd">Esc</span> clear search, <span class="kbd">←</span><span class="kbd">→</span> change page</div>
  </div>
</header>
<main class="main">
  <section class="summary">
    <div class="summary-top"><div class="summary-title">Progress</div><div id="progressInfo" class="stat"></div></div>
    <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
  </section>
  <div id="cards" class="cards"></div>
  <div id="empty" class="empty">Loading questions...</div>
</main>
<button id="toTop" class="to-top" type="button" title="Back to top" aria-label="Back to top">↑</button>
<script src="./app.js" defer></script>
</body>
</html>
