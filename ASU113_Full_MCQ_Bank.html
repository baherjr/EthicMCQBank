antities increase — the fixed price was agreed upfront, and quantity risk is the contractor's responsibility.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":206,"section":"lecture","text":"Indirect costs of workplace accidents include __________.","options":["Medical expenses","Lost productivity and investigation time","Equipment purchase","Employee salaries"],"answer":1,"explanation":"Indirect costs include lost productivity and investigation time — hidden costs that often exceed direct costs by a ratio of 4:1 or more.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":207,"section":"lecture","text":"Indoor air pollution can be significantly reduced by:","options":["Sealing all windows and doors","Using air fresheners","Ensuring adequate ventilation","Increasing indoor humidity"],"answer":2,"explanation":"Adequate ventilation is the primary way to reduce indoor air pollution — it dilutes and displaces pollutants (from tobacco smoke, cooking, building materials, etc.) with fresh outdoor air.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":208,"section":"lecture","text":"Indoor air pollution sources include all EXCEPT:","options":["Tobacco smoke","Cooking appliances","Building materials","Fresh outdoor air"],"answer":3,"explanation":"Fresh outdoor air is NOT an indoor pollution source — it actually helps dilute indoor pollutants. Indoor sources include tobacco smoke, cooking, building materials, and household chemicals.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":209,"section":"lecture","text":"Intellectual fairness means:","options":["Making a biased judgment","Treating all viewpoints justly","Supporting only popular opinions","Avoiding difficult discussions"],"answer":1,"explanation":"Intellectual Fairness means treating all viewpoints justly — applying the same critical standards to ideas one agrees with as to those one disagrees with.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":210,"section":"lecture","text":"Legal ethics govern the conduct of _______.","options":["Engineers and architects","Judges and lawyers","Scientists and researchers","Teachers and students"],"answer":1,"explanation":"Legal ethics specifically govern the conduct of judges and lawyers , setting minimum standards of appropriate conduct in the legal profession.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":211,"section":"lecture","text":"Legal ethics sets the _______ standards of appropriate conduct in the legal profession.","options":["Maximum","Minimum","Optional","Subjective"],"answer":1,"explanation":"Legal ethics sets the minimum standards of appropriate conduct — analogous to how engineering codes set minimum requirements for public safety.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":212,"section":"lecture","text":"Logicalness in an argument means:","options":["All parts of the argument make sense together","The argument is completely true","The argument does not consider different viewpoints","The argument is based on emotions"],"answer":0,"explanation":"Logicalness means that all parts of the argument make sense together — the conclusions follow from the premises in a coherent, non-contradictory way.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":213,"section":"lecture","text":"Multiple submission refers to:","options":["Submitting the same paper for credit in different classes","Citing multiple sources in one paragraph","Submitting different versions of a paper for a single class","Using multiple citations to validate a single argument"],"answer":0,"explanation":"Multiple submission is a form of academic dishonesty where the same paper is submitted for credit in more than one class without prior authorization.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html","ASU113_MCQ_Bank.html"]},{"id":214,"section":"lecture","text":"NASA managers knew about the flaw in the booster seals since:","options":["1983","1977","1986","1969"],"answer":1,"explanation":"NASA managers had known about the O-ring flaw since 1977 — nearly a decade before the 1986 disaster — making the failure an ethical and management failure, not just a technical one.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":215,"section":"lecture","text":"One effective way to control your time as a student is to:","options":["Sleep longer on weekdays","Create a semester calendar","Avoid going to lectures","Study only at night"],"answer":1,"explanation":"Creating a semester calendar is an effective time control strategy — mapping out all deadlines, exams, and commitments in advance prevents last-minute cramming.","bloom":"","lecture":"L9","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":216,"section":"lecture","text":"One ethical question raised by the Hyatt Regency collapse is:","options":["Who is responsible for the design flaw?","How much money was spent on the project?","What was the final number of visitors?","Who attended the event?"],"answer":0,"explanation":"The primary ethical question raised by the collapse is who is responsible for the design flaw — engineers, contractors, or the review process — and how professional accountability should work.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":217,"section":"lecture","text":"One of the aims of professional ethics is to _______.","options":["Resolve financial issues in an organization","Justify moral judgments in the profession","Encourage unethical competition","Avoid professional growth"],"answer":1,"explanation":"One aim of professional ethics is to justify moral judgments within the profession — providing a framework for ethical reasoning and decision-making.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":218,"section":"lecture","text":"One of the earliest structural design codes was the Code of ________.","options":["Vinci","Newton","Hammurabi","Ethics"],"answer":2,"explanation":"The lecture cites the Code of Hammurabi as the first example of a structural design code, setting minimum requirements to ensure public safety and adequate performance.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":219,"section":"lecture","text":"One of the key roles of engineering organizations is to set professional ________ for engineers.","options":["Salaries","Standards","Marketing strategies","Competition rules"],"answer":1,"explanation":"Engineering codes and standards set minimum requirements to ensure public safety and adequate performance — a core function of engineering organizations.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":220,"section":"lecture","text":"One of the responsibilities of professional societies is to _______.","options":["Ensure that catastrophes do not occur","Reduce ethical accountability","Encourage cost-cutting over safety","Ignore failures in engineering projects"],"answer":0,"explanation":"Professional societies have a responsibility to ensure that catastrophes do not occur by setting standards, investigating failures, and maintaining ethical accountability.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":221,"section":"lecture","text":"One type of profit margin in cost plus is:","options":["Based on time","Per square meter","A fixed amount regardless of cost","Per kilometer"],"answer":2,"explanation":"One profit arrangement in cost plus contracts is a fixed amount (lump sum fee) regardless of actual cost — providing the contractor with predictable profit while the employer bears cost risk.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":222,"section":"lecture","text":"One way to prevent accidents while using power tools is to __________.","options":["Ignore safety manuals","Work in a cluttered environment","Inspect tools before use","Avoid wearing PPE"],"answer":2,"explanation":"Inspecting tools before use is a key prevention measure — damaged or defective tools are a leading cause of accidents and should be removed from service.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":223,"section":"lecture","text":"One way to prevent workplace accidents related to cranes is to __________.","options":["Ignore maintenance schedules","Wear seat belts","Use cranes for unintended purposes","Overload lifting equipment"],"answer":1,"explanation":"Wearing seat belts in crane cabs prevents ejection during tip-overs. Following maintenance schedules, load limits, and proper operating procedures are also essential prevention measures.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":224,"section":"lecture","text":"OSHA standards apply to which of the following sectors?","options":["Construction","General Industry","Maritime","All of the above"],"answer":3,"explanation":"OSHA standards apply to all of the above : Construction, General Industry, Maritime, and Agriculture — covering virtually all private sector employers in the United States.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":225,"section":"lecture","text":"OSHA was formally established on __________.","options":["March 15, 1970","April 28, 1971","January 1, 1972","July 4, 1973"],"answer":1,"explanation":"OSHA was formally established on April 28, 1971 — the date is now celebrated as Workers' Memorial Day. The enabling Act was signed December 29, 1970.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":226,"section":"lecture","text":"OSHA's Bloodborne Pathogens Standard applies to workers in:","options":["Healthcare","Emergency response","Laboratories","All of the above"],"answer":3,"explanation":"The Bloodborne Pathogens Standard applies to all of the above : healthcare, emergency response, and laboratory settings — anywhere workers may be exposed to blood or other potentially infectious materials.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":227,"section":"lecture","text":"OSHA's Process Safety Management (PSM) standard applies to industries handling:","options":["Flammable and toxic chemicals","Heavy machinery","Retail stores","Office environments"],"answer":0,"explanation":"PSM applies to industries handling flammable and toxic chemicals above threshold quantities — designed to prevent catastrophic releases of highly hazardous chemicals.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":228,"section":"lecture","text":"OSHA's Whistleblower Protection Program ensures that workers:","options":["Can report safety violations without retaliation","Are paid overtime","Receive yearly bonuses","Can refuse work on any day"],"answer":0,"explanation":"The Whistleblower Protection Program ensures workers can report safety violations without fear of retaliation — protecting employees who exercise their rights under OSHA.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":229,"section":"lecture","text":"Ownership in BOT projects is transferred to:","options":["Contractor","Private investors","Government","Subcontractors"],"answer":2,"explanation":"At the end of the concession period, ownership of a BOT project is transferred to the government — hence 'Transfer' in Build-Operate-Transfer.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":230,"section":"lecture","text":"Ozone layer depletion is primarily caused by the release of:","options":["Carbon monoxide","Chlorofluorocarbons (CFCs)","Methane gases","Nitrogen oxides"],"answer":1,"explanation":"Chlorofluorocarbons (CFCs) — released from aerosols, refrigeration, and air conditioning — break down ozone molecules in the stratosphere, thinning the protective ozone layer.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":231,"section":"lecture","text":"Personal Protective Equipment (PPE) is required for ________.","options":["Office workers","Employees working in hazardous conditions","All employees regardless of role","Security staff only"],"answer":1,"explanation":"PPE is specifically required for employees working in hazardous conditions where engineering and administrative controls cannot adequately reduce the risk of injury or illness.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":232,"section":"lecture","text":"Precision ensures that an argument is:","options":["Broad and vague","Exact and detailed","Simple and generalized","Focused only on one side"],"answer":1,"explanation":"Precision ensures that claims are exact and detailed — specifying what is meant clearly enough that others can evaluate the claim accurately.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":233,"section":"lecture","text":"Professional ethics assure clients that services will be rendered in accordance with _______.","options":["Minimal effort","High standards and moral conduct","Business trends","Personal preferences"],"answer":1,"explanation":"Professional ethics assures clients that services will be rendered according to high standards and moral conduct , building trust in the profession.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":234,"section":"lecture","text":"Professional ethics guides engineers in making decisions that align with laws, standards, and ________.","options":["Business interests","Scientific theories","Ethical codes","Public opinion"],"answer":2,"explanation":"The legal framework of the engineering profession includes codes and standards, and the code of ethics of the profession (e.g., conflict of interest), all of which guide professional decisions.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":235,"section":"lecture","text":"Professional ethics refers to principles that govern the behavior of a person or group in a _______ environment.","options":["Business","Personal","Political","Social"],"answer":0,"explanation":"Professional ethics governs behavior in a business (professional) environment, defining standards for conduct within a profession.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":236,"section":"lecture","text":"Safety Data Sheets (SDS) must be:","options":["Available to employees at all times","Kept in a locked office","Destroyed after 6 months","Sent to OSHA monthly"],"answer":0,"explanation":"SDS must be available to employees at all times during their work shift — they must be readily accessible in the work area where hazardous chemicals are present.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":237,"section":"lecture","text":"The 'black cloud' phenomenon observed in Cairo is mainly attributed to:","options":["Volcanic ash emissions","Annual burning of rice stubble and vehicle exhaust fumes","Desert sandstorms","Industrial chemical spills"],"answer":1,"explanation":"The black cloud in Cairo results from the combination of rice stubble burning (in the Delta region in autumn) and vehicular emissions — a seasonal air quality crisis.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":238,"section":"lecture","text":"The 'General Duty Clause' of OSHA requires employers to:","options":["Provide training for all employees","Ensure workplaces are free from recognized hazards","Conduct daily safety meetings","Allow employees to work without PPE"],"answer":1,"explanation":"The General Duty Clause requires employers to provide a workplace free from recognized hazards that are causing or likely to cause death or serious physical harm.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":239,"section":"lecture","text":"The ability to entertain viewpoints different from one's own, even if strongly disagreed with, is called ______.","options":["Intellectual Courage","Intellectual Humility","Intellectual Empathy","Intellectual Perseverance"],"answer":2,"explanation":"Intellectual Empathy is the ability to imaginatively put oneself in the place of others to genuinely understand them — entertaining viewpoints one may strongly disagree with.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":240,"section":"lecture","text":"The ability to remain committed to solving a complex problem despite frustration is called ______.","options":["Intellectual Autonomy","Intellectual Integrity","Intellectual Perseverance","Intellectual Courage"],"answer":2,"explanation":"Intellectual Perseverance is the commitment to working through complex problems despite difficulty, confusion, or frustration — persisting until a solution is reached.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":241,"section":"lecture","text":"The accumulation of CO₂ in the atmosphere leads to:","options":["Enhanced plant growth","Cooling of the Earth's surface","Trapping of heat, contributing to global warming","Increased rainfall"],"answer":2,"explanation":"CO₂ accumulation leads to trapping of heat, contributing to global warming — CO₂ acts as a 'blanket', allowing sunlight in but preventing heat from escaping back to space.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":242,"section":"lecture","text":"The Challenger disaster could have been prevented if:","options":["Engineers had ignored safety concerns","NASA had delayed the launch to investigate risks","The shuttle was launched under colder temperatures","Managers had disregarded technical warnings"],"answer":1,"explanation":"The disaster could have been prevented if NASA had delayed the launch to investigate the O-ring risks — a delay that engineer Roger Boisjoly and others explicitly requested.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":243,"section":"lecture","text":"The Challenger disaster highlighted ethical dilemmas in:","options":["Financial management","Workplace safety and engineering decisions","Marketing and advertising strategies","Political science and governance"],"answer":1,"explanation":"The Challenger disaster is a landmark case in workplace safety and engineering decision-making ethics — illustrating how management pressure can override professional safety judgments.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":244,"section":"lecture","text":"The employer agrees to pay for:","options":["Only savings","Fixed cost only","Actual cost + agreed profit margin","BOQ quantities only"],"answer":2,"explanation":"In a cost plus contract, the employer agrees to pay actual cost plus an agreed profit margin — all legitimate project costs are reimbursed and the contractor earns an agreed fee.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":245,"section":"lecture","text":"The engineer and contractor are responsible for the facility for how many years?","options":["5 years","10 years","15 years","20 years"],"answer":1,"explanation":"The engineer and contractor are responsible for the facility for 10 years from the date of delivery (Article 651 of the Egyptian Civil Code).","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":246,"section":"lecture","text":"The ethical perspective that emphasizes fairness in policies and decision-making is called ________.","options":["Utilitarianism","Deontology","Social Justice","Virtue Ethics"],"answer":2,"explanation":"Social Justice theory focuses on distributive justice — the fair distribution of goods — and the relationship between rights and duties in law and ethics.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":247,"section":"lecture","text":"The fatal design flaw in the Hyatt Regency collapse was caused by _______.","options":["Miscommunication and design alteration","Proper engineering checks","The building owner's refusal to make changes","Extra safety measures"],"answer":0,"explanation":"The collapse resulted from miscommunication and design alteration — a change to the original hanger rod design doubled the load on the fourth-floor walkway connections.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":248,"section":"lecture","text":"The field of engineering primarily deals with designing solutions to ________ problems.","options":["Scientific","Philosophical","Political","Artistic"],"answer":0,"explanation":"Engineering applies scientific methods and principles (inquiry-based scientific methods under constraint) to solve real-world problems in a technological society.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":249,"section":"lecture","text":"The fundamental canon of engineering ethics states that engineers shall hold _______ paramount.","options":["Profitability","The safety, health, and welfare of the public","The interests of shareholders","Business expansion"],"answer":1,"explanation":"The fundamental canon of engineering ethics is that engineers shall hold the safety, health, and welfare of the public paramount — above all other considerations.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":250,"section":"lecture","text":"The greenhouse effect is exacerbated by:","options":["Increased oxygen levels","Reduction in carbon dioxide emissions","Accumulation of carbon dioxide from burning fuels","Expansion of forested areas"],"answer":2,"explanation":"The greenhouse effect is worsened by accumulation of CO₂ from burning fossil fuels — CO₂ traps heat in the atmosphere, raising Earth's surface temperature.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":251,"section":"lecture","text":"The Hazard Communication Standard (HCS) requires employers to:","options":["Label hazardous chemicals","Provide Safety Data Sheets (SDS)","Train workers on chemical hazards","All of the above"],"answer":3,"explanation":"The Hazard Communication Standard requires all of the above : labeling, Safety Data Sheets, and worker training on chemical hazards — the 'right to know' standard.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":252,"section":"lecture","text":"The Hyatt Regency walkway collapse resulted in _______.","options":["No casualties","114 deaths","Only minor injuries","Legal immunity for engineers"],"answer":1,"explanation":"The Hyatt Regency walkway collapse in 1981 resulted in 114 deaths , making it one of the deadliest structural failures in U.S. history and a landmark case in engineering ethics.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":253,"section":"lecture","text":"The Industrial Revolution led to the rise of engineers as ________ professionals.","options":["Business","Mechanical","Scientific","Art"],"answer":2,"explanation":"During the Industrial Revolution, civil and mechanical engineers changed from practical artists to scientific professionals.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":254,"section":"lecture","text":"The Information Revolution was driven by ________, telecommunications, and computer engineering.","options":["Steam engines","Microelectronics","Railways","Bridges"],"answer":1,"explanation":"Microelectronics , telecommunications, and computer engineering joined forces to precipitate the Information Revolution, where intellectual chores are increasingly alleviated by machines.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":255,"section":"lecture","text":"The intellectual trait that involves recognizing one's own ignorance is called ______.","options":["Intellectual Courage","Intellectual Autonomy","Intellectual Humility","Intellectual Perseverance"],"answer":2,"explanation":"Intellectual Humility involves recognizing the limits of one's own knowledge and being aware of one's biases and potential errors — the opposite of intellectual arrogance.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":256,"section":"lecture","text":"The intellectual trait that involves thinking independently is:","options":["Intellectual Integrity","Intellectual Autonomy","Intellectual Humility","Intellectual Courage"],"answer":1,"explanation":"Intellectual Autonomy is the trait of thinking independently — forming one's own reasoned conclusions rather than blindly accepting the views of others.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":257,"section":"lecture","text":"The Kyoto Protocol primarily aims to:","options":["Enhance global trade","Stabilize greenhouse gas concentrations to prevent climate interference","Promote fossil fuel usage","Reduce ozone layer thickness"],"answer":1,"explanation":"The Kyoto Protocol aims to stabilize greenhouse gas concentrations to prevent dangerous climate change — establishing binding emission reduction targets for developed nations.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":258,"section":"lecture","text":"The last step in workplace safety achievement is __________.","options":["Conducting inspections","Keeping records and evaluating controls","Enforcing penalties","Reporting employees' mistakes"],"answer":1,"explanation":"The final step is keeping records and evaluating controls — documenting what was done and assessing whether safety measures are effective.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":259,"section":"lecture","text":"The main purpose of machine guarding is to:","options":["Improve machine efficiency","Prevent workers from getting injured","Allow machines to run faster","Reduce machine noise"],"answer":1,"explanation":"Machine guarding's primary purpose is to prevent workers from getting injured by moving parts, flying debris, and other machine hazards.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":260,"section":"lecture","text":"The main role of FIDIC is to:","options":["Fund large infrastructure projects","Represent contractors in disputes","Represent consulting engineers internationally","Supervise site operations"],"answer":2,"explanation":"FIDIC's main role is to represent consulting engineers internationally — promoting professional standards, publishing contract forms, and advocating for the consulting engineering industry.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":261,"section":"lecture","text":"The OSHA Act requires employers to provide __________.","options":["Higher salaries","Paid vacations","A workplace free from recognized hazards","Personal health insurance"],"answer":2,"explanation":"The OSHA Act's General Duty Clause requires employers to provide a workplace free from recognized hazards that are causing or likely to cause death or serious physical harm.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":262,"section":"lecture","text":"The philosopher most associated with virtue ethics is ________.","options":["Kant","Bentham","Aristotle","Rawls"],"answer":2,"explanation":"Aristotle is often recognized as the first philosopher to advocate the ethical value of certain qualities, or virtues, in a person's character.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":263,"section":"lecture","text":"The primary focus of engineering laws and regulations is to ensure ________.","options":["Higher salaries","Public safety","Market competition","Engineering creativity"],"answer":1,"explanation":"Codes and standards set minimum requirements to ensure public safety and adequate performance — this is their primary legal purpose.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":264,"section":"lecture","text":"The primary purpose of an Environmental Impact Statement (EIS) is to:","options":["Promote industrial development","Assess potential environmental effects of proposed projects","Increase government revenue","Support urban expansion"],"answer":1,"explanation":"An EIS is used to assess potential environmental effects of proposed projects — identifying impacts, mitigation measures, and alternatives before decisions are made.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":265,"section":"lecture","text":"The principle of _______ in professional ethics ensures that private information remains protected.","options":["Loyalty","Objectivity","Confidentiality","Accountability"],"answer":2,"explanation":"Confidentiality is the ethical principle that ensures private information shared in a professional relationship remains protected and undisclosed.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":266,"section":"lecture","text":"The process of analyzing and interpreting information to draw conclusions is known as:","options":["Deduction","Induction","Reasoning","Logical fallacy"],"answer":2,"explanation":"Reasoning is the broader process of analyzing and interpreting information to draw conclusions — encompassing both deductive and inductive approaches.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":267,"section":"lecture","text":"The purpose of OSHA's Ergonomics Standard is to:","options":["Reduce workplace injuries related to repetitive motion","Improve work-life balance","Increase employee wages","Ensure proper food safety"],"answer":0,"explanation":"OSHA's Ergonomics Standard aims to reduce workplace injuries related to repetitive motion , awkward postures, and other musculoskeletal risk factors.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":268,"section":"lecture","text":"The purpose of OSHA's Lockout/Tagout (LOTO) standard is to:","options":["Control hazardous energy during maintenance","Allow employees to work without supervision","Prevent ergonomic injuries","Improve fire safety"],"answer":0,"explanation":"LOTO is designed to control hazardous energy during maintenance — preventing unexpected energization or startup of machines while workers are performing maintenance.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":269,"section":"lecture","text":"The recovery position is used for __________.","options":["Unconscious casualties","Treating burns","Stopping bleeding","Preventing fractures"],"answer":0,"explanation":"The recovery position is used for unconscious casualties who are breathing — it keeps the airway open and prevents aspiration if the patient vomits.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":270,"section":"lecture","text":"The Red Book in FIDIC contracts is for:","options":["Electrical works","Design-build projects","Civil engineering works","Consulting services"],"answer":2,"explanation":"The Red Book (Conditions of Contract for Construction) is used for civil engineering works designed by the employer — the most commonly used FIDIC form.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":271,"section":"lecture","text":"The root word of 'Engineer' is ________.","options":["Enginer","Ingeniator","Engine","Inventor"],"answer":1,"explanation":"Ingeniator is the Latin root of 'Engineer', meaning ingenious — to devise in the sense of construct or craftsmanship.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":272,"section":"lecture","text":"The Second Industrial Revolution introduced ________ and mass production.","options":["Steam power","Nuclear energy","Artificial intelligence","Electricity"],"answer":3,"explanation":"The Second Industrial Revolution was symbolized by the advent of electricity and mass production, driven by many branches of engineering.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":273,"section":"lecture","text":"The Social Justice perspective is concerned with fair ________ of resources.","options":["Creation","Distribution","Removal","Elimination"],"answer":1,"explanation":"Social justice theorists focus on 'distributive justice' — the fair distribution of goods among members of society according to their needs.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":274,"section":"lecture","text":"The White Book is used for contracts between:","options":["Contractors and the government","Employer and consulting engineer","Two construction companies","Contractor and subcontractor"],"answer":1,"explanation":"The White Book is the FIDIC standard form for contracts between the Employer and the Consulting Engineer — governing professional consulting services.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":275,"section":"lecture","text":"The Yellow Book in FIDIC contracts covers:","options":["Legal consulting","Civil works","Mechanical and electrical works","Facility management"],"answer":2,"explanation":"The Yellow Book (Conditions of Contract for Plant and Design-Build) covers mechanical and electrical works and plant supply, where the contractor also provides design.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":276,"section":"lecture","text":"To avoid cramming, one should:","options":["Skip classes","Study only during finals","Create and stick to a schedule","Only rely on group study"],"answer":2,"explanation":"The best way to avoid cramming is to create and stick to a study schedule — distributing study time across the semester ensures consistent preparation.","bloom":"","lecture":"L9","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":277,"section":"lecture","text":"Utilitarianism focuses on achieving the greatest ________ for the greatest number.","options":["Loss","Good","Harm","Control"],"answer":1,"explanation":"Utilitarianism emphasizes not rules but results — specifically seeking the greatest good for the greatest number of people.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":278,"section":"lecture","text":"Virtue ethics focuses on developing good ________ in individuals.","options":["Regulations","Consequences","Character traits","Technologies"],"answer":2,"explanation":"Virtue Theory emphasizes the value of virtuous qualities — good character traits — rather than formal rules or useful results.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":279,"section":"lecture","text":"What are the main components of air?","options":["Oxygen and carbon dioxide","Nitrogen, oxygen, water vapor, and inert gases","Hydrogen and helium","Methane and ozone"],"answer":1,"explanation":"Air is composed primarily of nitrogen (~78%), oxygen (~21%), water vapor, and inert (noble) gases such as argon — CO₂ is present only in trace amounts (~0.04%).","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":280,"section":"lecture","text":"What are the top three cited workplace hazards according to OSHA in 2022?","options":["Fall Protection, Hazard Communication, Respiratory Protection","Electrical Wiring, Fire Safety, Noise Pollution","Workplace Violence, Radiation, Mechanical Failures","Slip and Fall, Equipment Breakdown, Poor Lighting"],"answer":0,"explanation":"The top three OSHA citations in 2022 were: (1) Fall Protection , (2) Hazard Communication , and (3) Respiratory Protection .","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":281,"section":"lecture","text":"What causes 'smog'?","options":["Natural forest emissions","Dust storms","Chemical reactions between pollutants from automobile and industrial emissions","Ocean vapor"],"answer":2,"explanation":"Smog is caused by chemical reactions between automobile and industrial pollutants — especially in the presence of sunlight (photochemical smog), forming ground-level ozone and particulates.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":282,"section":"lecture","text":"What causes the greenhouse effect?","options":["Water vapor in the air","Too much oxygen","Build-up of CO₂ due to burning fuels","Ozone accumulation"],"answer":2,"explanation":"The greenhouse effect is caused by the build-up of CO₂ from burning fossil fuels — along with other greenhouse gases like methane and nitrous oxide that trap solar heat.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":283,"section":"lecture","text":"What could NASA management have done differently to prevent the Challenger disaster?","options":["Ignored engineering concerns and proceeded as planned","Conducted a thorough review of booster seal issues before launch","Accelerated the launch schedule to meet deadlines","Used a different type of fuel to reduce combustion risks"],"answer":1,"explanation":"NASA management should have conducted a thorough review of booster seal issues before the launch — heeding engineer warnings rather than prioritizing schedule pressures.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":284,"section":"lecture","text":"What does a Chemical Hygiene Plan include?","options":["Exposure control measures","Employee vacation schedules","Company profit reports","Employee annual bonuses"],"answer":0,"explanation":"A Chemical Hygiene Plan includes exposure control measures — procedures, equipment, and practices to protect laboratory workers from hazardous chemical exposures.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":285,"section":"lecture","text":"What does the 'R' in SQ3R NOT stand for?","options":["Recite","Read","Reflect","Review"],"answer":2,"explanation":"Reflect is NOT one of the R's in SQ3R. The five steps are Survey, Question, Read, Recite , and Review .","bloom":"","lecture":"L9","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":286,"section":"lecture","text":"What does the acronym 'MSDS' stand for (now referred to as SDS)?","options":["Material Safety Data Sheet","Mechanical System Design Standard","Mandatory Safety Department Summary","Manufacturing Safety Data Standard"],"answer":0,"explanation":"MSDS stands for Material Safety Data Sheet — now standardized internationally as Safety Data Sheet (SDS) under the GHS (Globally Harmonized System).","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":287,"section":"lecture","text":"What does the acronym 'PPE' stand for?","options":["Professional Protection Equipment","Personal Protective Equipment","Portable Power Equipment","Personal Prevention Essentials"],"answer":1,"explanation":"PPE stands for Personal Protective Equipment — equipment worn to minimize exposure to hazards that cause serious workplace injuries and illnesses.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":288,"section":"lecture","text":"What happens if a clause exempts the engineer and contractor from liability?","options":["It is valid and enforceable","It is null and void","It depends on the employer's approval","It reduces liability by 50%"],"answer":1,"explanation":"Any clause that exempts the engineer and contractor from the 10-year liability is null and void — this protection for the public cannot be waived by contract.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":289,"section":"lecture","text":"What happens if a contractor fails to pay the final insurance on time?","options":["The contract is automatically extended","The bid acceptance is revoked","A penalty is applied","No action is taken"],"answer":1,"explanation":"If the contractor fails to pay the final insurance within 10 days, the bid acceptance is revoked — and the primary insurance (bid bond) may be forfeited.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":290,"section":"lecture","text":"What happens if a contractor is found guilty of bribery?","options":["The contract continues with a fine","The contractor is blacklisted and the contract is terminated","The contractor receives a warning","The project is paused for investigation"],"answer":1,"explanation":"A contractor found guilty of bribery is blacklisted (barred from future tenders) and the contract is terminated — bribery is treated as a fundamental breach.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":291,"section":"lecture","text":"What happens if a lump-sum contractor faces price increases due to war?","options":["They must absorb the cost","They can claim compensation","The contract is voided","The employer provides extra materials"],"answer":1,"explanation":"Exceptional, unforeseeable events like war that cause price increases allow the lump-sum contractor to claim compensation — force majeure can excuse strict lump-sum terms.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":292,"section":"lecture","text":"What happens if only one bid is submitted in a tender?","options":["The tender is automatically awarded to that bidder","The tender must be canceled","The bidder must reduce the price","A new tender is announced"],"answer":1,"explanation":"If only one bid is submitted, the tender must be canceled — a single bid eliminates competition, defeating the purpose of the tender process.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html","ASU113_MCQ_Bank.html"]},{"id":293,"section":"lecture","text":"What happens if the contractor performs defective work that cannot be fixed?","options":["The contract continues with a penalty","The contract is terminated without warning","The employer must pay extra for repairs","The subcontractor must redo the work"],"answer":1,"explanation":"If defective work cannot be remedied, the contract is terminated without warning — an irremediable defect is grounds for immediate termination of the contract.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":294,"section":"lecture","text":"What happens to the final insurance if the contractor fulfills all obligations?","options":["It is forfeited by the government","It is returned to the contractor","It is transferred to another project","It is converted into a penalty"],"answer":1,"explanation":"If the contractor fulfills all contractual obligations, the final insurance is returned to the contractor — it was held as a performance guarantee, not a penalty.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":295,"section":"lecture","text":"What is a contractor's obligation?","options":["To complete work as agreed and hand it over on time","To delay work for extra payment","To ignore design specifications","To subcontract all work"],"answer":0,"explanation":"The contractor's core obligation is to complete the work as agreed and hand it over on time — this is the fundamental duty under any construction contract.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":296,"section":"lecture","text":"What is a good habit during studying, as per the lecture?","options":["Avoid self-testing","Study only on weekends","Start preparing for tests one day before","Incorporate self-testing in your schedule"],"answer":3,"explanation":"Incorporating self-testing into your study schedule is a highly effective habit — retrieval practice strengthens memory far more than passive re-reading.","bloom":"","lecture":"L9","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":297,"section":"lecture","text":"What is a limited tender?","options":["A tender open to all suppliers","A tender restricted to specific qualified contractors/suppliers","A tender with no financial requirements","A tender only for local businesses"],"answer":1,"explanation":"A limited tender is restricted to specific qualified contractors or suppliers — used when specialized expertise or pre-qualification is required.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":298,"section":"lecture","text":"What is a major hazard associated with scaffolding?","options":["Loud noise","Falling objects","Poor ventilation","Overheating"],"answer":1,"explanation":"Falling objects are a major scaffolding hazard — tools, materials, or debris can fall from elevated platforms, injuring workers below. Falls from scaffolding are also a primary hazard.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":299,"section":"lecture","text":"What is an employer's obligation?","options":["To enable the contractor to complete work and pay wages","To interfere daily in construction","To withhold payment until subcontractors are paid","To provide free labor to the contractor"],"answer":0,"explanation":"The employer's obligations are to enable the contractor to complete the work and to pay wages — creating the conditions for performance and honoring the financial commitment.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":300,"section":"lecture","text":"What is NOT a protection method for scaffolding safety?","options":["Using base plates","Ensuring a fully planked deck","Allowing untrained workers to assemble scaffolds","Using guardrails over 10 feet high"],"answer":2,"explanation":"Allowing untrained workers to assemble scaffolds is NOT a protection method — it is a dangerous practice. Only trained and authorized workers should erect or modify scaffolding.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":301,"section":"lecture","text":"What is NOT a responsibility of OSHA?","options":["Developing safety standards","Enforcing safety laws","Conducting training programs","Regulating private business profits"],"answer":3,"explanation":"OSHA is responsible for safety standards, enforcement, and training — it does NOT regulate private business profits . That falls under economic and financial regulatory bodies.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":302,"section":"lecture","text":"What is one common obstacle to effective studying that was mentioned?","options":["Group work","Watching educational videos","Laziness and daydreaming","Writing notes"],"answer":2,"explanation":"Laziness and daydreaming are identified as common obstacles to effective studying — recognizing and actively countering these habits is part of developing a strong work ethic.","bloom":"","lecture":"L9","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":303,"section":"lecture","text":"What is one of the most effective times to review your study material?","options":["A week after the lecture","Right after class","During weekends only","The day of the exam"],"answer":1,"explanation":"Reviewing material right after class is highly effective — it reinforces fresh information before the forgetting curve steepens, dramatically improving long-term retention.","bloom":"","lecture":"L9","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":304,"section":"lecture","text":"What is required for a bid to be considered valid?","options":["Only a financial offer","Only a technical offer","Both technical and financial offers in sealed envelopes","A verbal agreement"],"answer":2,"explanation":"A valid bid requires both technical and financial offers submitted in sealed envelopes — the two-envelope system ensures technical evaluation occurs before price is considered.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":305,"section":"lecture","text":"What is required for a limited practice (auction) to be used?","options":["Only one supplier is available","The project is confidential","The items must be purchased from production sites","All of the above"],"answer":3,"explanation":"A limited practice can be used when all of the above conditions apply: only one supplier, confidential project, or items requiring purchase from production sites.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":306,"section":"lecture","text":"What is the 'Forgetting Curve' used to demonstrate?","options":["How well we sleep after studying","How quickly information is retained after repeated reviews","How stress affects exams","How long exams typically last"],"answer":1,"explanation":"The Forgetting Curve (Ebbinghaus) demonstrates how information retention improves with repeated reviews — each review flattens the forgetting curve, making recall more durable.","bloom":"","lecture":"L9","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":307,"section":"lecture","text":"What is the basic definition of a construction contract?","options":["An agreement to provide materials only","A contract where one party undertakes to do work for payment, and the other agrees to pay","A verbal agreement between an engineer and a contractor","A short-term agreement with no legal obligations"],"answer":1,"explanation":"A construction contract is defined as one where one party undertakes to do work for payment, and the other agrees to pay — establishing mutual obligations between contractor and employer.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":308,"section":"lecture","text":"What is the best way to prevent heat stress in outdoor workers?","options":["Drink plenty of water","Wear extra layers of clothing","Work in direct sunlight","Ignore warning signs"],"answer":0,"explanation":"The best prevention for heat stress is to drink plenty of water — staying hydrated is essential. Additional measures include rest breaks, shade, and acclimatization.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":309,"section":"lecture","text":"What is the correct format for citing a book reference?","options":["First name, Last name, 'Title,' Publisher, Year.","Last name, First initial, Title, Edition, Publisher, Year.","Publisher, Title, Last name, First name, Year.","Title, Author, Edition, Publisher, Year."],"answer":1,"explanation":"The correct format is: Last name, First initial, Title, Edition, Publisher, Year — the standard academic citation format for books.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":310,"section":"lecture","text":"What is the correct punctuation for citing a source at the end of a sentence?","options":["\"Like this\"[1].","\"Like this.\" [1]","\"Like this\" [1].","\"Like this [1].\""],"answer":2,"explanation":"The correct format is 'Like this' [1]. — the citation number comes after the closing quotation mark but before the period at the end of the sentence.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":311,"section":"lecture","text":"What is the difference between deduction and induction?","options":["Deduction moves from specific to general, while induction moves from general to specific","Deduction provides certain conclusions, while induction provides probable conclusions","Deduction relies on emotions, while induction relies on logic","Deduction uses assumptions, while induction uses calculations"],"answer":1,"explanation":"Deduction provides certain conclusions (if premises are true, conclusion must be true); induction provides probable conclusions (strong evidence makes conclusions likely but not guaranteed).","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":312,"section":"lecture","text":"What is the engineer entitled to if their design is not used?","options":["Full payment as if it was used","Payment only for the time spent designing","No payment","Payment based on future use"],"answer":1,"explanation":"If the engineer's design is not used, they are entitled to payment only for the time spent designing — they cannot claim full project fees for unused work.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":313,"section":"lecture","text":"What is the final insurance percentage of the contract value?","options":["2%","5%","10%","15%"],"answer":1,"explanation":"The final insurance (performance bond) is 5% of the contract value — held by the government until the contractor fulfills all obligations, then returned.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":314,"section":"lecture","text":"What is the first priority in First Aid?","options":["Checking breathing","Looking for simple injuries","Treating fractures","Transporting the patient"],"answer":0,"explanation":"The first priority in First Aid is checking breathing — establishing and maintaining an airway is the most critical first step (Airway, Breathing, Circulation — the ABC priority).","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":315,"section":"lecture","text":"What is the first step in hazard identification?","options":["Conducting a risk assessment","Implementing safety measures","Training workers","Filing an OSHA complaint"],"answer":0,"explanation":"The first step in hazard identification is conducting a risk assessment — systematically examining the workplace to identify conditions that could cause injury or illness.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":316,"section":"lecture","text":"What is the first step in workplace safety achievement?","options":["Training employees","Performing work within controls","Defining the scope of work","Keeping records"],"answer":2,"explanation":"The first step in workplace safety achievement is defining the scope of work — understanding what work will be done before identifying hazards and implementing controls.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":317,"section":"lecture","text":"What is the key difference between a tender and a practice (auction)?","options":["Tenders are only for government projects, while practices are for private projects","Practices allow real-time price reduction during the session, while tenders use sealed bids","Tenders require public announcements, while practices do not","There is no difference"],"answer":1,"explanation":"The key difference: practices (auctions) allow real-time price reduction during the session, while tenders use sealed bids submitted before the opening date.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":318,"section":"lecture","text":"What is the main mission of OSHA?","options":["To collect workplace data","To inspect food safety","To save lives, prevent injuries, and protect workers' health","To regulate environmental pollution"],"answer":2,"explanation":"OSHA's main mission is to save lives, prevent injuries, and protect the health of workers through enforcement of safety standards and workplace inspections.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":319,"section":"lecture","text":"What is the main reason for documenting sources in research?","options":["To confuse readers with multiple references","To increase the word count","To protect the originator of the information","To make the research appear more complex"],"answer":2,"explanation":"Documenting sources serves to protect the originator of the information by giving proper credit — also protecting the researcher from accusations of plagiarism.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":320,"section":"lecture","text":"What is the maximum fine for delay in executing a contract (for business contracting)?","options":["3% of the contract value","5% of the contract value","10% of the contract value","15% of the contract value"],"answer":2,"explanation":"The maximum delay fine for business (supply/works) contracts is 10% of the contract value . For service contracts, the maximum is 3%.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":321,"section":"lecture","text":"What is the maximum OSHA fine for a 'serious' violation?","options":["$7,000","$15,625","$50,000","$100,000"],"answer":1,"explanation":"The maximum OSHA fine for a serious violation is $15,625 per violation (as of 2023, adjusted periodically for inflation).","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":322,"section":"lecture","text":"What is the maximum percentage for primary insurance in a tender?","options":["1% of the project's estimated value","2% of the project's estimated value","5% of the project's estimated value","10% of the project's estimated value"],"answer":1,"explanation":"The primary (bid bond) insurance is a maximum of 2% of the project's estimated value — submitted with the bid to demonstrate serious intent.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":323,"section":"lecture","text":"What is the maximum value for a contract awarded via direct agreement (for purchasing movables)?","options":["50,000 pounds","100,000 pounds","200,000 pounds","500,000 pounds"],"answer":0,"explanation":"For purchasing movables (supplies), the maximum value for a direct agreement is 50,000 pounds without requiring higher authority approval.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":324,"section":"lecture","text":"What is the most common workplace injury reported to OSHA?","options":["Burns","Electrocution","Slips, trips, and falls","Toxic exposure"],"answer":2,"explanation":"Slips, trips, and falls are the most common workplace injury reported to OSHA — they account for the majority of general industry accidents and are the #1 OSHA citation category.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":325,"section":"lecture","text":"What is the penalty for a contractor's delay in project execution?","options":["A fine up to 3% (for services) or 10% (for business contracts)","Automatic contract termination","Blacklisting from future tenders","No penalty if the delay is justified"],"answer":0,"explanation":"The delay penalty is up to 3% for service contracts and up to 10% for business (supply/works) contracts — proportional to the nature and value of the contract.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":326,"section":"lecture","text":"What is the primary benefit of using the Cornell note-taking method?","options":["Helps in drawing diagrams","Allows you to sleep in class","Encourages organized note-taking and review","Makes you write less"],"answer":2,"explanation":"The Cornell method's primary benefit is organized note-taking and review — dividing the page into notes, cues, and summary sections promotes active engagement and systematic review.","bloom":"","lecture":"L9","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":327,"section":"lecture","text":"What is the primary insurance refund policy for disqualified bidders?","options":["It is forfeited","It is returned immediately without request","It is transferred to another project","It is held for 6 months"],"answer":1,"explanation":"For disqualified bidders, the primary insurance is returned immediately without request — they had no contract, so there is no basis to retain their bid bond.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":328,"section":"lecture","text":"What is the primary purpose of a tender?","options":["To select the contractor with the highest price","To obtain the lowest prices among technically acceptable bids","To avoid competition among contractors","To allow direct negotiation with suppliers"],"answer":1,"explanation":"The primary purpose of a tender is to obtain the lowest prices among technically acceptable bids — ensuring value for money while maintaining technical quality standards.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":329,"section":"lecture","text":"What is the primary purpose of First Aid?","options":["To delay medical treatment","To prevent further injury and promote recovery","To replace professional medical care","To diagnose chronic diseases"],"answer":1,"explanation":"The primary purpose of First Aid is to prevent further injury and promote recovery until professional medical care is available. It is immediate, not a replacement for professional treatment.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":330,"section":"lecture","text":"What is the primary reason engineers should report safety concerns?","options":["To protect the company's reputation","To avoid personal liability","To ensure public safety and prevent disasters","To increase their chances of promotion"],"answer":2,"explanation":"Engineers should report safety concerns primarily to ensure public safety and prevent disasters — the Challenger case shows what happens when safety warnings are suppressed.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":331,"section":"lecture","text":"What is the purpose of an Environmental Impact Statement?","options":["To estimate a project's cost","To identify legal violations","To report the environmental effects of proposed projects","To promote industrial growth"],"answer":2,"explanation":"An EIS documents the environmental effects of proposed projects — enabling informed decision-making, public participation, and identification of mitigation measures before a project proceeds.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":332,"section":"lecture","text":"What is the purpose of intellectual courage?","options":["To avoid questioning personal beliefs","To challenge strongly held assumptions","To accept only traditional ideas","To prioritize emotional reasoning"],"answer":1,"explanation":"Intellectual Courage is the willingness to challenge strongly held assumptions — including one's own — and to consider ideas that may be unpopular or uncomfortable.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":333,"section":"lecture","text":"What is the role of the General Authority for Government Services in tender cancellations?","options":["Approving all tender awards","Publishing deletion decisions of disqualified contractors","Setting tender prices","Managing all financial transactions"],"answer":1,"explanation":"The General Authority for Government Services is responsible for publishing deletion decisions of disqualified contractors — maintaining a public blacklist of excluded bidders.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":334,"section":"lecture","text":"What is the role of the ozone layer?","options":["It provides oxygen to the atmosphere","It reflects sunlight","It protects the earth from ultraviolet radiation","It traps greenhouse gases"],"answer":2,"explanation":"The ozone layer protects Earth from ultraviolet (UV) radiation — UV-B and UV-C radiation would cause severe damage to DNA, skin cancer, and ecosystem disruption without this protection.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":335,"section":"lecture","text":"What is the significance of the Code of Hammurabi in engineering?","options":["It was the first scientific theory in engineering","It provided early structural design regulations","It established modern electrical engineering","It introduced digital engineering concepts"],"answer":1,"explanation":"The Code of Hammurabi is significant as the first structural design code, providing early structural design regulations to ensure public safety and adequate performance.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":336,"section":"lecture","text":"What must a contractor do if the primary insurance exceeds the final insurance?","options":["Pay the difference","The excess is returned without request","Transfer it to another project","Forfeit the amount"],"answer":1,"explanation":"If the primary insurance (bid bond) exceeds the required final insurance, the excess is returned without request — the contractor is not penalized for over-bonding.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":337,"section":"lecture","text":"What percentage of fresh water is groundwater?","options":["25%","50%","75%","95%"],"answer":3,"explanation":"95% of Earth's liquid fresh water is groundwater — stored in aquifers underground. Surface water (rivers, lakes) represents only about 5% of accessible fresh water.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":338,"section":"lecture","text":"What should be done before using a ladder?","options":["Inspect it for damage","Place it on an uneven surface","Remove slip-resistant feet","Use it without stabilizing"],"answer":0,"explanation":"Before using a ladder, you must inspect it for damage — check for broken rungs, cracked rails, or missing safety feet. Damaged ladders must be taken out of service.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":339,"section":"lecture","text":"What should you do if distractions occur during a lecture?","options":["Join the distraction","Politely ask the speaker to stop","Ignore the distractions","Complain loudly"],"answer":2,"explanation":"When distractions occur in a lecture, you should ignore the distractions — refocus your attention on the speaker and the content rather than engaging with the distraction.","bloom":"","lecture":"L9","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":340,"section":"lecture","text":"What should you do if you identify an unsafe condition at work?","options":["Ignore it","Report it to your supervisor","Wait for someone else to fix it","Leave work immediately"],"answer":1,"explanation":"If you identify an unsafe condition, you should report it to your supervisor immediately — this is both an ethical responsibility and a right protected under OSHA.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":341,"section":"lecture","text":"What was one of the key ethical issues in the Challenger disaster?","options":["The engineers had no data to support their claims.","NASA managers prioritized schedule over safety concerns.","The O-rings were replaced before launch, but still failed.","The disaster was an unavoidable accident with no warnings."],"answer":1,"explanation":"The key ethical issue was that NASA managers prioritized schedule over safety concerns — overriding engineer objections to meet a politically motivated launch deadline.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":342,"section":"lecture","text":"What was the primary cause of the Space Shuttle Challenger disaster?","options":["A software malfunction in the navigation system","A fuel leakage in the main engine","A seal failure in the rocket booster","An electrical short circuit"],"answer":2,"explanation":"The Challenger disaster was caused by a seal (O-ring) failure in the solid rocket booster , allowing hot gases to escape and ignite the external fuel tank.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":343,"section":"lecture","text":"What was the role of the O-rings in the Challenger disaster?","options":["To provide insulation for the fuel tanks","To seal the joints between sections of the rocket boosters","To regulate the pressure in the shuttle cabin","To control the ignition timing of the boosters"],"answer":1,"explanation":"The O-rings were designed to seal the joints between sections of the solid rocket boosters . In cold temperatures, they failed to seat properly, allowing hot gases to escape.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":344,"section":"lecture","text":"When a conclusion is logically certain based on its premises, the reasoning is called ______.","options":["Inductive","Deductive","Probabilistic","Subjective"],"answer":1,"explanation":"Deductive reasoning produces logically certain conclusions from premises. If the premises are true and the reasoning is valid, the conclusion must be true.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":345,"section":"lecture","text":"When are guarantee claims forfeited?","options":["After 1 year from demolition","After 3 years from demolition","After 5 years from demolition","After 10 years from demolition"],"answer":1,"explanation":"Guarantee claims are forfeited if not raised within 3 years from the time of demolition or discovery of the defect — this is the prescription period for claims.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":346,"section":"lecture","text":"When can a contract be awarded through direct agreement?","options":["Only for military contracts","In urgent cases with a justified decision","When all bidders are disqualified","For projects exceeding 1 million pounds"],"answer":1,"explanation":"Direct agreement can be used in urgent cases with a justified decision from the appropriate authority — bypassing competitive bidding when urgency or necessity requires it.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":347,"section":"lecture","text":"When can a contractor NOT assign work to a subcontractor?","options":["If the contract requires the contractor to do the work personally","If the subcontractor is cheaper","If the employer dislikes the subcontractor","If the work is complex"],"answer":0,"explanation":"A contractor cannot subcontract when the contract requires the contractor to perform the work personally — intuitu personae contracts are non-assignable by their nature.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":348,"section":"lecture","text":"When can a tender be canceled?","options":["If all bids exceed the estimated project value","If only one bid remains after disqualifications","If public interest requires it","All of the above"],"answer":3,"explanation":"A tender can be canceled in all of the above situations: all bids exceed estimates, only one valid bid remains, or public interest requires cancellation.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":349,"section":"lecture","text":"When can the administrative authority implement the contract at the contractor's expense?","options":["If the contractor delays the project","If the contractor violates contract terms","If the contractor requests it","Both a and b"],"answer":3,"explanation":"The administrative authority can implement the contract at the contractor's expense in both cases: delay and violation of contract terms — a powerful administrative remedy.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":350,"section":"lecture","text":"When can the administrative authority terminate a contract?","options":["If the contractor violates any conditions","Only with court approval","If the project is delayed by one day","Never"],"answer":0,"explanation":"The administrative authority can terminate a contract if the contractor violates any conditions of the contract — administrative contracts give the authority broader termination rights than private contracts.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":351,"section":"lecture","text":"When does a contract expire automatically?","options":["If the work becomes impossible to execute","If the contractor takes a vacation","If the employer delays payment by a week","If the project runs over budget"],"answer":0,"explanation":"A contract expires automatically when the work becomes impossible to execute — force majeure or objective impossibility terminates the contract by operation of law.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":352,"section":"lecture","text":"When does the 10-year liability period start?","options":["From the contract signing date","From the date of delivery","From the start of construction","From the date of final payment"],"answer":1,"explanation":"The 10-year liability period starts from the date of delivery of the completed work — not from contract signing or construction start.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":353,"section":"lecture","text":"When facing a catastrophic failure, an engineer should consider _______.","options":["Who is responsible for safety checks","How to cover up mistakes","Reducing safety measures","Ignoring building codes"],"answer":0,"explanation":"When facing a catastrophic failure, ethical analysis requires examining who is responsible for safety checks — assigning accountability and preventing recurrence.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":354,"section":"lecture","text":"When inserting a citation in text, which of the following is correct?","options":["(Author, Year)","[Number]","{Reference}","(Title, Page)"],"answer":1,"explanation":"The correct in-text citation format referenced in the lecture is [Number] — a bracketed numeral corresponding to the reference list.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":355,"section":"lecture","text":"When is a contract automatically terminated?","options":["If the contractor delays the project by one month","If the contractor becomes bankrupt","If the contractor requests an extension","If the project cost increases"],"answer":1,"explanation":"A contract is automatically terminated if the contractor becomes bankrupt — insolvency makes contract performance legally and practically impossible.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":356,"section":"lecture","text":"When is a local tender mandatory?","options":["For all government projects","For projects under 200,000 pounds involving local contractors","Only for consulting studies","For international collaborations"],"answer":1,"explanation":"A local tender is mandatory for projects under 200,000 pounds when the work involves local contractors — providing a simplified, competitive process for smaller contracts.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":357,"section":"lecture","text":"When is a local tender used?","options":["For projects exceeding 500,000 pounds","For projects not exceeding 200,000 pounds, limited to local contractors","Only for consulting services","For international projects"],"answer":1,"explanation":"A local tender is used for projects not exceeding 200,000 pounds , restricted to local (Egyptian) contractors — a simplified process for smaller projects.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":358,"section":"lecture","text":"When must the final insurance be completed after bid acceptance?","options":["Within 5 days","Within 10 days","Within 20 days","Within 30 days"],
