"answer":1,"explanation":"The final insurance (performance bond) must be completed within 10 days of bid acceptance . Failure to comply results in revocation of bid acceptance.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":359,"section":"lecture","text":"When was the OSHA Act signed into law, and by whom?","options":["December 29, 1970 – President Nixon","April 28, 1971 – President Johnson","March 15, 1969 – President Ford","June 20, 1975 – President Carter"],"answer":0,"explanation":"The OSHA Act was signed into law on December 29, 1970 by President Nixon . OSHA itself was formally established on April 28, 1971.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":360,"section":"lecture","text":"Which authority can authorize a direct agreement for contracts exceeding 100,000 pounds?","options":["The Prime Minister","The Governor","The Minister of Finance","The Head of the Administrative Authority"],"answer":1,"explanation":"For direct agreements exceeding 100,000 pounds, authorization is required from the Governor (محافظ) of the relevant governorate.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":361,"section":"lecture","text":"Which body language cue shows you are a good listener?","options":["Leaning back and crossing arms","Maintaining natural eye contact","Yawning during the lecture","Looking around the room"],"answer":1,"explanation":"Maintaining natural eye contact is a key body language cue of an engaged listener — it signals attention and encourages the speaker while helping you stay focused.","bloom":"","lecture":"L9","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":362,"section":"lecture","text":"Which FIDIC contract type is used for design and construction (turnkey)?","options":["Red","White","Yellow","Orange"],"answer":3,"explanation":"The Orange Book (now superseded by the Silver Book) is used for design-build turnkey projects — where the contractor provides both design and construction.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":363,"section":"lecture","text":"Which gas is mainly responsible for global warming?","options":["O₂","CO₂","N₂","CH₄"],"answer":1,"explanation":"CO₂ (carbon dioxide) is the primary greenhouse gas responsible for global warming — though methane (CH₄) is more potent per molecule, CO₂ is far more abundant and persistent.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":364,"section":"lecture","text":"Which intellectual standard ensures that information is free from errors or distortions?","options":["Clarity","Accuracy","Relevance","Fairness"],"answer":1,"explanation":"Accuracy ensures that information is free from errors or distortions — it is one of the eight intellectual standards: clarity, accuracy, precision, relevance, depth, breadth, logic, and fairness.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":365,"section":"lecture","text":"Which international treaty aimed to reduce greenhouse gas emissions?","options":["Geneva Convention","Montreal Protocol","Kyoto Protocol","Paris Agreement"],"answer":2,"explanation":"The Kyoto Protocol (1997) was the first binding international treaty to reduce greenhouse gas emissions — establishing differentiated responsibilities for developed and developing nations.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":366,"section":"lecture","text":"Which is NOT a crane or motor vehicle hazard?","options":["Crane tip-over","Equipment rolling over","Unscheduled breaks","Collisions"],"answer":2,"explanation":"Crane and motor vehicle hazards include tip-overs, rollovers, and collisions. Unscheduled breaks are a scheduling matter — not a physical safety hazard.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":367,"section":"lecture","text":"Which is NOT a responsibility under OSHA's Lab Standards?","options":["Identifying exposure risks","Conducting initial and additional training","Buying unnecessary chemicals","Developing a Chemical Hygiene Plan"],"answer":2,"explanation":"OSHA Lab Standards require exposure identification, training, and Chemical Hygiene Plans. Buying unnecessary chemicals is not a lab standard requirement — and actually increases hazard risk.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":368,"section":"lecture","text":"Which is NOT a tip given for good test-taking strategy?","options":["Arrive late to avoid stress","Do a memory dump","Budget time wisely","Use all the allotted time"],"answer":0,"explanation":"Arriving late is NOT a test-taking tip — it is counterproductive. Good strategies include arriving early, doing a memory dump at the start, budgeting time, and using all allotted time.","bloom":"","lecture":"L9","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":369,"section":"lecture","text":"Which law exempts military contracts from certain financial rules?","options":["Law No. 204 of 1957","Law No. 89 of 1998","Law No. 12 of 2003","Law No. 5 of 2010"],"answer":0,"explanation":"Law No. 204 of 1957 exempts military contracts from certain financial rules governing tenders and direct agreements — reflecting national security considerations.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":370,"section":"lecture","text":"Which of the following best defines reasoning?","options":["Drawing conclusions based on logic","Repeating common opinions","Assuming facts without evidence","Making random guesses"],"answer":0,"explanation":"Reasoning is the process of drawing conclusions based on logic — analyzing and interpreting information systematically to arrive at valid conclusions.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":371,"section":"lecture","text":"Which of the following best describes a whistleblower?","options":["A person who spreads workplace rumors","An employee who leaks confidential financial data","Someone who reports unethical or illegal activities within an organization","A manager who enforces strict company policies"],"answer":2,"explanation":"A whistleblower is someone who reports unethical or illegal activities within an organization — often at personal risk, as illustrated by engineers who opposed the Challenger launch.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":372,"section":"lecture","text":"Which of the following countries did NOT ratify the Kyoto Protocol?","options":["United Kingdom","United States","Germany","France"],"answer":1,"explanation":"The United States did not ratify the Kyoto Protocol — making it the only developed Annex I country to refuse ratification, significantly undermining the treaty's effectiveness.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":373,"section":"lecture","text":"Which of the following does OSHA classify as a 'health hazard'?","options":["Exposure to toxic chemicals","Slips and falls","Loud noises","Equipment malfunction"],"answer":0,"explanation":"OSHA classifies exposure to toxic chemicals as a health hazard — causing disease, illness, or impairment of normal physiological function. Slips, falls, and equipment malfunctions are safety hazards.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":374,"section":"lecture","text":"Which of the following intellectual standards ensures that a statement is not misleading or exaggerated?","options":["Logicalness","Clarity","Precision","Fairness"],"answer":2,"explanation":"Precision ensures that statements are exact and detailed — not vague, misleading, or exaggerated. It requires specific, concrete, and accurate detail.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":375,"section":"lecture","text":"Which of the following is a common indoor air pollutant?","options":["Carbon monoxide from cars","Acid rain","Tobacco smoke and fumes from paints","Industrial emissions"],"answer":2,"explanation":"Tobacco smoke and fumes from paints are common indoor air pollutants — along with formaldehyde from building materials, radon from soil, and combustion products from cooking.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":376,"section":"lecture","text":"Which of the following is a consequence of acid rain?","options":["Increases photosynthesis in plants","Enhances soil fertility","Destroys plant leaves and poisons soil","Improves water quality"],"answer":2,"explanation":"Acid rain destroys plant leaves and poisons soil — acidic precipitation leaches nutrients from soil and damages plant tissues, harming forests and agriculture.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":377,"section":"lecture","text":"Which of the following is a disadvantage of cost plus contracts?","options":["Risk of disputes over changes","Employer has full cost uncertainty","Contractor bears cost risks","Fixed payments regardless of work"],"answer":1,"explanation":"The main disadvantage is that the employer has full cost uncertainty — the final project cost is unknown in advance, making budgeting and financial planning difficult.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":378,"section":"lecture","text":"Which of the following is a fundamental cause of pollution?","options":["Solar energy use","Production","Urban gardening","Use of electric cars"],"answer":1,"explanation":"Production is identified as a fundamental cause of pollution — industrial and agricultural production generates emissions, effluents, and solid waste as by-products of economic activity.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":379,"section":"lecture","text":"Which of the following is a key element of an Emergency Action Plan (EAP)?","options":["Employee roles and responsibilities","Evacuation procedures","Fire prevention strategies","All of the above"],"answer":3,"explanation":"An Emergency Action Plan includes all of the above : employee roles and responsibilities, evacuation procedures, and fire prevention strategies.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":380,"section":"lecture","text":"Which of the following is a primary contributor to the formation of smog in urban areas?","options":["Excessive use of air conditioning","Chemical reactions between pollutants from vehicles and industrial emissions","Deforestation in rural regions","High humidity levels"],"answer":1,"explanation":"Smog is primarily formed through chemical reactions between pollutants from vehicles and industrial emissions — particularly nitrogen oxides and volatile organic compounds reacting in sunlight.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":381,"section":"lecture","text":"Which of the following is a way to practice professional ethics?","options":["Ignoring company policies","Embodying high ethical standards","Acting with bias","Disregarding confidentiality"],"answer":1,"explanation":"Practicing professional ethics involves embodying high ethical standards in all professional actions, including complying with laws and protecting confidentiality.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":382,"section":"lecture","text":"Which of the following is an incorrect method of avoiding plagiarism?","options":["Properly citing all sources used","Using quotation marks when directly quoting","Copying another student's work word-for-word","Writing original ideas and referencing when necessary"],"answer":2,"explanation":"Copying another student's work word-for-word is plagiarism — it is the opposite of avoiding plagiarism, not a method of avoiding it.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":383,"section":"lecture","text":"Which of the following is an unethical communication practice?","options":["Writing clear instructions","Withholding adverse information","Citing sources correctly","Including safety warnings"],"answer":1,"explanation":"Withholding adverse information is an unethical communication practice. Engineers must communicate honestly, including disclosing unfavorable facts that affect safety or decisions.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":384,"section":"lecture","text":"Which of the following is considered a fundamental driver of pollution?","options":["Globalization","Industrialization","Recycling programs","Urban gardening"],"answer":1,"explanation":"Industrialization is identified as a fundamental cause of pollution — increased production and consumption generate emissions, waste, and resource depletion at an industrial scale.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":385,"section":"lecture","text":"Which of the following is considered a struck-by hazard?","options":["Falling tools","Chemical spills","Loud machinery","Excessive heat"],"answer":0,"explanation":"Falling tools are a struck-by hazard — the worker is struck by a moving object. The four leading causes of construction fatalities are falls, struck-by, caught-in/between, and electrocution.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":386,"section":"lecture","text":"Which of the following is NOT a common component of professional ethics?","options":["Integrity","Transparency","Objectivity","Popularity"],"answer":3,"explanation":"The components of professional ethics include integrity, transparency, objectivity, confidentiality, and accountability. Popularity is not an ethical component.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":387,"section":"lecture","text":"Which of the following is NOT a direct effect of acid rain?","options":["Destruction of plant leaves","Poisoning of soil","Formation of smog","Alteration of lake chemistry"],"answer":2,"explanation":"Smog formation is NOT a direct effect of acid rain — smog is caused by photochemical reactions of vehicle and industrial pollutants. Acid rain effects include plant damage, soil poisoning, and lake acidification.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":388,"section":"lecture","text":"Which of the following is NOT a fire safety measure?","options":["Identifying fire hazards","Keeping exit routes clear","Storing flammable materials near open flames","Conducting regular fire drills"],"answer":2,"explanation":"Storing flammable materials near open flames is NOT a fire safety measure — it is a direct fire hazard. Flammable materials must be stored safely away from ignition sources.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":389,"section":"lecture","text":"Which of the following is NOT a hazard of hand and power tools?","options":["Electrical shocks","Eye injuries","Vibration-related injuries","Low employee performance"],"answer":3,"explanation":"Hazards of hand and power tools include electrical shocks, eye injuries, and vibration-related injuries. Low employee performance is not a physical hazard — it is an administrative concern.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":390,"section":"lecture","text":"Which of the following is NOT a professional ethics resource?","options":["Religion","Custom","Personal preference","Conscience"],"answer":2,"explanation":"The three sources of Professional Ethics are Religion, Custom, and Conscience. Personal preference is not listed — it is subjective and not a formal ethical resource.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":391,"section":"lecture","text":"Which of the following is NOT a valid reason to document sources?","options":["Protecting yourself from accusations of plagiarism","Making the paper look more impressive","Allowing readers to track down the information","Showing awareness of recent developments in the field"],"answer":1,"explanation":"Making the paper look more impressive is NOT a valid reason to document sources. Sources are cited to give credit, enable verification, and protect intellectual property.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":392,"section":"lecture","text":"Which of the following is NOT a way to ensure ethical decision-making in engineering?","options":["Encouraging whistleblowing when safety is at risk","Prioritizing financial gains over ethical concerns","Conducting risk assessments before major decisions","Following professional codes of conduct"],"answer":1,"explanation":"Prioritizing financial gains over ethical concerns is NOT ethical decision-making — it is precisely the kind of thinking that led to the Challenger disaster.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":393,"section":"lecture","text":"Which of the following is NOT an accident prevention method?","options":["Keeping work areas clean","Using PPE","Ignoring minor hazards","Conducting safety training"],"answer":2,"explanation":"Ignoring minor hazards is NOT a prevention method — it is precisely the opposite. Minor hazards can escalate into serious accidents if left unaddressed.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":394,"section":"lecture","text":"Which of the following is NOT considered a confined space hazard?","options":["Oxygen deficiency","Toxic gas buildup","Loud noises","Entrapment risks"],"answer":2,"explanation":"Confined space hazards include oxygen deficiency, toxic gases, and entrapment. Loud noises are a general workplace hazard but not a defining characteristic of confined space hazards.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":395,"section":"lecture","text":"Which of the following is NOT considered plagiarism?","options":["Using another author's words without citation","Quoting a source and including proper citation","Borrowing structure from another paper without credit","Submitting a classmate's work as your own"],"answer":1,"explanation":"Quoting a source and including proper citation is NOT plagiarism — it is the correct academic practice. Plagiarism requires the absence of attribution.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html","ASU113_MCQ_Bank.html"]},{"id":396,"section":"lecture","text":"Which of the following is NOT required in an Emergency Action Plan (EAP)?","options":["Alarm system","Training for employees","A list of employee birthdays","Designated meeting areas"],"answer":2,"explanation":"A list of employee birthdays is NOT required in an EAP. Required elements include alarm systems, employee training, evacuation routes, and designated assembly areas.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":397,"section":"lecture","text":"Which of the following is part of the SQ3R study strategy?","options":["Sketch","Search","Survey","Scan"],"answer":2,"explanation":"Survey is the 'S' in SQ3R (Survey, Question, Read, Recite, Review) — you preview the material before reading to activate prior knowledge and set reading goals.","bloom":"","lecture":"L9","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":398,"section":"lecture","text":"Which of the following is the most essential to life and must be kept clean?","options":["Soil","Water","Air","Food"],"answer":2,"explanation":"Air is the most essential element to life — humans can survive weeks without food, days without water, but only minutes without air. Clean air is therefore a fundamental environmental priority.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":399,"section":"lecture","text":"Which of the following is true for lump sum contracts?","options":["The contractor is paid per unit","Price changes according to quantity","Contractor receives fixed total amount","It is mostly used in BOT projects"],"answer":2,"explanation":"The defining feature of lump sum contracts is that the contractor receives a fixed total amount regardless of actual quantities — quantity risk transfers to the contractor.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":400,"section":"lecture","text":"Which of the following statements is TRUE about the Challenger disaster?","options":["Engineers had no prior knowledge of the potential flaw","The disaster was caused solely by an unpredictable mechanical failure","Some engineers warned NASA about the risks before the launch","The failure was due to a software bug in the autopilot"],"answer":2,"explanation":"Some engineers warned NASA about the O-ring risks before the launch, particularly regarding cold weather performance. Their concerns were overridden by management decisions.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":401,"section":"lecture","text":"Which of these is an example of academic misconduct?","options":["Submitting a paper written by a friend","Conducting original research","Paraphrasing and properly citing a source","Writing an essay based on personal experience"],"answer":0,"explanation":"Submitting a paper written by a friend as your own is academic misconduct — specifically, contract cheating or ghost-writing, a form of plagiarism.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":402,"section":"lecture","text":"Which of these is considered plagiarism even if you cite the source?","options":["Paraphrasing the author's ideas","Using exact words from a source without quotation marks","Summarizing the author's arguments in your own words","Referring to a concept without copying the text"],"answer":1,"explanation":"Using exact words without quotation marks is plagiarism even with a citation — the citation shows the source, but the lack of quotation marks falsely implies the words are your own paraphrase.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":403,"section":"lecture","text":"Which of these statements about plagiarism is FALSE?","options":["Plagiarism can occur unintentionally.","Using a citation exempts you from plagiarism.","Self-plagiarism is a form of academic dishonesty.","Paraphrasing without citation is still plagiarism."],"answer":1,"explanation":"FALSE: Using a citation alone does not exempt you from plagiarism — if you use exact words without quotation marks, or copy structure without proper credit, it is still plagiarism even with a citation.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":404,"section":"lecture","text":"Which Renaissance figure is mentioned in the lecture as a key forerunner of modern engineering?","options":["Galileo Galilei","Isaac Newton","Leonardo da Vinci","Nicolaus Copernicus"],"answer":2,"explanation":"The lecture states that 'the prehistory of modern engineering features ancient master builders and Renaissance engineers such as Leonardo da Vinci .'","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":405,"section":"lecture","text":"Which substance is responsible for ozone depletion?","options":["Carbon monoxide","Sulfur dioxide","Chlorofluorocarbons (CFCs)","Lead"],"answer":2,"explanation":"CFCs (Chlorofluorocarbons) are responsible for ozone depletion — the Montreal Protocol (1987) phased out CFCs, leading to gradual ozone layer recovery.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":406,"section":"lecture","text":"Who bears the loss if work stops due to a sudden accident?","options":["The employer","The party who supplied the destroyed materials","The subcontractor","The consulting engineer"],"answer":1,"explanation":"The loss is borne by the party who supplied the destroyed materials — if the employer supplied materials that were destroyed, the employer bears the loss; if contractor-supplied, the contractor bears it.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":407,"section":"lecture","text":"Who can authorize a direct agreement above standard limits in extreme necessity?","options":["The Minister of Defense","The Prime Minister","The Head of the Authority","The Governor"],"answer":1,"explanation":"In cases of extreme necessity, the Prime Minister can authorize a direct agreement above the standard limits — the highest executive authority for such exceptions.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":408,"section":"lecture","text":"Who decides on tender awards?","options":["A single committee","Two committees (one for opening bids, one for evaluation)","The project owner alone","The Ministry of Finance"],"answer":1,"explanation":"Tender awards involve two committees : one for opening and recording bids (transparency), and a separate committee for technical and financial evaluation (objectivity).","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":409,"section":"lecture","text":"Who is responsible for the subcontractor's work?","options":["The employer","The original contractor","The consulting engineer","The government"],"answer":1,"explanation":"The original contractor is responsible for the subcontractor's work — the contractor cannot escape liability by delegating work to a subcontractor.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":410,"section":"lecture","text":"Why is a construction contract important?","options":["Because it involves high financial value and long duration","Because it is optional in construction projects","Because it only involves subcontractors","Because it eliminates legal disputes automatically"],"answer":0,"explanation":"Construction contracts are important because they involve high financial value and long duration — making clear legal documentation essential for all parties.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":411,"section":"lecture","text":"Why is scheduling important according to the lecture?","options":["It adds more free time by eliminating study hours","It encourages multitasking","It reduces time wasted and prevents cramming","It makes exams easier"],"answer":2,"explanation":"Scheduling is important because it reduces time wasted and prevents cramming — systematic time allocation ensures consistent study and avoids the stress of last-minute preparation.","bloom":"","lecture":"L9","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":412,"section":"lecture","text":"Workers exposed to excessive noise levels must be provided with:","options":["Noise-canceling headphones","Hearing protection","Daily hearing tests","Free medical exams"],"answer":1,"explanation":"OSHA requires that workers exposed to excessive noise levels be provided with hearing protection — such as earplugs or earmuffs — when noise exceeds 90 dB(A) as an 8-hour TWA.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":413,"section":"lecture","text":"\"Recite\" in the SQ3R method means you should:","options":["Memorize all the text","Repeat the information aloud or in your own words","Re-read everything","Write definitions only"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":414,"section":"lecture","text":"[Tricky] A professional engineer's seal on fabrication drawings implies:","options":["A mere formality with no ethical responsibility","A commitment to safety, accuracy, and ethical standards","Delegation of all responsibility","Verification only of aesthetic aspects of the design"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":415,"section":"lecture","text":"[Tricky] An engineer might be tempted to commit plagiarism because:","options":["They are not interested in ethical standards","They aim to enhance collaborative efforts","The subject matter is trivial","They face pressure to produce work quickly and may lack awareness of proper citation methods"],"answer":3,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":416,"section":"lecture","text":"[Tricky] An engineer who knowingly omits safety warnings in documentation is most likely violating which ethical principle?","options":["Objectivity","Transparency","Loyalty","Confidentiality"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":417,"section":"lecture","text":"[Tricky] Arrange the following engineering periods in chronological order: Information Revolution, Industrial Revolution, Pre-scientific Revolution, Second Industrial Revolution.","options":["Information Revolution, Industrial Revolution, Pre-scientific Revolution, Second Industrial Revolution","Industrial Revolution, Pre-scientific Revolution, Second Industrial Revolution, Information Revolution","Second Industrial Revolution, Information Revolution, Pre-scientific Revolution, Industrial Revolution","Pre-scientific Revolution, Industrial Revolution, Second Industrial Revolution, Information Revolution"],"answer":3,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":418,"section":"lecture","text":"[Tricky] Considering issues from \"more than one angle\" in ethical decision making is important because it:","options":["Ensures decisions align solely with company policy","Minimizes potential oversights and enriches the decision-making process","Complicates what should be a straightforward choice","Delays the process unnecessarily"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":419,"section":"lecture","text":"[Tricky] Correct punctuation placement in referencing is critical because it:","options":["Serves only an aesthetic purpose","Eliminates the need for citations","Is intended solely for decorative effects","Ensures that citations do not disrupt the sentence flow and maintain clarity"],"answer":3,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":420,"section":"lecture","text":"[Tricky] First Aid is defined as help given to a person in case of sudden injury or sickness so that:","options":["The condition immediately worsens","The injury does not aggravate further until professional help arrives","The patient is left unattended","Only financial compensation is provided"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":421,"section":"lecture","text":"[Tricky] Health and safety in labs is primarily governed by:","options":["Company financial policies","OSHA's lab standards and the development of a Chemical Hygiene Plan","Personal opinions on lab organization","External marketing campaigns"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":422,"section":"lecture","text":"[Tricky] If an engineer discovers that adverse information has been omitted from a report, the most ethical action is to:","options":["Ignore it if it benefits the project timeline","Immediately notify relevant stakeholders","Document it privately without informing anyone","Assume someone else will address it"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":423,"section":"lecture","text":"[Tricky] If research sources are not properly documented, which ethical principle is most at risk?","options":["Efficiency","Objectivity","Integrity","Profitability"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":424,"section":"lecture","text":"[Tricky] In a First Aid scenario, which priority is most critical?","options":["Checking for signs of shock and blood loss","Immediately transporting the casualty without stabilization","Waiting for a supervisor's approval","Documenting the incident first"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":425,"section":"lecture","text":"[Tricky] In a scenario where adverse information is deliberately withheld, the ethical breach primarily undermines:","options":["Transparency and public safety","Efficiency and cost reduction","Team spirit and innovation","Confidentiality and competitive advantage"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":426,"section":"lecture","text":"[Tricky] In cases where design changes are made without proper calculations, the primary ethical concern is:","options":["Intellectual property rights","Public safety and trust","Aesthetic design integrity","Internal cost efficiency"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":427,"section":"lecture","text":"[Tricky] In engineering ethics, the significance of \"objectivity\" is that it:","options":["Encourages personal bias in decision making","Ensures impartial decisions based on factual analysis","Promotes subjective judgment based on opinions","Eliminates the need for accountability"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":428,"section":"lecture","text":"[Tricky] In ethical decision making, consulting others before finalizing a decision is crucial because it:","options":["Dilutes personal responsibility","Ensures multiple viewpoints are considered, reducing the risk of oversight","Complicates the process unnecessarily","Shifts the blame in case of failure"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":429,"section":"lecture","text":"[Tricky] In situations with conflicting design changes, a key ethical responsibility is to:","options":["Follow orders without questioning","Reassess the design in light of safety standards and consult the Code of Ethics","Prioritize client cost savings over safety","Delegate responsibility to another department"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":430,"section":"lecture","text":"[Tricky] In terms of fall protection, personal fall arrest systems are designed to:","options":["Replace the need for guardrails entirely","Arrest a fall and minimize injury when a fall occurs","Increase the chance of falling","Serve as decorative equipment"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":431,"section":"lecture","text":"[Tricky] In the Challenger case, subordinates could have ethically improved the situation by:","options":["Ignoring management directives entirely","Focusing solely on technical adjustments","Waiting for formal orders before speaking up","Persistently documenting and escalating their safety concerns"],"answer":3,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":432,"section":"lecture","text":"[Tricky] In the Challenger case, the failure to address known design flaws most clearly indicates a lapse in:","options":["Technical innovation","Managerial ethics and responsibility","Research funding allocation","Employee training programs"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":433,"section":"lecture","text":"[Tricky] In the Challenger case, which ethical lapse most exemplifies \"go fever\"?","options":["The decision to use untested technology","Excessive delay in launch procedures","Management's disregard for warnings despite known risks","Overemphasis on cost reduction measures"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":434,"section":"lecture","text":"[Tricky] In the context of the lecture, \"inquiry-based scientific methods\" imply that an engineer should:","options":["Rely on intuition exclusively","Follow traditional trial-and-error without analysis","Use pre-determined formulas without questioning","Employ systematic inquiry into scientific principles to solve problems"],"answer":3,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":435,"section":"lecture","text":"[Tricky] In the Hyatt Regency case, the disputed telephone call is ethically significant because it:","options":["Shows clear evidence of proper communication","Indicates a breakdown in accountability and due diligence","Supports the contractor's claim for design alterations","Proves that all parties acted in good faith"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":436,"section":"lecture","text":"[Tricky] In the Hyatt Regency Hotel Walkways collapse case, altering the original design without proper recalculations primarily demonstrates:","options":["Violation of work discipline","Tampering with results and endangering lives","Excessive consultation with peers","Over-adherence to bureaucratic processes"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":437,"section":"lecture","text":"[Tricky] It is unnecessary to reference common knowledge because:","options":["It is too complex to document","It is widely recognized and does not require documentation","It is never used in academic work","It undermines the research's originality"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":438,"section":"lecture","text":"[Tricky] Overall, integrating ethical decision making in engineering primarily serves to:","options":["Increase the speed of project completion regardless of safety","Balance technical innovation with public safety and well-being","Minimize project costs even if quality is reduced","Allow flexibility in bypassing established protocols"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":439,"section":"lecture","text":"[Tricky] Plagiarism is viewed as stemming from both dishonesty and carelessness because it:","options":["Involves intentionally misrepresenting work as one's own while neglecting proper attribution","Occurs only due to minor citation errors","Is an unintentional byproduct of poor writing skills","Results solely from language barriers"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":440,"section":"lecture","text":"[Tricky] Proper documentation benefits the reader by:","options":["Enabling readers to trace and verify the sources used","Making the text longer and more complex","Limiting access to original data","Obscuring the research methodology"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":441,"section":"lecture","text":"[Tricky] Proper documentation protects against plagiarism accusations by:","options":["Clearly attributing ideas and information to their original sources","Making the research process more secretive","Reducing the need for critical analysis","Encouraging independent thought without collaboration"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":442,"section":"lecture","text":"[Tricky] The emphasis on \"thinking long and hard\" before making a decision in ethical dilemmas is meant to:","options":["Delay project deadlines","Ensure decisions are well-informed and ethically sound","Reduce managerial workload","Conform strictly to previous decisions"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":443,"section":"lecture","text":"[Tricky] The most significant risk of plagiarism for an academic is:","options":["Increased workload","Damage to academic reputation and potential disciplinary action","Reduced opportunities for collaboration","Lowered chances of publication"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":444,"section":"lecture","text":"[Tricky] The overall purpose of health and safety legislations and practices in the workplace is to:","options":["Increase production speed at any cost","Safeguard workers' lives, prevent injuries, and promote a healthful work environment","Focus solely on employee satisfaction surveys","Reduce safety training to save costs"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":445,"section":"lecture","text":"[Tricky] The primary purpose of a professional society's Code of Ethics is to:","options":["Limit innovation by enforcing strict rules","Provide guidelines that support ethical decision making and accountability","Serve as a legal document replacing individual judgment","Focus exclusively on profit-driven strategies"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":446,"section":"lecture","text":"[Tricky] The primary purpose of ethical guidelines in research and engineering is to:","options":["Accelerate project completion","Increase profitability","Safeguard public welfare and maintain professional integrity","Simplify the decision-making process"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":447,"section":"lecture","text":"[Tricky] The relationship between ethical decision making and legal compliance is best described as:","options":["Mutually exclusive, with legal compliance being optional","Complementary, reinforcing safe and transparent practices","Legal compliance replacing the need for ethical considerations","Ethical decision making hindering adherence to legal protocols"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":448,"section":"lecture","text":"[Tricky] The use of a paper writing service differs from academic collaboration in that it:","options":["Involves group brainstorming sessions","Presents someone else's work as your own, which is unethical","Encourages peer-to-peer learning","Is endorsed by most academic institutions"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":449,"section":"lecture","text":"[Tricky] Transportation in First Aid involves which of the following actions?","options":["Moving the casualty without ensuring stabilization","Securing the casualty while minimizing further injury","Delaying transport until full recovery","Ignoring environmental hazards during transport"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":450,"section":"lecture","text":"[Tricky] Using code from a friend without proper citation in a programming assignment is considered:","options":["Collaboration","Fair use","Plagiarism","Open source sharing"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":451,"section":"lecture","text":"[Tricky] What is the primary safety benefit of inspecting all slings and barricading the swing radius of equipment?","options":["To ensure quick loading times","To prevent accidents during material handling","To allow more flexibility in workspace design","To reduce the need for operator training"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":452,"section":"lecture","text":"[Tricky] What is the significance of designing products with low operating and maintenance costs?","options":["It increases the product's aesthetic appeal","It allows for rapid obsolescence","It ensures cost-effectiveness over the product's lifecycle by reducing long-term expenses","It complicates the manufacturing process"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":453,"section":"lecture","text":"[Tricky] What measure could professional societies take to help prevent disasters like the Hyatt Regency collapse?","options":["Reduce the emphasis on design review","Develop more rigorous and enforceable ethical guidelines for design changes","Limit the role of external consultants","Encourage rapid decision-making at the expense of safety"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":454,"section":"lecture","text":"[Tricky] When evaluating a catastrophic failure such as the Hyatt Regency collapse, the most critical factor in determining ethical responsibility is:","options":["Speed of project completion","Adherence to building codes and safety standards by all parties","Level of innovation in the design","Market competitiveness of the contractor"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":455,"section":"lecture","text":"[Tricky] When faced with a design dilemma that could compromise safety, an engineer should:","options":["Delay the project indefinitely","Analyze the issue carefully, consult with colleagues, and consider multiple perspectives","Rely solely on historical design practices","Implement the design without modifications to avoid delays"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":456,"section":"lecture","text":"[Tricky] When faced with unclear instructions in a project document, the most ethical course of action is to:","options":["Proceed based on assumptions to maintain pace","Seek clarification to prevent misinterpretation and potential harm","Delegate the task without verifying the instructions","Ignore the ambiguity and follow previous methods"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":457,"section":"lecture","text":"[Tricky] Which element of the reference page format most ensures clarity and readability?","options":["Using multiple fonts and styles","Random ordering of sources","Including extensive biographical details","Single-spacing individual references with consistent alignment"],"answer":3,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":458,"section":"lecture","text":"[Tricky] Which ethical perspective requires considering both individual rights and the availability of legal remedies through societal institutions?","options":["Utilitarianism","Deontology","Virtue Theory","Social justice and social contract theory"],"answer":3,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":459,"section":"lecture","text":"[Tricky] Which ethical perspective would most likely support policies aimed at maximizing overall societal happiness?","options":["Deontology","Social justice theory","Virtue Theory","Utilitarianism"],"answer":3,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":460,"section":"lecture","text":"[Tricky] Which ethical resource mentioned in the lecture emphasizes the importance of credibility at work?","options":["Religion","Conscience","Custom","Legal mandates"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":461,"section":"lecture","text":"[Tricky] Which hazard is most associated with hand and power tools?","options":["Exposure to loud music","Falling objects, harmful dust, and frayed electrical cords","Inadequate lighting","Excessive paperwork"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":462,"section":"lecture","text":"[Tricky] Which historical period is associated with trial and error, intuitive engineering, and craftsmanship?","options":["Industrial Revolution","Pre-scientific Revolution","Second Industrial Revolution","Information Revolution"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":463,"section":"lecture","text":"[Tricky] Which of the following best describes a comprehensive fire safety plan?","options":["A list of emergency contacts only","Procedures for recognizing hazards, alarm protocols, evacuation, and post-evacuation accountability","Instructions for financial budgeting","A manual solely for fire extinguisher maintenance"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":464,"section":"lecture","text":"[Tricky] Which of the following lists the three historical periods of engineering revolutions discussed in the lecture (excluding the Information Revolution)?","options":["Industrial Revolution, Information Revolution, Second Industrial Revolution","Pre-scientific Revolution, Information Revolution, Industrial Revolution","Pre-scientific Revolution, Industrial Revolution, Second Industrial Revolution","Second Industrial Revolution, Information Revolution, Pre-scientific Revolution"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":465,"section":"lecture","text":"[Tricky] Which of the following resources is NOT mentioned as a source of professional ethical guidance in the lecture?","options":["Religion","Custom","Financial incentive","Conscience"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":466,"section":"lecture","text":"[Tricky] Which scenario best illustrates a conflict between professional ethics and financial incentives?","options":["An engineer follows all safety standards despite higher costs","A contractor alters a design without proper approval to reduce expenses, compromising safety","A company increases transparency in all its communications","A firm enforces confidentiality even when profit is at stake"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":467,"section":"lecture","text":"[Tricky] Which statement best reflects the purpose of record keeping in workplace safety?","options":["It increases administrative workload without benefits","It identifies deficiencies and helps modify controls to improve safety","It is optional if the workplace is small","It solely documents employee attendance"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":468,"section":"lecture","text":"[Tricky] Which statement best summarizes the principle of social justice and social contract theory?","options":["It emphasizes complete government control over individual freedoms","It focuses on fair distribution of goods and balancing rights and duties between individuals and the government","It prioritizes individual success over societal welfare","It disregards legal remedies in favor of informal agreements"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":469,"section":"lecture","text":"A BOT contract typically includes:","options":["Monthly public voting","Employer-supplied labor","Operation phase","No return on investment"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":470,"section":"lecture","text":"A Chemical Hygiene Plan must include all the following EXCEPT:","options":["Designation of a Chemical Hygiene Officer","Exposure control measures","Provisions for financial incentives for lab staff","Staff training on hazard awareness"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":471,"section":"lecture","text":"A company uses the BOT model when:","options":["It wants to rent a facility","It plans to export materials","The government lacks budget allocations","The construction is highly technical"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":472,"section":"lecture","text":"A consequence of excessive aquatic plant and algae growth is:","options":["Reduced biodiversity","Increased turbidity","Blocked sunlight to deeper waters","Lower pH"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 8","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":473,"section":"lecture","text":"A contractor is allowed to propose a new unit price in a unit price contract only when:","options":["The increase is between 5%–10%","The change is due to seasonality","The increase exceeds 25%","The engineer requests a discount"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":474,"section":"lecture","text":"A key element in the code of ethics for engineers is to avoid:","options":["Creative problem solving","Withholding adverse information","Strict adherence to design standards","Professional collaboration"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":475,"section":"lecture","text":"A local tender is used when the contract value does not exceed:","options":["EGP 500,000 and applies nationwide","EGP 200,000 and applies to local suppliers/contractors","EGP 100,000 but only for direct agreements","EGP 50,000 if it includes consultancy"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 6","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":476,"section":"lecture","text":"A primary tool for ethical decision making in engineering is:","options":["Ad hoc decision making","The Code of Ethics published by professional organizations","Ignoring past mistakes","Delegating decisions to management"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":477,"section":"lecture","text":"A safe workplace is achieved through a series of steps including defining the scope, hazard analysis, implementing controls, training, work within controls, and:","options":["Increasing production only","Record keeping and evaluation","Ignoring incident reports","Reducing employee feedback"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":478,"section":"lecture","text":"A safe workplace is established by:","options":["Ignoring potential hazards","Focusing solely on production output","Analyzing hazards and implementing appropriate controls","Relying on employee memory for safety protocols"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":479,"section":"lecture","text":"A strong work ethic in a professional setting is characterized by:","options":["Prioritizing personal leisure over deadlines","Focusing on completing assigned tasks on time","Ignoring company values for individual gains","Overemphasizing appearance without performance"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":480,"section":"lecture","text":"According to Article 1, what are the exceptional methods of contracting other than public tender/practice?","options":["Urgent, national, and constitutional","Open, transparent, and random","Limited tender, local tender, limited practice, direct agreement","Regional selection, reverse auction, closed bidding"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 6","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":481,"section":"lecture","text":"According to Article 23, what happens if a contractor is late in execution?","options":["He may receive an extension with a fine for delay","He can hire a substitute to speed up the work","The contract is instantly voided","The project is renegotiated"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 6","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":482,"section":"lecture","text":"According to Article 647, what flexibility exists regarding who provides materials?","options":["The contractor must always supply the materials","Only employers are legally allowed to provide materials","Either party may provide materials by agreement","A third-party supplier is required"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":483,"section":"lecture","text":"According to Article 650, if work is defective and cannot be repaired:","options":["The employer must accept partial refund","The contractor is given another chance","The contract is terminated without warning","Engineer is made responsible"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":484,"section":"lecture","text":"According to Article 659, what happens when a wage is not stated in the contract?","options":["Court sets the wage","Engineer estimates based on experience","It is based on work value and expenses","Employer decides an arbitrary figure"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":485,"section":"lecture","text":"According to deontological ethics, what factor is paramount in decision making?","options":["Duty and rational action","Maximizing positive outcomes","Personal benefit","Emotional responses"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":486,"section":"lecture","text":"According to social contract theory as discussed in the lecture, the government's duty regarding free expression is to:","options":["Enforce absolute free speech without limits","Censor opinions that may cause dissent","Respect free expression while imposing reasonable limits","Eliminate free expression entirely"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":487,"section":"lecture","text":"According to the lecture, the most effective time to study is:","options":["While commuting","Just before bed","Right after class","During lunch break"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":488,"section":"lecture","text":"According to the National Academy of Engineers' 2020 definition, an engineer is someone who:","options":["Excels at mathematical computations","Applies technology with minimal constraints","Focuses on profitability above all","Understands inquiry-based scientific methods and engineering under constraints and applies them in a technological society"],"answer":3,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":489,"section":"lecture","text":"According to virtue theory, what is primarily valued in an individual's character?","options":["Strict adherence to rules","Virtuous qualities","The ability to maximize outcomes","Compliance with legal norms"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":490,"section":"lecture","text":"Acid rain increases the acidity of rainwater due to:","options":["Agricultural run-off","Industrial and vehicle emissions","Volcanic activity","Natural evaporation"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 8","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":491,"section":"lecture","text":"After bid acceptance, how much must the contractor raise the final insurance to?","options":["5% of estimated cost within 10 days","2% of payment period within 15 days","3% of actual cost within 5 days","1% of profit margin within 7 days"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 6","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":492,"section":"lecture","text":"Among the product characteristics discussed in the lecture, which factor is not emphasized?","options":["Aesthetics","Adequate performance","Cost efficiency","Low operating and maintenance cost"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":493,"section":"lecture","text":"An engineering discipline that integrates biological principles into technology (e.g., Bioengineering) would be categorized as:","options":["A traditional major","A branch of computer science","A non-traditional engineering major","A subset of mechanical engineering"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":494,"section":"lecture","text":"An essential formatting guideline for a reference page is to:","options":["List sources randomly","List sources in numerical order with proper spacing","Use the same format as the in-text citations","Exclude author initials"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":495,"section":"lecture","text":"An ethical question raised in the Challenger case study is:","options":["How to improve fuel efficiency","What could NASA management have done differently?","Which contractor should be replaced","How to increase shuttle speed"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":496,"section":"lecture","text":"An example of plagiarism is:","options":["Citing a well-known fact","Quoting with proper attribution","Using another writer's ideas without proper citation","Collaborating with a colleague with permission"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":497,"section":"lecture","text":"Analyzing workplace hazards involves reviewing:","options":["Financial statements only","Records, incidents, screening surveys, and existing controls","Only the latest technological advances","Employee vacation requests"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":498,"section":"lecture","text":"Answering all questions on a test is advised because:","options":["It makes the exam longer","You may earn partial credit","It impresses the instructor","It guarantees full marks"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":499,"section":"lecture","text":"Article 649 obligates the contractor to do what if the employer provides materials?","options":["Use the material freely without reporting","Replace the material if used incorrectly","Track material use and return excess","Inform only the engineer about the usage"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":500,"section":"lecture","text":"Article 657: Failure to notify employer of a needed increase in unit price results in:","options":["Wage doubling","Project delay","Loss of contractor's claim","Employer's compensation"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":501,"section":"lecture","text":"Article 662 allows the subcontractor to claim wages from the employer:","options":["Regardless of what was agreed with the main contractor","Only after court approval","Up to the amount owed to the original contractor","If the employer confirms the job is complete"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":502,"section":"lecture","text":"Article 665: If the contractor makes a mistake causing total work loss, what must he do?","options":["Pay only for material","Pay for both material and lost work","Start the work again","Nothing"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":503,"section":"lecture","text":"Borrowing the structure of another author's sentences without credit is an example of:","options":["Plagiarism","Collaboration","Paraphrasing","Summarization"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":504,"section":"lecture","text":"BOT contracts are rarely used unless:","options":["There's strong political stability","A local labor union is involved","Private capital is needed","The project is a public school"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":505,"section":"lecture","text":"Cost plus contracts are considered high-risk for the employer because:","options":["They always include penalty clauses","Total cost is unknown in advance","They require bank guarantees","They involve too many subcontractors"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":506,"section":"lecture","text":"Cranes and motor vehicles in the workplace pose hazards such as:","options":["Excessive paper usage","Tip-overs, collisions, and material handling risks","Overstaffing","Too many safety meetings"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":507,"section":"lecture","text":"Creating a weekly master plan and a semester calendar helps students:","options":["Memorize facts","Minimize planning","Organize their workload","Increase distractions"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":508,"section":"lecture","text":"Daydreaming and laziness are best countered by:","options":["Coffee","Tight deadlines","Following a structured study plan","Background TV"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":509,"section":"lecture","text":"Deck-mounted and side-mounted brackets are used to secure:","options":["Office furniture","Guardrails and warning lines on elevated platforms","Personal computers","Marketing displays"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":510,"section":"lecture","text":"Developing and implementing controls in a workplace means:","options":["Ignoring minor hazards","Establishing safety measures and training programs","Focusing on aesthetics","Reducing employee training sessions"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":511,"section":"lecture","text":"Developing professional ethics can be fostered by:","options":["Consistently arriving late to appointments","Cultivating self-discipline and using time wisely","Avoiding professional development opportunities","Rejecting balanced life principles"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":512,"section":"lecture","text":"Direct costs of accidents typically include:","options":["Lost time and fines","Cancelled contracts only","Investigation time","Public relations expenses"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":513,"section":"lecture","text":"Documenting sources helps protect:","options":["Only the researcher","Both the original creator and the researcher","Only the institution","Only published data"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":514,"section":"lecture","text":"Documenting sources is important because it:","options":["Reduces the length of the paper","Increases the complexity of research","Serves as a distraction from the main content","Enables readers to verify information and track down original sources"],"answer":3,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":515,"section":"lecture","text":"Documenting sources primarily serves to:","options":["Increase the length of a paper","Complicate the research process","Allow others to plagiarize","Protect the originator and the researcher"],"answer":3,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":516,"section":"lecture","text":"During the Industrial Revolution, engineers underwent a major role change by:","options":["Shifting from practical artists to scientific professionals","Focusing solely on manual craftsmanship","Avoiding the use of scientific methods","Specializing only in construction"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":517,"section":"lecture","text":"Employee fire safety training should cover:","options":["How to ignore fire alarms","Recognizing fire hazards, alarm procedures, and evacuation protocols","Only the use of smartphones","Office party planning"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":518,"section":"lecture","text":"Engineering ethics primarily examines:","options":["Profitability metrics for engineering firms","Engineers' obligations to the public, clients, and employers","Historical design trends in engineering","Marketing strategies for engineering products"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":519,"section":"lecture","text":"Engineers who adhere to ethical codes are expected to:","options":["Ignore client safety in favor of cost savings","Abide by a set of standards endorsed by professional societies","Prioritize independent judgment over standardized protocols","Focus exclusively on research outcomes"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":520,"section":"lecture","text":"Ethical decision-making tools assist engineers in catastrophic failure cases by:","options":["Eliminating the need for thorough analysis","Providing a framework for assessing responsibilities and outcomes","Guaranteeing that no errors will occur","Shifting responsibility entirely to the contractor"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":521,"section":"lecture","text":"Ethics is best defined as:","options":["A set of religious doctrines","A system of moral principles that affect decision making","A collection of legal rules","A framework for business strategy"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":522,"section":"lecture","text":"Exposure to hazardous chemicals in labs can result in:","options":["Only acute health effects","Both acute and chronic health effects","Minimal health risks","Only chronic health effects"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":523,"section":"lecture","text":"Fall protection from heights may involve the use of:","options":["Safety nets and personal fall arrest systems","Increased work speed","Lowering production targets","Financial incentives only"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":524,"section":"lecture","text":"FIDIC contracts aim to:","options":["Limit international contractor participation","Standardize construction contract clauses","Replace national contract laws","Apply only to domestic engineers"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":525,"section":"lecture","text":"FIDIC forms are primarily used in:","options":["Domestic agricultural projects","Joint ventures with foreign companies","Projects with only labor-based work","Volunteer-based reconstruction"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":526,"section":"lecture","text":"Fire safety plans must include procedures for:","options":["Recognizing hazards, notifying emergency services, evacuation, and accounting for all employees","Ignoring minor fires","Only training management","Reducing the number of fire extinguishers"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":527,"section":"lecture","text":"Fire safety protection includes the use of:","options":["Fixed and portable fire extinguishers","Only fixed extinguishers","Smoke detectors without any extinguishers","None of the above"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":528,"section":"lecture","text":"Fixed and portable fire extinguishers are examples of:","options":["Personal protective equipment only","Fire safety protection measures","Unrelated to safety planning","Equipment used solely for training exercises"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":529,"section":"lecture","text":"For how long are the engineer and contractor jointly liable for facility defects under Article 651?","options":["15 years from signing","5 years from approval","10 years from delivery","3 years from installation"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":530,"section":"lecture","text":"Good posture during a lecture signals that you are:","options":["Taking attendance","Anxious","Alert and interested","Distracted"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":531,"section":"lecture","text":"Groundwater is especially important in rural areas for:","options":["Mining","Transportation","Drinking water","Sanitation systems"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 8","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":532,"section":"lecture","text":"How can a contractor be reinstated in the suppliers register after deletion?","options":["After 2 years of clean work record","By completing a rehabilitation course","By proving innocence or having the case closed","Through a vote by fellow contractors"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 6","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":533,"section":"lecture","text":"How does \"Practice\" differ from \"Tender\"?","options":["It disallows price competition","It restricts the number of applicants","It allows real-time competition to lower the price","It includes only foreign bidders"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 6","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":534,"section":"lecture","text":"How does the lecture define \"ethics\"?","options":["A system of moral principles","A set of personal preferences","Arbitrary social customs","A collection of legal statutes"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 1"
