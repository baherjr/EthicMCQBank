,"source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":535,"section":"lecture","text":"How does the lecture differentiate between ethics and morals regarding their source?","options":["Morals are imposed by society, whereas ethics are innate","Both are imposed by external authorities","Ethics are imposed by external sources while morals stem from personal beliefs","There is no difference in their origins"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":536,"section":"lecture","text":"How is compensation affected if the work stops for reasons beyond anyone's control?","options":["Contractor is partially paid","Contract is suspended","Employer owes nothing","Work must restart in 3 months"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":537,"section":"lecture","text":"How long does the employer have to file a guarantee claim after a building collapse?","options":["6 months","2 years","3 years","1 year"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":538,"section":"lecture","text":"If a contractor obtains a contract through bribery, what occurs under Article 24?","options":["The contract is paused and a warning issued","A monetary fine is added to the final insurance","The contract is terminated automatically","The contractor is suspended temporarily"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 6","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":539,"section":"lecture","text":"If a sudden accident stops work, and the employer provided materials, who bears the loss?","options":["Contractor always","The party who supplied the materials","Government","Shared between both parties"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":540,"section":"lecture","text":"If an engineer's design is not used, what does Article 660 say he is entitled to?","options":["Full contract value","No payment at all","Payment based on time and job nature","Compensation only for printing costs"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":541,"section":"lecture","text":"If contractor error causes loss of employer-provided materials, what is required?","options":["Employer replaces the material","Contractor gets a warning","Contractor compensates employer","Employer sues subcontractor"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":542,"section":"lecture","text":"If final insurance is not required, what must have occurred?","options":["Engineer objected","Project terminated early","All items were supplied and accepted within the final insurance deadline","The tender had fewer than 3 bids"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 6","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":543,"section":"lecture","text":"If the contractor has no remaining dues, how can the administrative authority recover losses?","options":["File a criminal complaint","Send the contractor a promissory note","Deduct from contractor's dues with another authority","Request an extension of liability"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 6","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":544,"section":"lecture","text":"If the contractor's work is defective but repairable, what can happen?","options":["The contract must be canceled","Contractor is dismissed immediately","Contractor is allowed time to repair","Engineer redoes the work"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":545,"section":"lecture","text":"If the employer refuses to receive completed work without valid reason after being officially warned, what does the law consider?","options":["That the employer is penalized","That the contractor must stop the work","That the work is officially delivered","That the engineer reassesses the site"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":546,"section":"lecture","text":"If the ozone layer continues to deplete, which consequence is most likely?","options":["UV shielding will increase","Skin cancer rates will rise","Global cooling","Fewer greenhouse gases"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 8","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":547,"section":"lecture","text":"If you finish your exam early, you should:","options":["Sleep","Leave immediately","Review your answers","Distract others"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":548,"section":"lecture","text":"Improperly disposed waste can lead to:","options":["Energy conservation","Environmental degradation","Food production","Soil enrichment"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 8","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":549,"section":"lecture","text":"In a cost plus contract, which of the following is NOT commonly included?","options":["Fixed fee plus bonus","Profit margin based on performance","Lump sum payment at start","Variable profit based on savings"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":550,"section":"lecture","text":"In a lump sum contract, the contractor agrees on the total payment:","options":["After half the project is completed","Once site :1,"explanation":"","bloom":"","lecture":"Lecture 6","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":556,"section":"lecture","text":"In case the employer's mistake causes material loss:","options":["Contractor is punished","Contractor is rewarded","Employer bears loss and compensates contractor","The contract is rewritten"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":557,"section":"lecture","text":"In cost plus contracts, profit may be based on:","options":["Project duration only","Market share","A fixed amount or percentage of cost","Labor hours only"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":558,"section":"lecture","text":"In legal ethics, the term \"legal ethic\" refers to:","options":["The technical skills required for legal research","The norms and morals governing judges and lawyers","The business strategies of law firms","The informal habits of courtroom behavior"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":559,"section":"lecture","text":"In professional settings, \"transparency\" implies:","options":["Hiding errors to maintain a flawless image","Open communication about decisions and processes","Limiting information to only upper management","Withholding details to protect personal interests"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":560,"section":"lecture","text":"In referencing, semicolons are used to:","options":["End a reference entry","Combine multiple pages of the same source","Separate different sources within the same citation","Indicate a pause in the text"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":561,"section":"lecture","text":"In the BOT model, what happens after the company recovers its investment and profits?","options":["The project is auctioned","The project is privatized","The government takes ownership","The contract renews automatically"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":562,"section":"lecture","text":"In the Challenger case, subordinates are ethically challenged to:","options":["Focus solely on following orders","Prioritize technical details over safety","Delay reporting issues until the next meeting","Balance loyalty to management with protecting public welfare"],"answer":3,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":563,"section":"lecture","text":"In the context of engineering ethics, using a professional Code of Ethics helps to:","options":["Justify decisions when they might be ethically questionable","Reduce the need for personal judgment","Bypass legal responsibilities","Ensure that only profitable decisions are made"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":564,"section":"lecture","text":"In the context of SQ3R, \"Review\" refers to:","options":["Reading only bold words","Creating new material","Checking your understanding of the material","Watching videos"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":565,"section":"lecture","text":"In the event of a reservation on payment, who gets priority to receive wages?","options":["Original contractor","Employer's consultant","Subcontractor's workers","Engineer"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":566,"section":"lecture","text":"In the SQ3R method, \"Q\" stands for:","options":["Quote","Queue","Question","Quick-scan"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":567,"section":"lecture","text":"In unit price contracts, what can the employer do if the cost increase is too high?","options":["Terminate the project entirely","Hire the same contractor for another job","Suspend the work and pay only for completed portions","Reduce the contractor's wage retroactively"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 5","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":568,"section":"lecture","text":"In what case can the Prime Minister authorize a direct agreement beyond the usual limit?","options":["When contractor is unavailable","In cases of extreme necessity","If engineer resigns","For charity or nonprofit projects"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 6","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":569,"section":"lecture","text":"In what scenario is final insurance NOT required from the accepted bidder?","options":["If the bidder is a government agency","If the final price is under EGP 50,000","If the bidder completes all supplies and the authority accepts them in time","If the technical offer was accepted without a financial one"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 6","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":570,"section":"lecture","text":"In which publication is the deletion decision of a bribing contractor announced?","options":["The contractor's website","Government Services Authority's official bulletin","Ministry of Finance's private registry","State television's legal segment"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 6","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":571,"section":"lecture","text":"In ":["ASU113_MCQ_Bank.html"]},{"id":577,"section":"lecture","text":"NASA managers had been aware of the booster design flaw since:","options":["1980","1983","1977","1979"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":578,"section":"lecture","text":"One consequence of writing unclear instructions in engineering documentation is:","options":["Improved team collaboration","Misinterpretation that can lead to errors","Increased efficiency in problem solving","Enhanced safety protocols"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":579,"section":"lecture","text":"One of the first steps in achieving workplace safety is to:","options":["Purchase the latest machinery","Define the scope of work and tasks","Hire more staff","Increase production quotas"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":580,"section":"lecture","text":"One way to reduce anxiety before a test is to:","options":["Sleep during the exam","Guess randomly","Practice relaxation","Avoid eye contact"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":581,"section":"lecture","text":"OSHA formally came into being on:","options":["January 28, 1986","December 29, 1970","April 28, 1971","July 4, 1976"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":582,"section":"lecture","text":"OSHA's lab standards require that schools:","options":["Ignore exposure levels to hazardous chemicals","Determine staff exposure, conduct training, and develop a Chemical Hygiene Plan","Only focus on lab aesthetics","Provide unlimited lab hours without safety checks"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":583,"section":"lecture","text":"OSHA's primary mission is to:","options":["Promote industrial innovation","Save lives, prevent injuries, and protect workers' health","Enhance company profits","Increase employment opportunities"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":584,"section":"lecture","text":"OSHA's top cited hazards in 2022 include standards related to fall protection, respiratory protection, and:","options":["Internet usage","Hazard communication and machine guarding","Employee entertainment","Office design"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":585,"section":"lecture","text":"Performing work within controls requires that:","options":["Employees work without any supervision","Activities are done under enforced safety restrictions","Safety protocols are optional","Work continues even if controls are absent"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":586,"section":"lecture","text":"Plagiarism is best defined as:","options":["Using someone else's work without giving proper credit","Paraphrasing content with citations","Collaborating with peers on research","Presenting common knowledge without a reference"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":587,"section":"lecture","text":"Practicing professional ethics involves:","options":["Acting with high ethical standards and without bias","Ignoring confidentiality to speed up decisions","Prioritizing personal interest over legal compliance","Relying solely on intuition rather than codes"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":588,"section":"lecture","text":"Prevention measures for cranes and motor vehicles include:","options":["Wearing high-visibility clothing and proper seatbelt use","Increasing vehicle speeds","Skipping maintenance checks","Relying on outdated equipment"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":589,"section":"lecture","text":"Professional ethics governs the behavior of a person or group primarily in a:","options":["Personal setting","Political arena","Business environment","Academic institution"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":590,"section":"lecture","text":"Proper loading of equipment is essential to:","options":["Enhance vehicle speed","Prevent collisions and tip-overs","Increase fuel consumption","Decrease work efficiency"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":591,"section":"lecture","text":"Proper referencing protects the originator by:","options":["Hiding the original work","Giving credit to the original creator","Eliminating the need for citations","Preventing others from reading the original work"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":592,"section":"lecture","text":"Punctuation in reference citations should be handled by:","options":["Placing the reference number at the beginning of the sentence","Inserting numbers without any spaces","Leaving a space before the bracket and attaching punctuation after the closing bracket","Using parentheses instead of brackets"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":593,"s eign exchange rates"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":621,"section":"lecture","text":"The white book in FIDIC contracts regulates the relationship between:","options":["Contractor and supplier","Subcontractor and engineer","Employer and consulting engineer","Contractor and subcontractor"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":622,"section":"lecture","text":"To avoid plagiarism, one must:","options":["Rely solely on common knowledge","Use uncredited ideas from peers","Avoid using external sources","Fully document information from all sources"],"answer":3,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":623,"section":"lecture","text":"To avoid plagiarism, researchers should:","options":["Only use their own ideas","Document all sources of information","Rely on memory for references","Exclude citation for diagrams"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 3","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":624,"section":"lecture","text":"To make test-taking smoother, it's important to:","options":["Skip difficult questions","Avoid rereading questions","Read all directions first","Guess first"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":625,"section":"lecture","text":"To protect against tool-related injuries, one should:","options":["Use tools without a manual","Inspect tools before use and utilize proper PPE and guards","Rely solely on intuition","Skip routine maintenance"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 4","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":626,"section":"lecture","text":"To refer to a specific part of ":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":773,"section":"lecture","text":"Which perspective is primarily concerned with distributive justice and ensuring fair allocation of goods?","options":["Social justice and social contract theory","Utilitarianism","Deontology","Virtue Theory"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":774,"section":"lecture","text":"Which regulatory region is briefly mentioned in the lecture in relation to pollution?","options":["African Union","European Economic Community","NATO","Gulf Cooperation Council"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 8","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":775,"section":"lecture","text":"Which responsibility of engineers is most directly connected to environmental concerns?","options":["Environmental concerns","Safety of the public","Cost efficiency","Durability"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":776,"section":"lecture","text":"Which revolution is characterized by the transition from muscle power to steam engines?","options":["Information Revolution","Second Industrial Revolution","Industrial Revolution","Pre-scientific Revolution"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":777,"section":"lecture","text":"Which revolution is marked by the emergence of microelectronics, telecommunications, and computer engineering?","options":["Information Revolution","Industrial Revolution","Second Industrial Revolution","Pre-scientific Revolution"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":778,"section":"lecture","text":"Which revolution saw the emergence of chemical, electrical, and other science-based engineering branches?","options":["Information Revolution","Second Industrial Revolution","Pre-scientific Revolution","Industrial Revolution"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 1","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":779,"section":"lecture","text":"Which role do educators play in combating pollution?","options":["Building cleaner factories","Enforcing environmental law","Teaching environmental responsibility early","Monitoring groundwater"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 8","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":780,"section":"lecture","text":"Which scenario would most likely require an Environmental Impact Statement?","options":["Publicly funded infrastructure expansion","Home renovation","School field trip","Community gardening"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 8","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":781,"section":"lecture","text":"Which stage is considered the secondary cause of pollution?","options":["Distribution","Consumption","Extraction","Packaging"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 8","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":782,"section":"lecture","text":"Which statement correctly connects smog, acid rain, and ozone depletion?","options":["All involve CFCs","All come from human emissions","All are unrelated to emissions","Only smog causes disease"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 8","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":783,"section":"lecture","text":"Which statement is TRUE about production and consumption's role in pollution?","options":["Production contributes most to pollution","Neither causes pollution directly","Only consumption affects pollution","Consumption has no environmental effect"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 8","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":784,"section":"lecture","text":"Which statement is true regarding how to develop a strong work ethic?","options":["It only requires dressing professionally","It involves cultivating punctuality, self-discipline, and balance","It is solely about meeting quotas regardless of quality","It depends only on technical skills rather than attitude"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":785,"section":"lecture","text":"Which study habit directly combats the forgetting curve?","options":["Passive reading","Delayed studying","Scheduled reviews","Skipping classes"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":786,"section":"lecture","text":"Which test-taking tip helps you manage time best?","options":["Skip instructions","Ignore the clock","Budget your time wisely","Rush through hard questions"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":787,"section":"lecture","text":"Which type of contract allows profit sharing on cost savings?","options":["Unit price","Cost plus","Lump sum","BOT"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":788,"section":"lecture","text":"Which type of contract transfers ownership to the government after operation?","options":["FIDIC white book","Lump sum","Cost plus","BOT"],"answer":3,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":789,"section":"lecture","text":"Which type of radiation does the ozone layer protect the Earth from?","options":["X-rays","Gamma rays","Ultraviolet","Infrared"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 8","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":790,"section":"lecture","text":"Which unethical practice can directly compromise public safety?","options":["Omitting safety warnings","Using well-documented methods","Following standard operating procedures","Consulting with peers before finalizing designs"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 2","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":791,"section":"lecture","text":"Who has the authority to cancel a tender?","options":["Minister of Finance only","The engineer in charge","The competent authority through a reasoned decision","Any member of the evaluation committee"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 6","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":792,"section":"lecture","text":"Who is responsible for deciding tenders and opening envelopes as per Article 11?","options":["One engineer and one accountant","One committee only","Two separate committees, unless bid ≤ EGP 50,000","The same contractor involved"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 6","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":793,"section":"lecture","text":"Why do industries often move to developing countries according to the lecture?","options":["Cheaper water resources","Abundant wind energy","Looser environmental laws","High literacy rates"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 8","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":794,"section":"lecture","text":"Why does connecting learning to goals improve studying?","options":["Makes you finish faster","Promotes short-term focus","Encourages deeper motivation","Helps avoid difficult topics"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":795,"section":"lecture","text":"Why is acid rain more dangerous than regular rain?","options":["Contains chemical pollutants","Evaporates faster","Promotes vegetation","Comes from freshwater clouds"],"answer":0,"explanation":"","bloom":"","lecture":"Lecture 8","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":796,"section":"lecture","text":"Why is indoor air pollution a critical health concern?","options":["Outdoor air is naturally cleaner","People spend most of their lives indoors","Buildings are airtight","Air conditioning causes contamination"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 8","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":797,"section":"lecture","text":"Why is it important to read test directions carefully?","options":["They are usually wrong","They waste time","They explain grading policies","They guide how to respond accurately"],"answer":3,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":798,"section":"lecture","text":"Why is it important to turn off your phone before class?","options":["It boosts battery life","It prevents external distractions","It helps pass time faster","It syncs notes"],"answer":1,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":799,"section":"lecture","text":"Why is reviewing material after class especially effective?","options":["It's optional","It prevents overlearning","Memory retention is highest","The brain is tired then"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":800,"section":"lecture","text":"Why is SQ3R considered effective for studying?","options":["It shortens textbooks","It uses highlighters","It promotes deeper engagement","It removes the need for class"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":801,"section":"lecture","text":"Why is time scheduling essential in studying?","options":["Reduces fatigue","Avoids social obligations","Helps manage tasks effectively","Shortens lectures"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":802,"section":"lecture","text":"Why might a government choose a BOT model for a bridge project?","options":["To allow design flexibility","To avoid hiring civil engineers","Due to insufficient funding","Because it's faster to execute"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":803,"section":"lecture","text":"Why might unit price contracts be favored in projects with variable quantities?","options":["They reduce documentation","They fix final cost early","They allow adjustments per unit","They shift risk to suppliers"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 7","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":804,"section":"lecture","text":"Why should distractions like side talks be ignored during lectures?","options":["To look respectful","To avoid peer judgment","To focus on the main speaker","To impress the instructor"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":805,"section":"lecture","text":"Why should you arrive early for a test?","options":["To socialize","To nap","To settle and prepare calmly","To change seating"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":806,"section":"lecture","text":"Why should you begin preparing for exams a week in advance?","options":["To show off","To cram faster","To reduce stress and improve retention","To avoid reviewing"],"answer":2,"explanation":"","bloom":"","lecture":"Lecture 9","source":"ASU113_MCQ_Bank.html","sources":["ASU113_MCQ_Bank.html"]},{"id":807,"section":"lecture","text":"A city funds a costly water treatment plant benefiting 300,000 residents through taxes also paid by 500 residents who already have private wells. Which ethical perspective most directly justifies this decision?","options":["Virtue Theory — because it reflects a generous and just character in the decision-makers","Deontology — because it fulfills the government's duty to serve the public","Utilitarianism — because it maximizes the greatest good for the greatest number","Social Contract Theory — because it protects every individual's equal rights equally"],"answer":2,"explanation":"Correct: C. Utilitarianism focuses on results — specifically, the greatest good for the greatest number. Benefiting 300,000 at a cost to 500 is a classic utilitarian trade-off. The lecture notes Utilitarianism was originally designed for legislators making exactly such societal decisions.","bloom":"Apply","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":808,"section":"lecture","text":"A job applicant is tempted to falsify credentials on a resume because they are confident they would perform excellently once hired. Which ethical theory from the lecture would most strongly prohibit this action, regardless of the likely good outcome?","options":["Utilitarianism","Virtue Theory","Social Contract Theory","Deontology"],"answer":3,"explanation":"Correct: D. The lecture uses this exact resume scenario to illustrate Deontology. Deontology requires putting duty first — the duty not to deceive — regardless of how good the outcome might be. Even if the deception leads to excellent job performance, the deontological prohibition on lying applies absolutely.","bloom":"Apply","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":809,"section":"lecture","text":"According to the lecture, what do engineers provide that makes them responsible for the development of civilizations?","options":["Financial capital, technical patents, and government contracts","Infrastructure, communication to link people, and products to make life easier and more enjoyable","Laws, regulations, and ethical codes for the profession","Scientific research, university education, and safety inspections"],"answer":1,"explanation":"Correct: B. Under 'Value of Engineering Profession,' the lecture states engineers provide: infrastructure, communication to link people, and products to make our lives easier and more enjoyable — making them central to civilizational development.","bloom":"Remember","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":810,"section":"lecture","text":"According to the lecture, what is ethics fundamentally concerned with?","options":["Maximizing corporate profit while minimizing legal exposure","What is good for individuals and society, involving standards of conduct and moral judgment","Codifying government regulations into enforceable professional standards","Ensuring engineers comply with technical codes and safety inspections"],"answer":1,"explanation":"Correct: B. The lecture defines ethics as 'a system of moral principles' and 'the study of standards of conduct and moral judgment,' concluding that 'ethics is concerned with what is good for individuals and society.'","bloom":"Understand","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":811,"section":"lecture","text":"According to the lecture, what role do codes and standards play in the legal framework of the engineering profession?","options":["They serve as optional guidelines that engineers may choose to follow","They set minimum requirements to ensure public safety and adequate performance","They are primarily designed to protect engineers from personal legal liability","They define maximum performance limits to prevent over-engineering"],"answer":1,"explanation":"Correct: B. The lecture states that 'codes and standards set minimum requirements to ensure public safety and adequate performance.' They form the legal floor of acceptable engineering practice — not a ceiling or optional reference.","bloom":"Understand","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":812,"section":"lecture","text":"An engineer deliberately skips required safety inspections on a bridge to meet a client's deadline. Which of the engineer's core responsibilities has been most directly violated?","options":["Cost-efficiency of the product","Safety of the public","Longevity and durability of the structure","Abiding by the client's contractual preferences"],"answer":1,"explanation":"Correct: B. Safety of the Public is listed as the first engineer responsibility in the lecture. Skipping safety inspections to meet a deadline directly endangers the public — a clear and immediate violation of this primary duty, regardless of schedule or contractual pressure.","bloom":"Apply","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":813,"section":"lecture","text":"An engineering firm builds a bridge that meets performance targets but fails structurally within 8 years due to deliberately cheap materials. Which product characteristic listed under engineer responsibilities was most neglected?","options":["Adequate performance","Cost-efficiency","Longevity/durability","Low operating and maintenance cost"],"answer":2,"explanation":"Correct: C. The lecture lists four required product characteristics under Responsibility #5: adequate performance, cost-efficiency, low operating/maintenance cost, and longevity/durability. A bridge failing in 8 years due to cheap materials is a direct failure of longevity/durability — even if initial performance and cost-efficiency targets were met.","bloom":"Apply","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":814,"section":"lecture","text":"How many core engineer responsibilities are listed in Lecture 1?","options":["Three","Four","Five","Six"],"answer":2,"explanation":"Correct: C. The lecture lists five responsibilities: (1) Safety of the public, (2) Welfare of the society, (3) Environmental concerns, (4) Abide by laws/regulations/standards/ethical code, and (5) Produce products with adequate performance, cost-efficiency, low maintenance cost, and longevity.","bloom":"Remember","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":815,"section":"lecture","text":"The lecture states: 'Your right in legal terms is only as good as your society's willingness to provide legal remedies through the courts and political institutions of society.' What does this reveal about the nature of legal rights?","options":["Rights exist independently of any institution and can never be revoked by government","Rights are only meaningful when backed by enforceable legal and political institutions","Rights are absolute and always override government authority in all circumstances","Rights exist exclusively between individuals and have no relationship to government structures"],"answer":1,"explanation":"Correct: B. This statement reveals that rights are not self-executing — they depend entirely on courts and political institutions for enforcement. A right without a legal remedy is practically worthless, demonstrating that legal rights are institutionally dependent, not inherent or absolute. This is the core insight of Social Contract Theory as presented in the lecture.","bloom":"Analyze","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":816,"section":"lecture","text":"What are the four major phases of the History of Engineering presented in Lecture 1?","options":["Ancient, Medieval, Modern, Contemporary","Craftsmanship, Mechanization, Electrification, Digitalization","Pre-Scientific Revolution, Industrial Revolution, Second Industrial Revolution, Information Revolution","Trial-and-Error, Scientific Method, Mass Production, Computerization"],"answer":2,"explanation":"Correct: C. The lecture outlines exactly four phases: Pre-Scientific Revolution → Industrial Revolution → Second Industrial Revolution → Information Revolution, tracing engineering from intuitive craft to digital intelligence.","bloom":"Remember","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":817,"section":"lecture","text":"What best characterizes the engineering approach during the Pre-Scientific Revolution period?","options":["Trial and error combined with imagination by practical artists and craftsmen","Rigorous scientific methodology guided by peer-reviewed research","Steam-powered machinery replacing artisan workers","Formal engineering schools training civil and mechanical engineers"],"answer":0,"explanation":"Correct: A. The lecture describes Pre-Scientific Revolution engineers as 'practical artists and craftsmen' who 'proceeded mainly by trial and error,' yet whose 'tinkering combined with imagination produced many marvelous devices and monuments.'","bloom":"Understand","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":818,"section":"lecture","text":"What does Deontology require of a person when making ethical decisions, according to the lecture?","options":["Calculate which action produces the most beneficial results for the majority","Distribute goods fairly among members of society according to need","Put duty first, act rationally, and respect the inherent equality of all human beings","Cultivate virtuous character qualities rather than following fixed rules"],"answer":2,"explanation":"Correct: C. The lecture defines Deontology as requiring 'that we put duty first, act rationally, and give moral weight to the inherent equality of all human beings' — regardless of the outcomes the action might produce.","bloom":"Understand","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":819,"section":"lecture","text":"What does the Information Revolution primarily involve, according to Lecture 1?","options":["Steam-powered machines replacing physical muscle labor","Development of electricity, cars, and large-scale mass production","Microelectronics, telecommunications, and computers alleviating intellectual chores","Chemical and electrical engineering enabling the automobile and aviation industries"],"answer":2,"explanation":"Correct: C. The lecture defines the Information Revolution as microelectronics, telecommunications, and computer engineering joining forces so that 'intellectual chores are increasingly alleviated by machines' — a shift from physical to cognitive task automation.","bloom":"Understand","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":820,"section":"lecture","text":"What is the central concern of Social Justice theorists regarding 'distributive justice,' as described in the lecture?","options":["Ensuring the most productive members receive the greatest economic rewards","Distributing goods fairly according to members' needs, requiring a governing power to decide","Allowing free markets to naturally determine the fairest distribution of resources","Giving goods exclusively to those who pay the highest taxes"],"answer":1,"explanation":"Correct: B. Social justice theorists focus on the fair distribution of goods according to people's needs. The lecture specifies this would 'require a governing power to decide who gets what and when' — highlighting the institutional complexity involved.","bloom":"Understand","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":821,"section":"lecture","text":"What is the key distinction between Ethics and Morals as defined in Lecture 1?","options":["Ethics are personal principles; morals are externally imposed rules","Ethics apply only to professionals; morals apply to ordinary citizens","Ethics come from external sources (codes of conduct, religions); morals are an individual's own principles","Ethics are written laws; morals are unwritten traditions"],"answer":2,"explanation":"Correct: C. The lecture clearly distinguishes the two: Ethics are rules provided by an external source such as workplace codes or religious principles, while Morals refer to an individual's own internal principles about right and wrong.","bloom":"Understand","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":822,"section":"lecture","text":"What is the Latin root of the word 'Engineer' and what does it mean?","options":["Enginera — to build structures of stone","Ingeniator — ingenious, to devise in the sense of construct or craftsmanship","Ingenium — natural talent of the mind only","Enginium — to operate mechanical devices"],"answer":1,"explanation":"Correct: B. The word 'Engineer' derives from the Latin Ingeniator , meaning ingenious — to devise in the sense of construct or craftsmanship. This root captures the original blend of creativity and practical skill-making that defines engineering.","bloom":"Remember","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":823,"section":"lecture","text":"What primarily drove the Second Industrial Revolution, according to Lecture 1?","options":["Microelectronics, telecommunications, and computer engineering","Trial-and-error craftsmanship and Renaissance engineering ingenuity","Steam engines replacing manual labor in most production sectors","Chemical, electrical, and science-based engineering developing electricity, cars, and mass production"],"answer":3,"explanation":"Correct: D. The lecture states the Second Industrial Revolution was driven by 'chemical, electrical, and other science-based engineering branches' that developed electricity, cars, airplanes, telecommunications, and mass production.","bloom":"Understand","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":824,"section":"lecture","text":"What technology primarily powered machines during the First Industrial Revolution, replacing muscle in most production?","options":["Steam engines","Electricity","Internal combustion engines","Water wheels"],"answer":0,"explanation":"Correct: A. The lecture states that during the Industrial Revolution, 'machines, increasingly powered by steam engines, started to replace muscles in most production.' Steam power is the defining technology of this phase.","bloom":"Remember","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":825,"section":"lecture","text":"What transformation occurred in engineering between the 18th and early 19th centuries during the Industrial Revolution?","options":["Engineers began developing microelectronics and telecommunications","Civil and mechanical engineers transitioned from practical artists to scientific professionals","Engineers moved from steam engines to electricity as the primary power source","Engineering shifted entirely from civilian infrastructure to military applications"],"answer":1,"explanation":"Correct: B. The lecture states that 'from the eighteenth through early nineteenth century, civil and mechanical engineers changed from practical artists to scientific professionals' — the defining transformation of the Industrial Revolution phase.","bloom":"Understand","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":826,"section":"lecture","text":"Which ancient structure is cited in the lecture as an example of craftsmanship and intuitive engineering ingenuity during the Pre-Scientific Revolution?","options":["The Colosseum of Rome","The Great Wall of China","The Parthenon of Athens","The Great Pyramids of Egypt"],"answer":3,"explanation":"Correct: D. The lecture explicitly states that 'the ancient Egyptians temples and monuments such as the great Pyramids are examples of craftsmanship and intuitive engineering ingenuity' from the Pre-Scientific Revolution era.","bloom":"Remember","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":827,"section":"lecture","text":"Which is cited in the lecture as the first example of a structural design code in history?","options":["The OSHA Safety Code","The Code of Hammourabi","The FIDIC Standards","The Egyptian Civil Code"],"answer":1,"explanation":"Correct: B. The lecture explicitly identifies the Code of Hammourabi as the first example of a structural design code — setting minimum requirements to ensure public safety and adequate performance, the same purpose served by modern codes.","bloom":"Remember","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":828,"section":"lecture","text":"Which of the following correctly lists the three sources of Professional Ethics given in the lecture?","options":["Law, Custom, Conscience","Religion, Government, Conscience","Culture, Religion, Law","Religion, Custom, Conscience"],"answer":3,"explanation":"Correct: D. The lecture lists exactly three sources of Professional Ethics: Religion, Custom, and Conscience — representing spiritual, societal, and personal dimensions of moral guidance.","bloom":"Remember","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":829,"section":"lecture","text":"Which of the following is a NON-TRADITIONAL engineering major according to Lecture 1?","options":["Civil Engineering","Petroleum Engineering","Chemical Engineering","Mechanical Engineering"],"answer":1,"explanation":"Correct: B. The lecture separates majors into traditional (Civil, Mechanical, Electrical, Chemical, Computer, Architectural, Construction, Environmental) and non-traditional. Petroleum Engineering appears in the non-traditional list alongside Bioengineering, Genetic Engineering, and others.","bloom":"Remember","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":830,"section":"lecture","text":"Which philosopher is recognized in the lecture as the first to advocate the ethical value of virtues in a person's character?","options":["Socrates","Immanuel Kant","John Rawls","Aristotle"],"answer":3,"explanation":"Correct: D. The lecture states that 'Aristotle is often recognized as the first philosopher to advocate the ethical value of certain qualities, or virtues, in a person's character' — forming the foundation of Virtue Theory.","bloom":"Remember","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":831,"section":"lecture","text":"Why does Virtue Theory differ from both Utilitarianism and Deontology, according to Lecture 1?","options":["It focuses on maximizing outcomes for the greatest number of people","It prioritizes rule-following and rational duty as the supreme ethical standard","It focuses exclusively on fair distribution of goods between individuals","It emphasizes virtuous character qualities rather than formal rules or useful results"],"answer":3,"explanation":"Correct: D. Virtue Theory 'emphasizes the value of virtuous qualities rather than formal rules or useful results.' It asks what kind of person one should be — distinct from Deontology's rule-focus and Utilitarianism's outcome-focus.","bloom":"Understand","lecture":"L1","source":"L1_Quiz.html","sources":["L1_Quiz.html"]},{"id":832,"section":"lecture","text":"A construction engineer knows that a particular building material has a 15% higher failure rate under seismic loads but does not include this in his final report to the client. This is an example of:","options":["Withholding adverse information","Tampering with results","Writing unclear instructions","Omitting safety warnings"],"answer":null,"explanation":"Withholding adverse information means intentionally omitting negative findings from reports. This is ethically impermissible because the client or public needs complete information to make safe decisions.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":833,"section":"lecture","text":"A junior engineer discovers a serious design flaw in a product about to be shipped. Her supervisor tells her to stay silent to avoid delaying the launch. What does Canon 1 of the ASME Code require her to do?","options":["Follow her supervisor's instruction since loyalty to the employer is the top priority","Report the flaw, since public safety is paramount above employer loyalty","Document the issue privately and raise it after the product ships","Resign from the company immediately"],"answer":null,"explanation":"Canon 1 places public safety as paramount . This explicitly overrides loyalty to employers. The engineer must report or refuse to proceed — not stay silent — when public welfare is at risk.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":834,"section":"lecture","text":"A lab technician adjusts test data slightly to make results appear to meet the required specification. This is best classified as:","options":["Copyright infringement","Withholding adverse information","Tampering with results","Writing unclear instructions"],"answer":null,"explanation":"Tampering with results means altering data or test outcomes — one of the five key unethical communication concerns. This destroys data integrity and can lead to catastrophic failures if unsafe products pass testing.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":835,"section":"lecture","text":"A project manager shares sensitive client financial data with a competitor without authorization. Which component of professional ethics has been violated MOST directly?","options":["Transparency","Confidentiality","Accountability","Objectivity"],"answer":null,"explanation":"Confidentiality requires professionals to protect information that is not meant to be disclosed. Sharing client data without consent is a direct breach of this component.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":836,"section":"lecture","text":"A strong work ethic, according to the lecture, involves which combination of characteristics?","options":["High productivity, low cost, and maximum output","Upholding company values, completing tasks on time, and being professional in attitude and appearance","Meeting deadlines, earning promotions, and maintaining social media presence","Following instructions strictly, never questioning management, and maximizing billable hours"],"answer":null,"explanation":"The lecture defines a strong work ethic as: upholding company values, performing your job to the best of your ability, completing tasks on time, and being professional in both attitude and appearance.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":837,"section":"lecture","text":"A student submits the exact same term paper she wrote last semester for a different course this semester, without informing either professor. This is an example of:","options":["Copyright infringement","Withholding adverse information","Multiple submission","Tampering with results"],"answer":null,"explanation":"Multiple submission (Way 8) is submitting a single paper for credit in two different classes — whether in the same term or different terms — without disclosure. This is considered academic misconduct.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":838,"section":"lecture","text":"According to the ASME Code of Ethics shown in the lecture, which of the following is the FIRST fundamental canon?","options":["Engineers shall build their professional reputation on merit","Engineers shall perform services only in the areas of their competence","Engineers shall hold paramount the safety, health and welfare of the public","Engineers shall act as faithful agents for their employers"],"answer":null,"explanation":"Canon 1 of the ASME Code: Engineers shall hold paramount the safety, health and welfare of the public in the performance of their professional duties. Public safety always comes first.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":839,"section":"lecture","text":"According to the documentation procedure in the lecture, how should in-text citations be formatted?","options":["Author's last name and year in parentheses, e.g. (Beer, 2009)","Consecutive numbers in square brackets inserted at the end of each cited segment, e.g. [1]","Footnotes at the bottom of the page with full bibliographic information","Superscript numbers linked to an endnote section"],"answer":null,"explanation":"The lecture specifies: use consecutive numbers in square brackets beginning with [1] at the end of each cited segment. This is the IEEE citation style standard used in engineering writing.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":840,"section":"lecture","text":"According to the Hyatt Regency ethical questions, who bears ultimate responsibility for checking the safety of final designs as depicted in shop drawings?","options":["The building owner, since they commissioned the project","The contractor, since they made the design change","The licensed professional engineer who affixes their seal to fabrication drawings","The government building inspector who issues the occupancy permit"],"answer":null,"explanation":"Affixing a professional seal is a declaration that the engineer has reviewed and accepts responsibility for the design. A licensed PE who seals shop drawings is the party ultimately accountable for their safety.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":841,"section":"lecture","text":"According to the lecture, plagiarism results from which THREE causes?","options":["Ignorance, overwork, and technical difficulty","Dishonesty, carelessness/laziness, and ignorance","Dishonesty, peer pressure, and lack of access to sources","Carelessness, poor time management, and plagiarism software failure"],"answer":null,"explanation":"The lecture explicitly identifies three causes of plagiarism: (1) Dishonesty — intentional theft, (2) Carelessness and laziness — failing to document properly, (3) Ignorance — not knowing the rules.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":842,"section":"lecture","text":"According to the lecture, which of the following is NOT listed as one of the aims and objectives of professional ethics?","options":["To understand the moral values that ought to guide the engineering profession","To resolve moral issues in the profession","To maximize financial returns for engineering firms","To assure clients that services will be rendered to high moral standards"],"answer":null,"explanation":"The four aims are: (a) understand moral values, (b) resolve moral issues, (c) justify moral judgment, (d) assure clients. Maximizing financial returns is a business goal — not an objective of professional ethics.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":843,"section":"lecture","text":"An engineer at the Challenger launch was aware of dangerous O-ring behavior in cold temperatures but was pressured by management not to delay the launch. According to the lecture's ethical framework, what should the engineer have done?","options":["Defer to management since they have final decision authority","Document his concerns privately but stay quiet publicly to protect his job","Formally refuse to certify the launch as safe and escalate his concerns beyond immediate management if necessary","Accept the decision since the probability of failure was statistically small"],"answer":null,"explanation":"Canon 1 (public safety paramount) and the principle of facing dilemmas carefully require the engineer to formally document and escalate safety concerns . An engineer's professional obligation to the public overrides loyalty to management. Job security is not an ethical justification for silence.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":844,"section":"lecture","text":"An engineer copies a diagram from a published journal and includes it in his client report without attribution. Which of the five unethical communication concerns does this violate?","options":["Tampering with results","Writing unclear instructions","Copyright infringement","Omitting safety warnings"],"answer":null,"explanation":"Copyright infringement occurs when copyrighted material (including diagrams, text, or data) is used without proper permission or attribution. This is the first of the five communication concerns engineers must avoid.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":845,"section":"lecture","text":"An engineer refuses to sign off on a project report that contains data he did not personally verify, even under pressure from his manager. Which component of professional ethics is he demonstrating?","options":["Loyalty","Confidentiality","Integrity","Obedience to the law"],"answer":null,"explanation":"Integrity means adhering to strong moral principles even under pressure. The engineer is refusing to misrepresent the facts — a core expression of integrity listed among the nine components of professional ethics.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":846,"section":"lecture","text":"Engineering ethics is described as a field of 'applied ethics.' What does this mean in practice?","options":["It applies only to structural and civil engineers","It translates abstract moral principles into concrete standards governing engineers' obligations to the public, clients, employers, and profession","It is ethics applied exclusively through legal court proceedings","It replaces engineering codes with philosophical theory"],"answer":null,"explanation":"Applied ethics means taking general moral principles and applying them to a specific profession. Engineering ethics sets concrete standards for how engineers must behave toward the public, clients, employers, and the profession itself.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":847,"section":"lecture","text":"In a reference page, how should journal article titles be formatted according to the lecture?","options":["In Title Case with all major words capitalized","In ALL CAPS to distinguish them from book titles","In sentence form — only the first word and proper nouns capitalized","In italics with full capitalization"],"answer":null,"explanation":"Rule 7a for journals: Titles of journal articles are given in sentence form rather than title form — only the first word and proper nouns are capitalized. Book titles, by contrast, are typically italicized in title case.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":848,"section":"lecture","text":"In the IEEE Abu Baker case study, what were the TWO main acts of plagiarism identified?","options":["Copying entire sections verbatim and submitting the paper to two journals simultaneously","Making minor modifications to original work without referencing it, and plagiarizing paragraphs from another paper without attribution","Using co-authors' work without their knowledge and failing to cite his own previous work","Publishing in a journal he was affiliated with and rejecting peer reviewer comments"],"answer":null,"explanation":"Act 1: Making minor modifications to original work without referencing it. Act 2: Plagiarizing paragraphs from another paper without any reference. Both were committed without the co-authors' knowledge. The paper was revoked and Abu Baker issued a public apology.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":849,"section":"lecture","text":"Legal ethics is best described as:","options":["The laws that engineers must follow when designing public structures","The behavioral norms and morals governing judges and lawyers, representing the minimum standards of appropriate conduct","A voluntary code of conduct adopted by legal professionals worldwide","The ethical framework applied specifically to intellectual property disputes"],"answer":null,"explanation":"Legal ethics = behavioral norms and morals governing judges and lawyers. It represents the minimum standards of appropriate conduct within the legal profession — not voluntary, not engineering-specific.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":850,"section":"lecture","text":"Professional ethics differ from general ethics primarily because they:","options":["Replace moral judgment with legal compliance","Apply only to senior-level employees in large companies","Govern the behavior of a person or group specifically within a business environment","Are enforced by government agencies rather than professional bodies"],"answer":null,"explanation":"Professional ethics are principles that govern behavior in a business environment . General ethics apply to all human conduct; professional ethics narrow this to the workplace and professional role.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":851,"section":"lecture","text":"The engineering firm in the Hyatt Regency case denied approving the design change by phone. Which ethical principle does this dispute most directly relate to?","options":["Transparency — all design changes must be documented in writing","Loyalty — firms must support contractor decisions","Confidentiality — phone conversations are protected","Obedience to the law — verbal approvals are legally binding"],"answer":null,"explanation":"Transparency requires that decisions, especially safety-critical ones, be documented. The entire dispute hinges on the absence of a written record. Proper documentation would have prevented the ambiguity entirely.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":852,"section":"lecture","text":"The Hyatt Regency Hotel Walkways collapsed on July 17, 1981, resulting in 114 deaths. What was the root technical cause?","options":["The walkways were overloaded beyond any reasonable design limit by the crowd","The contractor altered the original design in a way that made the walkways weaker, not stronger","The original engineering firm used substandard materials against building codes","The hotel failed to perform routine maintenance inspections"],"answer":null,"explanation":"The contractor believed the original design didn't meet minimum load requirements and altered it — but the modification made the walkways weaker, not stronger . The engineering firm either approved this without proper calculations or denied ever approving it.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":853,"section":"lecture","text":"The lecture states that engineering does NOT have a single uniform ethical system across the profession. What factor most influences which ethical approach an engineer follows?","options":["The country where the engineer received their degree","Whether the engineer is independent or working for the government","The salary level of the engineer","The specific university the engineer attended"],"answer":null,"explanation":"Ethical approaches vary by discipline and are most influenced by whether engineers are independent or working for the government . Independent engineers may have different obligations than those embedded in public-sector bureaucracies.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":854,"section":"lecture","text":"The most serious ethical failure in the Challenger case was that:","options":["The engineers who raised concerns were not qualified to assess rocket safety","NASA managers knew about the potential catastrophic flaw since 1977 but failed to address it, and also disregarded engineer warnings before launch","The shuttle was launched outside its original design specifications for the first time","The design flaw was first discovered on the day of launch"],"answer":null,"explanation":"NASA managers knew about the booster seal flaw since 1977 and failed to address it. They also actively disregarded engineer warnings on the day of launch. This combination of negligence and suppression of dissent caused the disaster.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":855,"section":"lecture","text":"The Space Shuttle Challenger disaster (January 28, 1986) was caused by:","options":["Pilot error during the launch sequence","A failed seal in the rocket booster that allowed hot pressurized gas to reach the external fuel tank","Structural failure of the orbiter's heat shield during launch","An unexpected weather event that was not accounted for in the launch protocol"],"answer":null,"explanation":"A seal (O-ring) in the solid rocket booster failed , allowing pressurized hot gas from the motor to reach the external fuel tank, causing the explosion. NASA managers had known about this design flaw since 1977.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":856,"section":"lecture","text":"To practice professional ethics, a consultant must 'act without bias.' In practice, this means she should:","options":["Always agree with her client's preferred outcome","Provide recommendations based on objective evidence, free from personal or financial interest","Avoid expressing any professional opinion on controversial topics","Only work with clients whose values she personally agrees with"],"answer":null,"explanation":"Acting without bias (objectivity) means basing professional judgments on facts and evidence, not on personal relationships, financial incentives, or pre-existing beliefs.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":857,"section":"lecture","text":"What measure could professional societies take to prevent catastrophes like the Hyatt Regency collapse from recurring?","options":["Prohibit contractors from making any design modifications","Establish and enforce mandatory documentation and review processes for design changes","Transfer all safety responsibility from engineers to building owners","Require all construction projects to be completed by government employees only"],"answer":null,"explanation":"Professional societies can set standards requiring that design changes go through a formal review and documentation process. The Hyatt disaster resulted partly from informal, undocumented communication — mandatory procedures close that gap.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":858,"section":"lecture","text":"When facing an ethical dilemma in an engineering career, the lecture recommends which sequence of actions?","options":["Act quickly, consult legal counsel, then document decisions","Analyze the situation carefully, consider multiple angles, consult others, then think long and hard before deciding","Report to management immediately, then notify the client, then review the code of ethics","Follow the code of ethics first, then consult others, then analyze the situation"],"answer":null,"explanation":"The four steps for facing a dilemma: (1) Analyze carefully, (2) Consider multiple angles, (3) Consult with others, (4) Think long and hard before deciding. This deliberate process prevents hasty or one-sided decisions.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":859,"section":"lecture","text":"Which of the five communication concerns is MOST directly connected to Canon 1 (public safety) of the ASME Code?","options":["Copyright infringement","Tampering with results","Withholding adverse information","Omitting safety warnings"],"answer":null,"explanation":"Omitting safety warnings directly endangers the public. When engineers fail to include warnings in instructions, manuals, or specifications, users may be harmed — violating the paramount duty to protect public safety.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":860,"section":"lecture","text":"Which of the following behaviors would violate Fundamental Canon 4 of the ASME Code of Ethics?","options":["Publishing a technical paper without a peer reviewer","An engineer recommending a supplier in which he has a hidden financial interest without disclosing it to the client","An engineer declining a project outside their area of expertise","An engineer issuing a public statement about environmental risks"],"answer":null,"explanation":"Canon 4 states engineers shall act as faithful agents or trustees and shall avoid conflicts of interest . Having an undisclosed financial interest in a recommended supplier is a textbook conflict of interest violation.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":861,"section":"lecture","text":"Which of the following best defines 'Ethics' as presented in the lecture?","options":["A set of laws enforced by the government to regulate business conduct","A system of moral principles that affects how people make decisions and lead their lives","A professional code adopted only by engineers and lawyers","The rules written in a company's employee handbook"],"answer":null,"explanation":"Ethics is defined as a system of moral principles concerned with what is good for individuals and society — not laws, not company policies, but the underlying moral framework that shapes all decisions.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":862,"section":"lecture","text":"Which of the following is NOT considered plagiarism according to the lecture?","options":["Borrowing the sentence structure of another author without attribution","Using a paper-writing service to produce your report","Including your own original analysis and opinions in a research paper","Copying code from a classmate in a programming assignment"],"answer":null,"explanation":"The lecture explicitly states: No need to reference your own ideas and opinions or common knowledge . Original analysis you have developed yourself does not require a citation — it is exempt from plagiarism rules.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":863,"section":"lecture","text":"Which of the following is the BEST example of developing a strong work ethic according to the lecture?","options":["Arriving at meetings exactly on time and leaving immediately after","Cultivating self-discipline and using time wisely","Prioritizing personal projects during work hours when tasks are slow","Dressing formally for all occasions"],"answer":null,"explanation":"The lecture lists five habits for developing professional ethics, including: being on time, developing professionalism, cultivating self-discipline , using time wisely , and staying balanced. These are the core behavioral habits.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":864,"section":"lecture","text":"Which of the following is the correct definition of plagiarism?","options":["Citing a source incorrectly due to formatting errors","Using someone else's work without giving proper credit","Paraphrasing an idea from a published source","Writing a paper that covers the same topic as an existing paper"],"answer":null,"explanation":"Plagiarism = using someone else's work without giving proper credit. It is distinct from paraphrasing (which is acceptable if attributed) and covers ideas, words, structure, and data.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":865,"section":"lecture","text":"Why should researchers document all information sources, according to the lecture?","options":["Only to protect themselves legally from plagiarism accusations","To protect the originator, protect themselves, show scholarly awareness, and enable readers to track down sources","Primarily to increase the word count of their reports","Because it is required by law in all academic institutions"],"answer":null,"explanation":"The four reasons to document sources: (1) Protect the originator — credit where due, (2) Protect yourself from plagiarism accusations, (3) Show scholarly awareness of the field, (4) Enable readers to trace and read sources themselves.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":866,"section":"lecture","text":"You cite source [3] for the first time on page 2, then again on pages 7, 11, and 15 of your report. How should you number it throughout?","options":["Use [3] every time you cite it — the same number throughout","Use [3] on page 2, then [3a], [3b], [3c] for subsequent references","Renumber it each time it appears to maintain document flow","Move it to [1] since you use it most frequently"],"answer":null,"explanation":"Rule 7: Once you have numbered a source, use the same number for all subsequent references to that source throughout your work . Source [3] remains [3] every time it is cited.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":867,"section":"lecture","text":"You cite source [4] on page 5 of a book and source [7] on pages 29–31 and source [9] on pages 8 and 12 for the same paragraph. How should this be written?","options":["[4, p.5], [7, pp.29-31], [9, pp.8,12] each at the end of separate sentences","[4, p.5; 7, pp.29-31; 9, pp.8,12] using semicolons within a single bracket set","([4], [7], [9]) in parentheses at the end of the paragraph","A single footnote listing all three sources"],"answer":null,"explanation":"Rule 6 of the documentation procedure: use semicolons to separate multi-information sources for one paragraph: [4, p. 5; 7, pp.29–31; 9, pp.8,12]. All cited together in one bracket set.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":868,"section":"lecture","text":"You do NOT need to document a source when:","options":["You found the information on a credible government website","You are citing information from a peer-reviewed journal published more than 10 years ago","The information is common knowledge or represents your own original ideas","You are including a diagram from a textbook that is out of print"],"answer":null,"explanation":"The two exceptions to documentation requirements are: (1) your own ideas and opinions , and (2) common knowledge . All other information — regardless of source, age, or accessibility — must be documented.","bloom":"","lecture":"","source":"L2_L3_Quiz.html","sources":["L2_L3_Quiz.html"]},{"id":869,"section":"lecture","text":"A comprehensive fire safety plan must include which of the following elements?","options":["Identification of fire hazards and procedures for evacuation","A list of flammable materials and their market prices","Monthly fire drill frequency schedules only","Building blueprints and contractor contact details"],"answer":0,"explanation":"The fire safety plan must include: identification of fire hazards, procedures for recognizing/reporting unsafe conditions, alarm procedures, notifying employees, notifying fire response organizations, procedures for evacuation , accounting for all employees after evacuation, and contact names. Option A captures two of these valid elements.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":870,"section":"lecture","text":"A construction site manager wants to assess whether current safety controls are working. According to the Safety Achievement Steps, which step addresses this?","options":["Step 2 – Analyze workplace hazards","Step 3 – Develop & implement controls","Step 5 – Perform work within controls","Step 6 – Record keeping & evaluation"],"answer":3,"explanation":"Step 6 – Record Keeping & Evaluation is specifically for determining the overall effectiveness of the c
