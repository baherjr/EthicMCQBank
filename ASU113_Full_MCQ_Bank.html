<style>
:root{--bg:#0b0d12;--panel:#121722;--panel2:#1a2130;--line:#293244;--text:#e6ebf4;--muted:#93a0b5;--accent:#60a5fa;--exam:#f59e0b;--correct:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{position:sticky;top:0;z-index:20;background:rgba(11,13,18,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:16px}
.h-wrap{max-width:1100px;margin:0 auto;display:grid;gap:10px}
.title{font-size:20px;font-weight:700}
.subtitle{font-size:13px;color:var(--muted)}
.controls{display:grid;gap:10px;grid-template-columns:1fr}
@media(min-width:860px){.controls{grid-template-columns:auto 1fr auto auto auto;align-items:center}}
.seg{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:var(--panel);color:var(--text);padding:8px 12px;border-radius:9px;cursor:pointer;font-size:13px}
.btn.active{border-color:var(--accent);background:#162238;color:#dbeafe}
.btn.exam.active{border-color:var(--exam);background:#2a210f;color:#fde68a}
input,select{background:var(--panel);border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:9px;font-size:13px;min-width:0}
.stat{font-size:12px;color:var(--muted);white-space:nowrap}
.main{max-width:1100px;margin:18px auto;padding:0 16px 32px}
.cards{display:grid;gap:12px}
.card{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:14px}
.meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.badge{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:var(--panel2)}
.badge.section-lecture{border-color:#1e3a8a;color:#93c5fd;background:#0f1a2e}
.badge.section-exam{border-color:#854d0e;color:#fde68a;background:#2c220f}
.q{font-size:15px;margin:6px 0 12px}
.opts{display:grid;gap:6px}
.opt{border:1px solid var(--line);background:var(--panel2);border-radius:8px;padding:8px 10px;font-size:14px;color:#d5deed}
.opt.correct{border-color:rgba(34,197,94,.55);background:rgba(34,197,94,.1);color:#c7f9d8}
.actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.note{font-size:12px;color:var(--muted)}
.exp{margin-top:10px;border-left:3px solid var(--accent);padding:8px 10px;background:#111c2f;border-radius:0 8px 8px 0;font-size:13px;color:#ccdaef}
.empty{padding:40px 0;text-align:center;color:var(--muted)}
.pager{display:flex;gap:8px;align-items:center;justify-content:flex-end}
</style>
</head>

components, high maintenance, and short warranty","Complex design, high cost, limited usage, and short-term functionality"],"answer":1,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":54,"section":"exam","text":"What is emphasized as a requirement to practice professional ethics?","options":["Acting with bias","Complying with laws","Avoiding transparency","Embodying low ethical standards"],"answer":1,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":55,"section":"exam","text":"What is one of the advantages of Cornell notes?","options":["You can get into college faster by taking them","They will help you make friends","It is a way of learning information, not just recording facts","It is a way to help you get your homework done quickly"],"answer":2,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":56,"section":"exam","text":"What is the color of civil engineering work contracts?","options":["Red","Orange","Yellow","White"],"answer":0,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":57,"section":"exam","text":"What is the fourth step in the SQ3R reading strategy?","options":["Read","Reflect","Recite","Review"],"answer":2,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":58,"section":"exam","text":"What is the harm from the depletion of Earth's ozone layer?","options":["The average temperature of the earth's surface will increase gradually","The oxygen content of the atmosphere will decrease","Increased amount of ultraviolet radiation will reach earth's surface","Sea levels will rise as the polar ice caps will gradually melt"],"answer":2,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":59,"section":"exam","text":"What is the maximum total fine percentage that can be imposed for a business contract delay?","options":["3%","20%","10%","15%"],"answer":2,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":60,"section":"exam","text":"What is the primary objective of the Kyoto Protocol?","options":["To increase developing countries' awareness of global warming","To reduce the effect of global warming by lowering greenhouse gas concentrations","To prevent expansion of industries that produce greenhouse gases in developed countries","All other answers are incorrect"],"answer":1,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":61,"section":"exam","text":"What is the time at which final insurance is paid with a contractor abroad?","options":["Within 15 days of notification of bid acceptance","Within 20 days of notification of bid acceptance","Within 10 days of notification of bid acceptance","Within 5 days of notification of bid acceptance"],"answer":1,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":62,"section":"exam","text":"What is the time at which final insurance is paid?","options":["Within 15 days of notification of bid acceptance","Within 20 days of notification of bid acceptance","Within 10 days of notification of bid acceptance","Within 5 days of notification of bid acceptance"],"answer":0,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":63,"section":"exam","text":"What is the time at which primary insurance is paid?","options":["After the first invoice is approved","After signing the final contract","At bid submission","At bid acceptance"],"answer":2,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":64,"section":"exam","text":"What is the total number of industrialized countries (besides the European Economic Community) that participated in the Kyoto Protocol?","options":["175","28","36","All other answers are incorrect"],"answer":2,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":65,"section":"exam","text":"When should a student begin to prepare for a test?","options":["A week in advance","A month in advance","Two weeks in advance","All other answers are incorrect"],"answer":3,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":66,"section":"exam","text":"Which contract suits a special purpose machine that must be designed and manufactured for special purpose use?","options":["BOT","Unit price contract","Cost plus contract","Lump sum contract"],"answer":2,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":67,"section":"exam","text":"Which contract suits work that must start quickly due to unplanned shutdown maintenance?","options":["BOT","Unit price contract","Cost plus contract","Lump sum contract"],"answer":2,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":68,"section":"exam","text":"Which factor significantly influences ethical variations in engineering?","options":["Engineers' social media usage","Engineers' educational background","International engineering standards","Independence versus government employment"],"answer":3,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":69,"section":"exam","text":"Which of the following are main sources of professional ethics?","options":["Religion, legal codes, and cultural","Religion, custom, and conscience","Religion, legal codes, and organizational policy","Religion, custom, and competition"],"answer":1,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":70,"section":"exam","text":"Which of the following is a prime health risk associated with greater UV radiation due to depletion of stratospheric ozone?","options":["Damage to digestive system","Increased skin cancer","Increased liver cancer","Neurological discord"],"answer":1,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":71,"section":"exam","text":"Which of the following is a source of indoor air pollution?","options":["Automobile exhaust","Power plant emissions","Vapors from building materials","Industrial waste disposal"],"answer":2,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":72,"section":"exam","text":"Which of the following is an obligation of the employer in a construction contract?","options":["Perform the work in the desired manner","Receive the work from the contractor","Hand over the work at the agreed time","Guarantee the work for ten years"],"answer":1,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":73,"section":"exam","text":"Which of the following is caused by chemical reactions between pollutants mainly from automobile exhaust and industrial emissions?","options":["Smog","Ozone depletion","Greenhouse effect","Acid rain"],"answer":0,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":74,"section":"exam","text":"Which of the following is NOT mentioned as a component of the Chemical Hygiene Plan?","options":["Provisions for medical consultation & examination","Ensuring properly functioning fume hoods and equipment","Developing a chemical waste disposal system","Staff training on hazard awareness and protection measures"],"answer":2,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":75,"section":"exam","text":"Which type of contract is appropriate for the annual maintenance of the Faculty of Engineering facilities?","options":["BOT","Unit price contract","Cost plus contract","Lump sum contract"],"answer":1,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":76,"section":"exam","text":"Who is mentioned as a prominent figure in the evolution of engineering during the Renaissance period?","options":["Galileo Galilei","Archimedes","Isaac Newton","Leonardo da Vinci"],"answer":3,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":77,"section":"exam","text":"Workplace related injuries, illnesses and deaths impose costs upon?","options":["Employers' direct cost","Employees' direct cost","Employers' indirect cost","Employees' indirect cost"],"answer":0,"explanation":"","bloom":"","lecture":"","source":"ethics_mcq_quiz.html","sources":["ethics_mcq_quiz.html"]},{"id":78,"section":"exam","text":"... in Cornell note-taking means to consider how this material relates to the course and the subject being discussed.","options":["Reflect","Review","Reduce","Recite"],"answer":0,"explanation":"'Reflect' in Cornell note-taking means stepping back to consider how material connects to the broader course and subject — making meaning beyond just recording.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":79,"section":"exam","text":"…… exists at the bottom of the page in Cornell note-taking.","options":["Summaries","Cue column","Note-taking area","All other answers are incorrect"],"answer":0,"explanation":"The Summary section sits at the bottom of the Cornell page. Cue column = left side; Note-taking area = right side.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":80,"section":"exam","text":"…… found in sewage and fertilizers, can lead to excessive growth of aquatic plants and algae.","options":["Nitrates","Magnesium","Iron","Calcium"],"answer":0,"explanation":"Nitrates from sewage and fertilizers cause eutrophication — excessive algal and aquatic plant growth — depleting oxygen and harming aquatic life.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":81,"section":"exam","text":"According to Tenders and Auctions Law, contracting shall be by way of limited practice in the following cases:","options":["Things not manufactured or imported except by specific entities.","Things whose nature requires purchasing from production locations.","Contracts requiring national security confidentiality.","All other answers are correct."],"answer":3,"explanation":"All three cases qualify for limited tendering: exclusive manufacturers/importers, items bought only at source, and national security contracts.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":82,"section":"exam","text":"According to Tenders and Auctions Law, if the contractor contracted to purchase movables for a government agency and was late in implementing the contract, the agency can impose fines not exceeding …… of the contract value.","options":["5%","3%","2%","10%"],"answer":0,"explanation":"For late delivery of movables (goods), Tenders and Auctions Law permits fines up to 5% of the contract value.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":83,"section":"exam","text":"According to Tenders and Auctions Law, the contract shall be automatically terminated:","options":["If the value of the lowest bid exceeds the estimated value of the project.","If the contracting party became bankrupt or insolvent.","If only one bid was submitted","All of the above"],"answer":3,"explanation":"All three conditions trigger automatic termination: lowest bid exceeding estimated value, contractor bankruptcy/insolvency, and only one bid submitted.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":84,"section":"exam","text":"According to Tenders and Auctions Law, what happens to the primary insurance?","options":["It can be kept for submission in the next tender.","It shall be returned to unacceptable bidders upon request.","It shall be returned to unacceptable bidders without any request.","All of the above"],"answer":2,"explanation":"Primary insurance (bid bond) must be returned to unsuccessful bidders automatically — without requiring a request — and cannot be transferred to the next tender.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":85,"section":"exam","text":"According to the construction contract law, if the contractor performs the work defectively with no way to fix it...","options":["Another contractor may repair at existing contractor's expense.","The contract is terminated without warning.","Give a chance to make the repair.","All other answers are correct."],"answer":0,"explanation":"When defective work cannot be fixed, the employer may engage another contractor at the original contractor's expense, per Egyptian construction contract law.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":86,"section":"exam","text":"According to the construction contract law, what must the employer do if he stops the execution of work without any reason?","options":["Provide a formal apology.","Pay the expenses.","All other answers are correct.","Negotiate new contract"],"answer":1,"explanation":"If the employer stops work without justification, they must pay the contractor's expenses (costs incurred). The law does not require an apology or renegotiation.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":87,"section":"exam","text":"According to the Kyoto Protocol, ….. countries and the EEC are required to reduce greenhouse gas emissions below levels specified for each of them in the treaty.","options":["36","45","47","33"],"answer":0,"explanation":"The Kyoto Protocol required 36 countries plus the EEC to reduce greenhouse gas emissions to specified levels.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":88,"section":"exam","text":"Before the Renaissance, how did practical artists and craftsmen primarily innovate?","options":["Tinkering","Advanced planning","Blueprint drafting","Academic training"],"answer":0,"explanation":"Pre-Renaissance craftsmen innovated through tinkering — trial-and-error experimentation — rather than formal scientific or academic methods.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":89,"section":"exam","text":"During which period did engineers transition from practical artists to scientific professionals?","options":["16th through early 17th century","17th through early 18th century","19th through early 20th century","18th through early 19th century"],"answer":3,"explanation":"The transition occurred during the 18th through early 19th century, coinciding with the Industrial Revolution and formalization of engineering disciplines.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":90,"section":"exam","text":"Engineering ethics is endorsed by:","options":["Legal frameworks","Educational institutions","Engineering societies","Government regulations"],"answer":2,"explanation":"Engineering ethics is primarily endorsed and defined by engineering societies (e.g., NSPE, ASCE, IEEE), which publish codes of ethics members must follow.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["ethics_mcq_quiz.html","spring25_ethics_final.html"]},{"id":91,"section":"exam","text":"For contracts concluded with a contractor abroad, the owner of the accepted bid shall pay the final insurance within …… days according to Tenders and Auctions Law.","options":["5","With the bid","20","10"],"answer":3,"explanation":"For foreign contractors, final insurance must be submitted within 10 days of contract award notification per Tenders and Auctions Law.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":92,"section":"exam","text":"If the total price for one lighting fixture (supply + installation) is 1500 pounds (including profit) and the actual number in the drawing is 50 units — BOQ for a unit price contract, quantity 30 units:","options":["Unit Price 1,100 — Total 33,000","Unit Price 1,375 — Total 41,250","Unit Price 1,500 — Total 45,000","Unit Price 2,500 — Total 75,000"],"answer":2,"explanation":"In a unit price contract, the unit price is fixed at the contract rate (1,500 EGP/unit). Total = 30 × 1,500 = 45,000 EGP. The drawing count of 50 is irrelevant to the BOQ pricing.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":93,"section":"exam","text":"In the SQ3R study strategy, 'Answer your heading questions and highlight answer when found' belongs to …… step.","options":["Question","Recite","Survey","Read"],"answer":3,"explanation":"Answering your pre-formed questions and highlighting the answers is part of the Read step — active, goal-directed reading guided by your prior questions.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":94,"section":"exam","text":"In the SQ3R study strategy, 'Look at pictures and captions' belongs to .... step.","options":["Survey","Read","Recite","Question"],"answer":0,"explanation":"'Look at pictures and captions' is part of the Survey step — the initial overview phase where you scan headings, visuals, and summaries before reading.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":95,"section":"exam","text":"In urgent cases, contracts may be concluded by direct agreement (up to 100,000 pounds for consulting studies) with authorization from...","options":["The competent minister","The Prime Minister","The head of the authority","All other answers are correct"],"answer":2,"explanation":"For urgent direct-agreement contracts up to 100,000 EGP (consulting studies), authorization from the head of the authority is sufficient.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":96,"section":"exam","text":"Insurance can be considered as one of …… resulting from accidents in the workplace.","options":["Both direct and indirect costs","Direct costs","Indirect costs","All other answers are incorrect"],"answer":0,"explanation":"Insurance is both a direct cost (premiums, claims payouts) and an indirect cost (increased future premiums, administrative burden) of workplace accidents.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":97,"section":"exam","text":"One of the Fundamental Pollution Drivers is ….. which considers the second fundamental cause of pollution.","options":["Globalization","Industrialization","Population growth","All other answers are correct"],"answer":1,"explanation":"Industrialization is the second fundamental cause of pollution, driving industrial waste, emissions, and resource extraction at scale.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":98,"section":"exam","text":"One of the protection methods against hazards of scaffolding is having guardrails over …… feet.","options":["5","10","20","2"],"answer":0,"explanation":"⚠️ Answer per exam key: A (5 feet). OSHA general standard is 10 feet, but your lecture slides specify 5 feet for scaffolding guardrail requirements. Trust your slides.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":99,"section":"exam","text":"Plagiarism is done in one of the following ten ways:","options":["Having a friend write the paper for you","Using another writer's ideas without proper citation","All other answers are correct","Using another writer's words without proper citation"],"answer":2,"explanation":"All three are recognized forms of plagiarism: ghostwriting, using ideas without citation, and using words without citation are all among the ten ways.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":100,"section":"exam","text":"Regarding the Hyatt Regency Hotel walkways collapse, there is a significant dispute between the contractor and the engineering firm about...","options":["Telephone call","Project Safety protocol","On site inspection report","Written contract amendment"],"answer":0,"explanation":"The key dispute was about a telephone call — whether verbal approval was given for the rod hanger design change that caused the collapse (114 deaths).","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":101,"section":"exam","text":"Regarding the Space Shuttle Challenger disaster, how long had NASA managers known about the potential flaw in the rocket boosters before the disaster?","options":["5 years","9 years","11 years","3 years"],"answer":1,"explanation":"NASA managers had been aware of the O-ring flaw for approximately 9 years before the 1986 Challenger disaster — a major ethical failure of suppressing safety concerns.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":102,"section":"exam","text":"Steps taken to stop environmental damage from air pollution through studying effects on plant, animal, and human life are primarily led by...","options":["Educators","Legislative bodies","Scientific groups","All other answers are correct"],"answer":3,"explanation":"Efforts are led by all three: educators (awareness), legislative bodies (regulations), and scientific groups (research) — making 'all of the above' correct.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":103,"section":"exam","text":"The contractor guarantees the work for a period of …… years according to the construction contract law.","options":["5","1","10","3"],"answer":2,"explanation":"Under the Egyptian Civil Code, the contractor and supervising engineer jointly guarantee structural work for 10 years — the decennial liability (Article 651).","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":104,"section":"exam","text":"The final insurance for a project with an estimated value of 1,000,000 pounds and the value of the accepted bid is 600,000 pounds is .... pounds according to Tenders Law.","options":["30,000","20,000","12,000","50,000"],"answer":1,"explanation":"⚠️ Answer per exam key: B (20,000 EGP). Standard calculation at 5% of accepted bid = 30,000 EGP — verify the exact percentage used in your lecture slides (Dr. Mokhtar may use a different base or rate).","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":105,"section":"exam","text":"The first priority in first aid is to...","options":["Check breathing","Treat fractures","Check blood loss","Treat shock"],"answer":0,"explanation":"First priority in first aid is checking breathing (airway and breathing) — following the ABC (Airway, Breathing, Circulation) protocol.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":106,"section":"exam","text":"The main function of professional ethics is to:","options":["Rationalize technical decisions","Avoid contractual obligations","Maximize professional prestige","Justify moral judgements"],"answer":3,"explanation":"Professional ethics primarily serves to justify moral judgements — providing a framework to evaluate whether professional actions are ethically defensible.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":107,"section":"exam","text":"The Red Book of Contracts of FIDIC is a model of .....","options":["Engineering Consulting Contract","All other answers are incorrect","Civil Engineering Works Contract","Design, Execution, and Operation Contract"],"answer":2,"explanation":"FIDIC Red Book = Conditions of Contract for Construction (Civil Engineering Works), where the employer provides the design. Yellow Book = Design-Build; White Book = Consulting.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":108,"section":"exam","text":"The White Book of Contracts by FIDIC is a model for...","options":["Design, Execution, and Operation Contract","Execution Contract (Construction)","Terms of Contract between Employer and Consulting Engineer","All other answers are incorrect"],"answer":2,"explanation":"FIDIC White Book = Client/Consultant Model Services Agreement — the standard contract between an employer and a consulting engineer for professional services.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":109,"section":"exam","text":"What activity can lead to significant ground water contamination?","options":["Desalination plants","Hydroelectric power generation","Sewage leakage","Agricultural irrigation"],"answer":2,"explanation":"Sewage leakage directly introduces pathogens, nitrates, and chemicals into groundwater — the primary cause of significant contamination among the options.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":110,"section":"exam","text":"What is a fundamental requirement for practicing professional ethics?","options":["Acting with bias","Avoiding legal compliance","Protecting confidentiality","Violating ethical standards"],"answer":2,"explanation":"Protecting confidentiality is a core professional ethics requirement — professionals must safeguard client and stakeholder information.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":111,"section":"exam","text":"What is one of the effects on individuals?","options":["Increased technological proficiency","Higher academic achievement","Enhanced decision making","Improved physical health"],"answer":2,"explanation":"Enhanced decision making is a key effect on individuals highlighted in the context of professional ethics and critical thinking education.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":112,"section":"exam","text":"What is the primary focus of Engineer 2020 as defined by the National Academy of Engineers in the US?","options":["Application of inquiry-based scientific methods","Managing international business operations","Implementing legal frameworks in technology","Designing innovative marketing strategies"],"answer":0,"explanation":"The NAE's Engineer 2020 initiative focuses on applying inquiry-based scientific and engineering methods to address complex 21st-century societal challenges.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["ethics_mcq_quiz.html","spring25_ethics_final.html"]},{"id":113,"section":"exam","text":"What role does a governing power play in the context of distributive justice?","options":["It enforces strict meritocracy.","It ensures equal outcomes for all individuals.","It eliminates the concept of private property.","It decides how goods should be distributed based on need."],"answer":3,"explanation":"In distributive justice, the governing power's role is to determine how goods are allocated — based on need, merit, or equality — not to guarantee identical outcomes.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":114,"section":"exam","text":"What technological advancements characterized the Second Industrial Revolution?","options":["Water mills and horse-drawn plows","Steam engines and textile production","Printing press and mechanical clocks","Electricity, cars, airplanes, and telecommunications"],"answer":3,"explanation":"The Second Industrial Revolution (late 19th – early 20th c.) was defined by electricity, automobiles, aviation, and telecommunications. Steam and textiles defined the First.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":115,"section":"exam","text":"When a pollutant like ….. combines with droplets of water in the air, the water (or snow) can become acidified.","options":["Sulfuric Acid","Carbon dioxide and nitrogen","Mercury and lead","Sulfur dioxide"],"answer":3,"explanation":"Sulfur dioxide (SO₂) combines with atmospheric water to form sulfuric acid, causing acid rain. SO₂ is the pollutant; sulfuric acid is the result.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":116,"section":"exam","text":"Which engineering branch was particularly influential during the Second Industrial Revolution?","options":["Chemical engineering","Civil engineering","Mechanical engineering","Aerospace engineering"],"answer":2,"explanation":"Mechanical engineering was dominant during the Second Industrial Revolution, driving development of engines, turbines, manufacturing machinery, and transportation.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["ethics_mcq_quiz.html","spring25_ethics_final.html"]},{"id":117,"section":"exam","text":"Which of the following is not included in the fire safety plan?","options":["Identification of evacuation procedures.","Identification of significant fire hazards.","Identification of fire impact on the employees","Identification of methods of notifying employees"],"answer":2,"explanation":"'Identification of fire impact on employees' is not a standard fire safety plan component. Plans cover evacuation, hazard identification, and notification methods.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["ethics_mcq_quiz.html","spring25_ethics_final.html"]},{"id":118,"section":"exam","text":"Which president signed the OSHA Act into law?","options":["Richard Nixon","Jimmy Carter","John F. Kennedy","Gerald Ford"],"answer":0,"explanation":"President Richard Nixon signed the Occupational Safety and Health Act into law on December 29, 1970.","bloom":"","lecture":"","source":"spring25_ethics_final.html","sources":["spring25_ethics_final.html"]},{"id":119,"section":"lecture","text":"'A sample of fifty motorists stopped at midnight showed one in four were intoxicated or uninsured. Therefore if you get into an accident, there is a 25% chance the other driver will be intoxicated or uninsured.' This reasoning is:","options":["Deductive","Inductive","Circular","Invalid"],"answer":1,"explanation":"This is inductive reasoning — it draws a general probability conclusion from a specific sample observation. Inductive conclusions are probable, not logically certain.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":120,"section":"lecture","text":"'The Law of the Sea treaty states that vessels beyond 12 miles are in international waters and cannot be stopped. Since the U.S. Coast Guard intercepts boats beyond 12 miles, it is violating the treaty.' This reasoning is:","options":["Deductive","Inductive","Fallacious","Statistical"],"answer":0,"explanation":"This is deductive reasoning — the conclusion follows necessarily from the premises. If the law says X and the action violates X, then the action is unlawful. The conclusion is logically certain given the premises.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":121,"section":"lecture","text":"A contractor saving costs in a cost plus contract may:","options":["Lose profit","Be penalized","Receive a share of savings","Lose the contract"],"answer":2,"explanation":"In some cost plus arrangements with a savings incentive clause, a contractor who saves costs may receive a share of the savings — incentivizing cost efficiency.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":122,"section":"lecture","text":"A drawback of lump sum contracts is:","options":["Too many price changes","Employer risk","Quantity increase is not paid extra","Profit is based on cost"],"answer":2,"explanation":"The key drawback for the contractor is that quantity increases are not paid extra — if actual quantities exceed the estimate, the contractor absorbs the additional cost.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":123,"section":"lecture","text":"A fire emergency plan must include __________.","options":["Procedures for evacuation","Employee bonus plans","Daily work schedules","Entertainment options"],"answer":0,"explanation":"A fire emergency plan must include procedures for evacuation — who does what, where to go, and how to account for all personnel after evacuation.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":124,"section":"lecture","text":"A key feature of the unit price contract is:","options":["Payment is fixed before starting","Employer provides variation orders always","Costs vary based on quantities","Used only in electrical works"],"answer":2,"explanation":"The key feature of unit price contracts is that costs vary based on actual quantities — the final contract sum is determined by remeasurement, not fixed upfront.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":125,"section":"lecture","text":"A product that is not cost-effective and has high failure rates violates principles of ________ engineering.","options":["Social","Financial","Ethical","Theoretical"],"answer":2,"explanation":"Responsibility #5 requires adequate performance, cost-efficiency, low maintenance, and longevity. Violating these characteristics is a failure of ethical engineering practice.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":126,"section":"lecture","text":"A professional engineer should prioritize public welfare over ________.","options":["Safety","Ethics","Personal gain","Regulations"],"answer":2,"explanation":"Engineer responsibilities place safety of the public and welfare of society above personal gain . Ethical codes explicitly address conflicts of interest.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":127,"section":"lecture","text":"A responsible engineer must consider environmental sustainability in the ________ of products.","options":["Marketing","Transportation","Design","Distribution"],"answer":2,"explanation":"Environmental concerns are listed as Responsibility #3 of engineers. This is addressed during the design phase of products.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":128,"section":"lecture","text":"A significant challenge in addressing global warming is:","options":["Overproduction of oxygen","Deforestation reducing CO₂ absorption","Excessive rainfall","Increased volcanic activity"],"answer":1,"explanation":"Deforestation significantly challenges climate action — forests absorb CO₂, and their removal reduces this natural carbon sink, accelerating atmospheric CO₂ accumulation.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":129,"section":"lecture","text":"A strong work ethic involves _______.","options":["Ignoring assigned tasks","Completing tasks on time","Being unprofessional in attitude","Competing unfairly"],"answer":1,"explanation":"A strong work ethic specifically involves completing tasks on time and with diligence — mastering every detail of one's work.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":130,"section":"lecture","text":"A well-designed engineering product should be cost-efficient, have adequate performance, and require ________.","options":["Frequent repairs","High maintenance cost","Minimal maintenance","No testing"],"answer":2,"explanation":"Engineer Responsibility #5 requires products to have adequate performance, cost-efficiency, low (minimal) operating and maintenance cost , and longevity.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":131,"section":"lecture","text":"A well-structured engineering product should have longevity, low maintenance, and ________.","options":["High cost","Adequate performance","Unreliable output","No regulations"],"answer":1,"explanation":"Under Responsibility #5, products must have adequate performance , cost-efficiency, low operating/maintenance cost, and longevity/durability.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":132,"section":"lecture","text":"A workplace hazard analysis includes reviewing ________.","options":["Employee vacations","Safety training videos","Incident records and screening surveys","Company profits"],"answer":2,"explanation":"A workplace hazard analysis includes reviewing incident records and screening surveys — historical data on injuries and illnesses helps identify patterns and recurring hazards.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":133,"section":"lecture","text":"According to Dr. Mokhtar, what is the best time to study difficult subjects?","options":["Late at night","Early afternoon","Right before bedtime","Early morning before breakfast"],"answer":1,"explanation":"Dr. Mokhtar recommends early afternoon as the best time to study difficult subjects — when alertness and cognitive performance tend to be at their peak.","bloom":"","lecture":"L9","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":134,"section":"lecture","text":"According to OSHA, when must fall protection be provided in the construction industry?","options":["4 feet above ground level","6 feet above ground level","10 feet above ground level","12 feet above ground level"],"answer":1,"explanation":"OSHA requires fall protection in construction when workers are 6 feet or more above a lower level . (General industry threshold is 4 feet; maritime is 5 feet.)","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":135,"section":"lecture","text":"According to the lecture, what should you do before attending a class to be a good listener?","options":["Arrive just on time","Read a different subject to warm up","Review your notes","Watch a motivational video"],"answer":2,"explanation":"To be a good listener in class, you should review your notes before attending — prior review activates background knowledge and helps you follow the lecture more effectively.","bloom":"","lecture":"L9","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":136,"section":"lecture","text":"Acid rain is formed when pollutants like sulfuric acid combine with:","options":["Carbon dioxide in the atmosphere","Oxygen molecules","Water droplets in the air","Nitrogen gas"],"answer":2,"explanation":"Acid rain forms when sulfur dioxide and nitrogen oxides combine with water droplets in the air to form sulfuric and nitric acids — precipitating as acidic rain.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":137,"section":"lecture","text":"An argument that considers only one perspective lacks which intellectual standard?","options":["Depth","Breadth","Clarity","Fairness"],"answer":1,"explanation":"Breadth requires considering multiple perspectives. An argument that considers only one viewpoint is narrow and lacks the breadth needed for complete critical thinking.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":138,"section":"lecture","text":"An employer wants to ensure fixed total cost and shift risk to the contractor. Which contract is best?","options":["Cost Plus","BOT","Unit Price","Lump Sum"],"answer":3,"explanation":"A Lump Sum contract is best when the employer wants a fixed total cost and to transfer quantity and cost risk to the contractor — the contractor bears overrun risk.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":139,"section":"lecture","text":"An engineer should refuse to work on a project that violates ________ principles.","options":["Ethical","Political","Marketing","Sales"],"answer":0,"explanation":"Responsibility #4 requires engineers to abide by laws, regulations, standards, and ethical codes . Violating ethical principles is grounds to refuse a project.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":140,"section":"lecture","text":"An example of a non-traditional engineering major is ________.","options":["Civil Engineering","Mechanical Engineering","Genetic Engineering","Electrical Engineering"],"answer":2,"explanation":"Genetic Engineering is listed as a non-traditional major. Traditional majors include Civil, Mechanical, Electrical, Chemical, Computer, Architectural, Construction, and Environmental Engineering.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":141,"section":"lecture","text":"BOT contracts are commonly used in:","options":["Home renovations","Infrastructure projects","Office building maintenance","Landscape design"],"answer":1,"explanation":"BOT (Build-Operate-Transfer) contracts are used in infrastructure projects — typically when the government lacks financial appropriations and allows private entities to fund, build, and operate infrastructure.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":142,"section":"lecture","text":"BOT contracts are mainly used when:","options":["Government lacks design resources","Engineers are unavailable","No financial appropriations are available","Employer owns land"],"answer":2,"explanation":"BOT contracts are primarily used when no financial appropriations are available from the government — they allow infrastructure development financed by private capital.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":143,"section":"lecture","text":"BOT stands for:","options":["Build-Operate-Transfer","Buy-Operate-Transfer","Base-Office-Timing","Build-Organize-Test"],"answer":0,"explanation":"BOT stands for Build-Operate-Transfer — the private company builds the facility, operates it to recover costs and profit, then transfers ownership to the government.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":144,"section":"lecture","text":"Breadth as an intellectual standard requires that an argument must:","options":["Be true in all situations","Be free of contradictions","Consider multiple perspectives","Contain only simple concepts"],"answer":2,"explanation":"Breadth requires that arguments consider multiple perspectives — an argument that considers only one viewpoint lacks breadth regardless of its logical validity.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":145,"section":"lecture","text":"Can subcontractors and their workers claim wages directly from the employer?","options":["Yes, but only up to the amount owed to the original contractor","No, they must go through the original contractor","Only if the employer agrees","Only if the court orders it"],"answer":0,"explanation":"Subcontractors and workers can claim wages directly from the employer, but only up to the amount the employer owes to the original contractor — preventing double payment.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":146,"section":"lecture","text":"Complete the sentence: 'One way to prevent falls from heights is to use _______.'","options":["Guardrails and warning lines","Loose ladders","Unsecured planks","Improvised supports"],"answer":0,"explanation":"Guardrails and warning lines are primary fall prevention measures — they create physical barriers and visual cues to prevent workers from approaching unprotected edges.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":147,"section":"lecture","text":"Complete the sentence: 'OSHA enforces workplace safety through _______.'","options":["Employee surveys","Worksite inspections","Online reports","Employer self-assessments"],"answer":1,"explanation":"OSHA enforces workplace safety through worksite inspections — conducted by compliance officers who examine workplaces for violations of safety standards.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":148,"section":"lecture","text":"Complete the statement: 'Ethical engineers should prioritize safety over ________.'","options":["Profit and deadlines","Technical accuracy","Teamwork and collaboration","Scientific innovation"],"answer":0,"explanation":"The Challenger case exemplifies that ethical engineers must prioritize safety over profit and deadlines — schedule pressure caused managers to override safety warnings.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":149,"section":"lecture","text":"Complete the statement: 'In answering ethical questions about the Challenger disaster, we must consider that engineers had families to support and...'","options":["...they could not afford to take risks with their careers.","...they prioritized scientific progress over ethical concerns.","...they were the only ones responsible for safety.","...they deliberately ignored all potential risks."],"answer":0,"explanation":"Engineers faced a moral dilemma: they knew the risks but could not afford to take risks with their careers — illustrating the tension between professional duty and personal/economic pressure.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":150,"section":"lecture","text":"Complete the statement: 'Plagiarism can be a result of dishonesty, ________, and ignorance.'","options":["Carelessness and laziness","Hard work and diligence","Intelligence and research skills","Proper documentation"],"answer":0,"explanation":"Plagiarism arises from dishonesty, carelessness and laziness , and ignorance — not all plagiarism is intentional, but all forms are unacceptable academically.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":151,"section":"lecture","text":"Complete the statement: 'The Challenger disaster serves as a reminder that technical warnings should never be ________.'","options":["Ignored for the sake of deadlines","Shared with management","Discussed publicly","Considered before making decisions"],"answer":0,"explanation":"The Challenger disaster demonstrates that technical warnings should never be ignored for the sake of deadlines — schedule pressure must never override safety concerns.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":152,"section":"lecture","text":"Complete the statement: 'The ethical failure in the Challenger disaster was due to a combination of technical flaws and ________.'","options":["Management decisions that ignored safety warnings","The inexperience of NASA engineers","A lack of scientific understanding","Public pressure from the media"],"answer":0,"explanation":"The ethical failure was a combination of technical flaws AND management decisions that ignored safety warnings — a systemic organizational failure, not merely a technical one.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":153,"section":"lecture","text":"Complying with laws and protecting confidentiality are examples of _______.","options":["Personal habits","Professional ethics practices","Business strategies","Legal loopholes"],"answer":1,"explanation":"Complying with laws and protecting confidentiality are concrete examples of professional ethics practices in action.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":154,"section":"lecture","text":"Deontology emphasizes ________ rather than consequences.","options":["Duty","Profit","Power","Punishment"],"answer":0,"explanation":"Deontology requires that we put duty first, act rationally, and give moral weight to the inherent equality of all human beings — regardless of outcomes.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":155,"section":"lecture","text":"Developing a strong work ethic includes _______.","options":["Arriving late to appointments","Cultivating self-discipline","Ignoring deadlines","Working without balance"],"answer":1,"explanation":"A strong work ethic requires cultivating self-discipline — completing tasks on time, being diligent, and maintaining professional reliability.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":156,"section":"lecture","text":"Direct costs of workplace accidents include __________.","options":["Investigation time","Lost contracts","Medical expenses and insurance claims","Lower employee morale"],"answer":2,"explanation":"Direct costs of workplace accidents include medical expenses and insurance claims — costs that are directly measurable and immediately linked to the accident.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":157,"section":"lecture","text":"Employees have the right to:","options":["Request an OSHA inspection","Report workplace hazards","Refuse unsafe work","All of the above"],"answer":3,"explanation":"Employees have all of the above rights : to request an OSHA inspection, report workplace hazards, and refuse work that poses imminent danger — all protected under OSHA.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":158,"section":"lecture","text":"Engineering ethics examines standards for engineers' obligations to _______.","options":["The economy","The public, clients, and employers","Political leaders","Marketing firms"],"answer":1,"explanation":"Engineering ethics examines standards for engineers' obligations to the public, clients, and employers — the three primary stakeholders in professional engineering.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":159,"section":"lecture","text":"Engineering ethics helps in making responsible decisions while avoiding ________.","options":["Legal compliance","Public safety","Unethical practices","Professional growth"],"answer":2,"explanation":"Engineering ethics is concerned with guiding engineers toward responsible decision-making and away from unethical practices .","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":160,"section":"lecture","text":"Engineering ethics is primarily defined by _______.","options":["Cultural traditions","Professional codes and standards","Political affiliations","Business trends"],"answer":1,"explanation":"Engineering ethics is defined by professional codes and standards — established guidelines that govern engineers' conduct and decision-making.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":161,"section":"lecture","text":"Engineers have a responsibility to ensure public safety and ________.","options":["Economic instability","Low efficiency","Welfare of society","High costs"],"answer":2,"explanation":"Engineers are responsible for (1) Safety of the public and (2) Welfare of society , among other responsibilities.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":162,"section":"lecture","text":"Engineers should avoid _______ when handling communication.","options":["Copyright infringement","Transparency","Accurate reporting","Safety warnings"],"answer":0,"explanation":"Engineers must avoid copyright infringement in communications. Ethical communication practices include transparency, accuracy, proper citation, and inclusion of safety warnings.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":163,"section":"lecture","text":"Engineers uphold the integrity of the profession by _______.","options":["Using their skills to enhance human welfare","Engaging in unfair competition","Misrepresenting their qualifications","Avoiding technical societies"],"answer":0,"explanation":"Engineers uphold professional integrity by using their skills to enhance human welfare — placing public benefit above personal or commercial interests.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":164,"section":"lecture","text":"Ethical research requires that sources be:","options":["Hidden from competitors","Properly documented and acknowledged","Altered to fit research conclusions","Plagiarized in a subtle manner"],"answer":1,"explanation":"Ethical research requires that all sources be properly documented and acknowledged — protecting intellectual property and maintaining academic integrity.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":165,"section":"lecture","text":"Ethics are _____, while morals are _____.","options":["Internal / external","External / internal","Personal / societal","Legal / optional"],"answer":1,"explanation":"Ethics refer to rules provided by an external source (codes of conduct, religions), while morals refer to an individual's own (internal) principles regarding right and wrong.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":166,"section":"lecture","text":"Ethics is a system of _______ principles that affect how people make decisions and lead their lives.","options":["Social","Political","Moral","Religious"],"answer":2,"explanation":"Ethics is defined as a system of moral principles that influence decision-making and conduct.","bloom":"","lecture":"L2","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":167,"section":"lecture","text":"Ethics is a system of ________ principles.","options":["Legal","Religious","Moral","Political"],"answer":2,"explanation":"The lecture defines ethics as 'a system of moral principles' concerned with what is good for individuals and society.","bloom":"","lecture":"L1","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":168,"section":"lecture","text":"Excessive nutrients like nitrates and phosphates in water bodies lead to:","options":["Increased fish populations","Algal blooms that deplete oxygen","Enhanced water clarity","Reduction in aquatic plant growth"],"answer":1,"explanation":"Excess nutrients cause algal blooms (eutrophication) — massive algae growth depletes dissolved oxygen, creating 'dead zones' where fish and aquatic life cannot survive.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":169,"section":"lecture","text":"FIDIC contracts are named based on:","options":["Project size","Region of use","Cover color of each form","Budget range"],"answer":2,"explanation":"FIDIC contracts are traditionally named by cover color — Red Book (civil works), Yellow Book (mechanical/electrical), White Book (consulting services), Orange Book (turnkey).","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":170,"section":"lecture","text":"FIDIC stands for:","options":["Federal Institution of Design in Construction","Fédération Internationale Des Ingénieurs-Conseils","Foreign Institute for Design in Civil","Federation of Industrial Design for Infrastructure"],"answer":1,"explanation":"FIDIC stands for Fédération Internationale Des Ingénieurs-Conseils — the International Federation of Consulting Engineers, founded in 1913.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html","ASU113_MCQ_Bank.html"]},{"id":171,"section":"lecture","text":"Fire safety procedures include __________.","options":["Proper alarm systems","Training only managers","Delaying emergency response","Blocking emergency exits"],"answer":0,"explanation":"Fire safety procedures include proper alarm systems to alert all occupants — along with evacuation procedures, fire drills, and clear exit routes.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":172,"section":"lecture","text":"Groundwater contamination is often a result of:","options":["Surface runoff from forests","Sewage leakage and improper waste disposal","Evaporation of surface water","Natural mineral deposits"],"answer":1,"explanation":"Groundwater contamination commonly results from sewage leakage and improper waste disposal — contaminants percolate through soil into aquifers, threatening drinking water supplies.","bloom":"","lecture":"L8","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":173,"section":"lecture","text":"High-visibility clothing is used for __________.","options":["Increasing safety in high-risk areas","Making employees look uniform","Replacing personal protective gear","Preventing air pollution"],"answer":0,"explanation":"High-visibility clothing (hi-vis/reflective wear) is used for increasing safety in high-risk areas — making workers visible to equipment operators and vehicle drivers.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":174,"section":"lecture","text":"How often must fire extinguishers be inspected?","options":["Weekly","Monthly","Yearly","Only after use"],"answer":1,"explanation":"OSHA requires fire extinguishers to be inspected monthly — a quick visual check to ensure they are charged, unobstructed, and in proper condition.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":175,"section":"lecture","text":"How should references be listed in an academic paper?","options":["Alphabetically by the author's last name","Numerically based on their first appearance in the text","Randomly as long as they are all included","Grouped by type (books, articles, websites)"],"answer":1,"explanation":"References should be listed numerically based on their first appearance in the text — this is the standard citation format referenced in the lecture (e.g., [1], [2]).","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":176,"section":"lecture","text":"If a company determines that its generating capacity is greater than its load supplied, it has a ______ power reserve.","options":["Negative","Zero","Positive","Unstable"],"answer":2,"explanation":"If generating capacity exceeds load supplied, the company has a positive power reserve — it produces more than it currently needs.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":177,"section":"lecture","text":"If a company has a high generating cost but low power reserve, it should:","options":["Buy power from a company with lower generation costs","Increase the number of generating units","Reduce load supplied","Raise prices for consumers"],"answer":0,"explanation":"Logically, a company with high generating costs and low reserves should buy power from a company with lower generation costs — this is the cost-efficient and logical decision.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":178,"section":"lecture","text":"If a company with high generation costs continues producing power instead of buying from a cheaper source, it is violating which standard?","options":["Fairness","Logicalness","Completeness","Relevance"],"answer":1,"explanation":"It violates Logicalness — the decision to continue expensive production when cheaper alternatives exist does not make sense given the evidence, contradicting rational reasoning.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":179,"section":"lecture","text":"If a company's load supplied exceeds its generation capacity, it must:","options":["Increase its generating units","Sell its extra power","Shut down operations","Reduce its power reserve"],"answer":0,"explanation":"If load supplied exceeds generation capacity, the company has a capacity deficit and must increase its generating units to meet demand.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":180,"section":"lecture","text":"If a conclusion is supported by a large number of observations but is still uncertain, the reasoning used is:","options":["Deductive","Inductive","Circular","False analogy"],"answer":1,"explanation":"This is inductive reasoning — many observations support the conclusion but cannot guarantee it with certainty. More observations increase probability but not logical certainty.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":181,"section":"lecture","text":"If a worker experiences an amputation, OSHA must be notified within:","options":["8 hours","24 hours","48 hours","72 hours"],"answer":1,"explanation":"OSHA must be notified of a work-related amputation within 24 hours . Fatalities must be reported within 8 hours; in-patient hospitalizations within 24 hours.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":182,"section":"lecture","text":"If an employee is exposed to asbestos, OSHA requires:","options":["Annual medical exams","Proper ventilation","PPE such as respirators","All of the above"],"answer":3,"explanation":"For asbestos exposure, OSHA requires all of the above : annual medical examinations, proper engineering controls (ventilation), and PPE including respirators.","bloom":"","lecture":"L4","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":183,"section":"lecture","text":"If an engineer knowingly approves a flawed design for production, they are violating:","options":["Professional ethics and safety standards","Corporate financial policies","Trade secrecy laws","Employee conduct rules"],"answer":0,"explanation":"Knowingly approving a flawed design violates professional ethics and safety standards — specifically the fundamental canon that engineers hold public safety paramount.","bloom":"","lecture":"L3","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":184,"section":"lecture","text":"If an item increases by 20% in a unit price contract, payment is:","options":["Rejected","Renegotiated","Done using BOQ price","Done using new contract"],"answer":2,"explanation":"If quantities increase by up to 25%, payment for the additional quantities is still made using the original BOQ (Bill of Quantities) unit price .","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":185,"section":"lecture","text":"If an item increases by more than 25%, the contractor:","options":["Accepts the increase with no changes","Makes a variation order","Leaves the project","Reduces scope"],"answer":1,"explanation":"If a quantity increase exceeds 25%, the contractor submits a variation order — the significant deviation from the BOQ justifies renegotiation of the unit price for the excess quantities.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":186,"section":"lecture","text":"If Company A has the largest power reserve, it means:","options":["It generates less power than it consumes","Its generation capacity exceeds its load supplied","It is unable to meet energy demands","It has the highest generating cost"],"answer":1,"explanation":"The largest power reserve means generation capacity exceeds load supplied by the greatest margin — the company produces significantly more than it currently needs.","bloom":"","lecture":"CT","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":187,"section":"lecture","text":"If materials are wasted due to the contractor's negligence, what happens?","options":["The contractor must compensate the employer","The employer must pay for new materials","The subcontractor is held responsible","The contract is automatically voided"],"answer":0,"explanation":"If materials are wasted due to contractor negligence, the contractor must compensate the employer — negligent waste is the contractor's financial liability.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":188,"section":"lecture","text":"If the contractor dies and their qualifications were essential, what happens?","options":["The contract continues with heirs","The contract expires","The employer must find a new contractor","The subcontractor takes over"],"answer":1,"explanation":"If the contractor's personal qualifications were essential to the contract (intuitu personae) and they die, the contract expires — heirs cannot be forced to continue a personal-skills contract.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":189,"section":"lecture","text":"If the contractor saved 10% of total cost in a cost plus contract with saving incentive, they:","options":["Keep all savings","Return savings to employer","Share the savings per contract","Lose their profit"],"answer":2,"explanation":"With a savings incentive clause, both parties benefit: the contractor shares the savings per the contractual arrangement — motivating efficiency while giving the employer a portion of the benefit.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":190,"section":"lecture","text":"If the contractor's work is defective but fixable, what happens?","options":["The employer can terminate the contract immediately","The contractor gets a chance to repair it","The subcontractor must fix it for free","The consulting engineer repairs it"],"answer":1,"explanation":"If defective work is fixable, the contractor gets a chance to repair it — termination is reserved for irremediable defects. The contractor has the right and obligation to remedy fixable issues.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":191,"section":"lecture","text":"If the employer provides materials, what is the contractor's responsibility?","options":["To use them carelessly","To take care of them and return unused materials","To sell them for profit","To pass them to the subcontractor without accountability"],"answer":1,"explanation":"When the employer provides materials, the contractor must take care of them and return any unused materials — the contractor bears custodial responsibility for employer-supplied materials.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":192,"section":"lecture","text":"If the employer refuses to receive the work without a valid reason, what happens?","options":["The work is considered officially delivered","The contractor keeps the work","The contract is voided","The contractor must redo the work"],"answer":0,"explanation":"If the employer refuses delivery without a valid reason, the work is considered officially delivered — an unjustified refusal cannot delay the contractor's rights.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":193,"section":"lecture","text":"If the employer stops work without reason, what must they pay?","options":["Only executed work costs","Expenses + compensation for lost earnings","Nothing","Only material costs"],"answer":1,"explanation":"If the employer unjustifiably stops work, they must pay the contractor expenses plus compensation for lost earnings — covering both direct costs and lost profit opportunity.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":194,"section":"lecture","text":"If the wage is not determined in the contract, how is it calculated?","options":["Based on the contractor's expenses and work value","Fixed by law","Decided by the subcontractor","Set by the consulting engineer"],"answer":0,"explanation":"If the wage is not predetermined, it is calculated based on the contractor's expenses and the value of the work — an equitable assessment of the actual cost and fair profit.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":195,"section":"lecture","text":"In a bid submission, what do the two sealed envelopes contain?","options":["Legal and financial documents","Technical and financial offers","Contractor's qualifications and project timeline","Insurance and warranty documents"],"answer":1,"explanation":"Bids are submitted in two sealed envelopes: one containing the technical offer and one containing the financial offer — evaluated separately in sequence.","bloom":"","lecture":"L6","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":196,"section":"lecture","text":"In a BOT contract, the company recovers:","options":["Just the material cost","Project approval cost","Costs + profit over time","Engineer's salary"],"answer":2,"explanation":"In BOT contracts, the private company recovers its costs plus profit over time through operating the facility (collecting tolls, fees, etc.) during the concession period.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":197,"section":"lecture","text":"In a cost plus contract, profit can be determined by:","options":["A fixed price","A percentage of costs","Unit price","BOQ only"],"answer":1,"explanation":"In a cost plus contract, profit is typically determined as a percentage of actual costs — or alternatively as a fixed fee, or a share of savings.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":198,"section":"lecture","text":"In a lump sum contract, the contractor agrees to a total price:","options":["After finishing the work","Before starting the work","After budget review","Based on unit price"],"answer":1,"explanation":"In a lump sum contract, the contractor agrees to a fixed total price before starting the work — this price covers all work regardless of actual quantities or costs incurred.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":199,"section":"lecture","text":"In a lump sum contract, the project scope increased. What happens?","options":["Contractor asks for more payment","Employer revises drawings","Contractor handles cost without extra payment","Engineer issues variation order"],"answer":2,"explanation":"In a lump sum contract, if the scope increases within the agreed framework, the contractor handles the cost without extra payment — quantity risk was accepted at contract signing.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":200,"section":"lecture","text":"In a lump-sum contract, when can the contractor request a wage increase?","options":["Only if the employer agrees or due to the employer's mistake","Anytime prices rise","Only if the subcontractor demands it","Whenever material costs change"],"answer":0,"explanation":"In a lump-sum contract, a wage increase can only be requested if the employer agrees or due to the employer's mistake (e.g., design changes) — not unilaterally due to market price changes.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":201,"section":"lecture","text":"In a unit price contract, item X increased by 30%. What should the contractor do?","options":["Use original unit price","Stop work","Submit variation order","Increase BOQ price"],"answer":2,"explanation":"A 30% increase exceeds the 25% threshold in unit price contracts, so the contractor should submit a variation order to renegotiate the unit price for the excess quantities.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":202,"section":"lecture","text":"In a unit price contract, the contractor provides:","options":["A fixed total amount","Design drawings","A price per each unit of work","A bonus margin"],"answer":2,"explanation":"In a unit price (remeasurement) contract, the contractor provides a price per unit of work — payment is based on actual quantities measured upon completion.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":203,"section":"lecture","text":"In a unit-price contract, if costs increase, what must the contractor do?","options":["Absorb the extra cost","Notify the employer (variation order)","Stop work immediately","Pass the cost to the subcontractor"],"answer":1,"explanation":"In a unit-price contract, if costs increase beyond the BOQ quantities, the contractor must notify the employer via a variation order — quantities are remeasured and paid accordingly.","bloom":"","lecture":"L5","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":204,"section":"lecture","text":"In cost plus contracts, who bears the risk of overspending?","options":["Employer","Contractor","Engineer","Subcontractor"],"answer":0,"explanation":"In cost plus contracts, the employer bears the risk of overspending — since all actual costs are reimbursed, cost overruns directly impact the employer's final payment.","bloom":"","lecture":"L7","source":"ASU113_Full_MCQ_Bank.html","sources":["ASU113_Full_MCQ_Bank.html"]},{"id":205,"section":"lecture","text":"In lump sum contracts, who bears the cost if quantities increase?","options":["The employer","The engineer","The contractor","The government"],"answer":2,"explanation":"In a lump sum contract, the contractor bears the cost if qu
