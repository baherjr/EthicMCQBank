ation":"The dual-envelope system ensures technical proposals are evaluated purely on merit before any financial information is seen. Financial envelopes are only opened for technically accepted bids, preventing cheap but unqualified bids from winning on price alone.","bloom":"Understand","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":982,"section":"lecture","text":"Why does contracting with the government require more controls than ordinary construction contract law?","options":["Because government projects are always larger in scale","Because one party is the government, requiring additional safeguards to protect public funds and ensure fairness","Because international standards mandate extra oversight for public works","Because government engineers are not legally liable under civil law"],"answer":1,"explanation":"When a government entity is a party to a contract, it is acting as a steward of public resources. Extra controls — through tenders and auctions law — exist to protect public funds, ensure equal opportunity for all competitors, and prevent corruption.","bloom":"Understand","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":983,"section":"lecture","text":"A BOT project's operating period ends. The company claims it has not yet recovered its investment and wants to extend operations. The government argues the transfer must occur as agreed. Which position is legally stronger under the BOT concept?","options":["The company — recovering investment is a prerequisite to transfer","The government — the transfer timeline is agreed at contract signing; the company bears the risk of its own financial projections","Both parties share the risk equally","The engineer decides the transfer date"],"answer":1,"explanation":"In a BOT contract, the operating period and transfer conditions are agreed upfront. The company accepts the risk that its revenue projections may be optimistic. The government's position is stronger — the agreement defines the transfer date, and the company assumed the financial risk when it chose to enter the BOT arrangement. Extending at will would undermine the entire BOT model.","bloom":"Analyze","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":984,"section":"lecture","text":"A contractor is building a hospital under a lump sum contract. Mid-project, it turns out the structural concrete quantities are 30% higher than the approximate numbers in the employer's drawings. Can the contractor claim extra payment?","options":["Yes — any quantity increase beyond the drawings entitles extra payment","Yes — increases above 25% always trigger a variation order in all contract types","No — in a lump sum contract, the contractor absorbs all quantity increases without a price increase","Only if the engineer certifies the increase"],"answer":2,"explanation":"This is a lump sum contract. The employer's drawings contained approximate quantities, and the contractor agreed to complete the scope for the fixed sum regardless. The 30% concrete overrun is the contractor's risk to absorb — no additional payment is due. This differs from unit price contracts where the 25% threshold applies.","bloom":"Apply","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":985,"section":"lecture","text":"A contractor is offered two contracts for the same project: (A) a lump sum at EGP 10 million based on approximate quantities, or (B) a unit price contract with a BOQ. The contractor believes actual quantities will be 35% higher than the approximate numbers. Which contract should the contractor prefer, and why?","options":["Contract A — the fixed price gives the contractor certainty","Contract B — unit price pays for actual quantities; a 35% increase above the 25% threshold triggers a variation order, allowing the contractor to set a new rate for the excess","Contract A — lump sum contracts allow variation orders for increases above 25%","Either — both contracts treat quantity overruns the same way"],"answer":1,"explanation":"With a predicted 35% quantity overrun, the lump sum (A) would force the contractor to absorb the full overrun at the fixed price — a significant financial loss. The unit price contract (B) pays for actual quantities: the first 25% overrun is at the BOQ rate, and the additional 10% (the portion exceeding 25%) triggers a variation order where the contractor sets a preferred rate. Unit price clearly protects the contractor better when overruns are expected.","bloom":"Evaluate","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":986,"section":"lecture","text":"A contractor proposes a cost-plus contract where he receives his actual costs back plus 15% of whatever savings he achieves below a target cost. Which cost-plus variant is this?","options":["Percentage of costs as profit margin","Fixed profit amount regardless of costs","Percentage of costs as profit margin plus a share of savings","Time and materials with a cap"],"answer":2,"explanation":"This describes the third cost-plus variant: a percentage of costs forms the baseline profit, but the contractor also receives a share of any savings below the agreed target cost. This incentivizes the contractor to work efficiently — unlike a pure percentage-of-costs model where spending more means more profit.","bloom":"Apply","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":987,"section":"lecture","text":"A cost-plus contract has three variants for determining the profit margin. What are they?","options":["Fixed fee, percentage of savings, and BOQ rate","Percentage of costs, fixed profit amount, and percentage of costs plus a share of savings","Hourly rate, material markup, and overhead multiplier","Market rate, negotiated rate, and government-set rate"],"answer":1,"explanation":"The lecture identifies three cost-plus profit structures: (1) a percentage of total costs as profit margin, (2) a fixed lump sum profit regardless of actual costs, and (3) a percentage of costs as profit margin plus a share of any savings achieved below the target cost.","bloom":"Understand","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":988,"section":"lecture","text":"A government has no budget to build a new highway but needs it urgently for economic development. Which contract type is most appropriate, and why?","options":["Lump sum — it fixes the government's maximum liability","Unit price — it allows flexible quantity adjustments during construction","BOT — a private company builds and operates it to recoup costs, then transfers ownership to the government","Cost-plus — the government pays actual costs plus a fee"],"answer":2,"explanation":"BOT is specifically designed for this scenario: no government financial appropriations, infrastructure project needed. A private company finances and builds the highway, collects tolls to recover investment and earn profit over a defined period, then transfers the highway to the government.","bloom":"Apply","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":989,"section":"lecture","text":"A project owner is comparing lump sum and unit price contracts for a complex building where quantities are uncertain. Which contract better protects the owner from cost overruns, and which better protects the contractor from quantity risk?","options":["Lump sum protects both equally; unit price benefits only the contractor","Lump sum protects the owner from cost overruns (fixed price); unit price protects the contractor (quantities are re-measured and paid as built)","Unit price protects the owner; lump sum protects the contractor","Both contract types transfer all risk to the contractor"],"answer":1,"explanation":"The key distinction is who absorbs quantity risk. In a lump sum, the price is fixed — the owner knows his maximum cost, and the contractor absorbs overruns. In a unit price contract, quantities are measured as built and paid per unit — the contractor is paid for actual work done, protecting him from quantity uncertainty. With uncertain quantities, the owner bears more financial risk under unit price, while the contractor bears more under lump sum.","bloom":"Analyze","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":990,"section":"lecture","text":"An Egyptian government authority is negotiating a large civil engineering contract with a German construction firm. The German firm insists on using FIDIC contracts. Which FIDIC color book applies, and is this situation valid in Egypt?","options":["Yellow book; not valid in Egypt","Red book; valid — Egypt permits FIDIC in joint projects with foreign parties who request it","Orange book; valid only if it is a design-build project","White book; valid for all international contracts in Egypt"],"answer":1,"explanation":"Civil engineering works fall under the FIDIC Red Book. The situation is valid: the lecture confirms FIDIC is used in Egypt specifically for joint projects with foreign parties who request it. The German firm's insistence on FIDIC is the exact scenario described.","bloom":"Apply","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":991,"section":"lecture","text":"An employer wants maximum cost certainty and is willing to pay a premium for it. The project scope is well-defined. Which contract type best serves the employer?","options":["Cost-plus with percentage fee — contractor is motivated to control costs","Unit price — quantities can be adjusted as needed","Lump sum — the total price is fixed upfront regardless of actual quantities","BOT — the employer pays nothing upfront"],"answer":2,"explanation":"Lump sum offers the employer the greatest price certainty: a fixed, agreed total amount regardless of actual quantities. With a well-defined scope (detailed drawings and specifications), this works well. Cost-plus does the opposite — the employer absorbs all cost variability.","bloom":"Apply","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":992,"section":"lecture","text":"FIDIC is described as an organization that \"speaks on behalf of consulting engineers.\" What does this mean in practice?","options":["FIDIC certifies individual engineers globally","FIDIC lobbies governments to increase engineer salaries","FIDIC creates standardized contract templates that define the rights, obligations, and relationships between employer, contractor, and engineer on an internationally agreed basis","FIDIC resolves contract disputes between employers and contractors"],"answer":2,"explanation":"FIDIC's role is standard-setting: it develops internationally recognized contract templates that codify balanced terms for all three parties (employer, contractor, engineer). By doing so, it represents consulting engineers' interests in how construction relationships are formally structured worldwide.","bloom":"Understand","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":993,"section":"lecture","text":"In a lump sum contract, who bears the financial risk if actual quantities turn out to be higher than the approximate numbers in the drawings and specifications?","options":["The employer — he provided the drawings","The engineer — he prepared the specifications","The contractor — he is responsible for any quantity increase without a price increase","Both contractor and employer split the overrun equally"],"answer":2,"explanation":"In a lump sum contract, the employer provides drawings and specifications with approximate quantities. The contractor accepts the risk that actual quantities may be higher — any such increase is absorbed by the contractor with no change to the agreed lump sum amount.","bloom":"Remember","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":994,"section":"lecture","text":"In a unit price contract, a steel reinforcement item in the BOQ is 100 tons. Actual usage turns out to be 130 tons — a 30% increase. How should the additional 30 tons be priced?","options":["All 130 tons at the BOQ rate","All 130 tons at a new negotiated rate","The first 25 tons (up to 125% of BOQ) at the BOQ rate; the remaining 5 tons at a variation order rate","All 30 extra tons at a variation order rate since the threshold was exceeded"],"answer":2,"explanation":"The 25% threshold determines the breakpoint. The BOQ quantity is 100 tons, so 125% = 125 tons. The first 125 tons are at the BOQ rate. The increase beyond 125% — the extra 5 tons — triggers the variation order, and the contractor prices those 5 tons separately. Not all extra tons switch to the new rate, only those beyond the 25% mark.","bloom":"Apply","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":995,"section":"lecture","text":"In a unit price contract, excavation quantities are 20% more than the BOQ. What price applies for the extra quantities?","options":["The contractor issues a variation order and sets a new price","The extra 20% is paid at the BOQ unit rate — below the 25% threshold","The extra quantities are not paid for","The engineer negotiates a blended rate"],"answer":1,"explanation":"The 25% threshold has not been crossed. Increases below 25% must be submitted at the rate already written in the BOQ. The contractor has no right to issue a variation order or demand a different rate. The BOQ rate governs all quantities up to 125% of the original figure.","bloom":"Apply","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":996,"section":"lecture","text":"In a unit price contract, what triggers the contractor's right to issue a variation order and set a new price for an item?","options":["Any quantity increase, regardless of size","A quantity increase of exactly 25%","A quantity increase exceeding 25% of the BOQ quantity for that item","A quantity decrease of more than 10%"],"answer":2,"explanation":"The threshold is clear: increases of less than 25% must be priced at the BOQ rate. Only when an increase exceeds 25% does the contractor gain the right to issue a variation order and negotiate a new unit price for that item.","bloom":"Remember","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":997,"section":"lecture","text":"In Egypt, when are FIDIC contracts used?","options":["In all government construction projects","Only in BOT infrastructure projects","Only in joint projects with foreign parties who specifically request FIDIC contracts","In any project valued above EGP 10 million"],"answer":2,"explanation":"The lecture explicitly states that FIDIC is only used in Egypt for joint projects with foreign parties, and only when those foreign parties specifically request it. FIDIC contracts are not the standard for purely domestic Egyptian construction projects.","bloom":"Understand","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":998,"section":"lecture","text":"What is the defining characteristic of a BOT contract?","options":["The contractor builds and immediately transfers ownership to the government","A company builds, operates the project for a period to recover costs and profit, then transfers ownership to the government","The government builds and outsources operation to a private company","The contractor builds under a fixed-price contract with a bonus for early transfer"],"answer":1,"explanation":"BOT (Build, Operate, Transfer) has three sequential phases: the company finances and builds the project, operates it for enough time to recover its investment plus profit, and then transfers full ownership to the government. It is specifically used for infrastructure when government funding is unavailable.","bloom":"Remember","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":999,"section":"lecture","text":"Which FIDIC contract color covers civil engineering works?","options":["White","Yellow","Orange","Red"],"answer":3,"explanation":"FIDIC contracts are color-coded by type: Red = civil engineering works, Yellow = mechanical and electrical works, Orange = design and construction (turnkey), White = terms between employer and consulting engineer.","bloom":"Remember","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":1000,"section":"lecture","text":"Why is a lump sum contract generally riskier for the contractor than for the employer?","options":["Because the employer can change the design at any time without paying extra","Because the contractor must absorb all quantity increases beyond the approximate BOQ numbers at the fixed price","Because lump sum contracts have no dispute resolution mechanism","Because the contractor receives payment only at project completion"],"answer":1,"explanation":"The employer fixes a price upfront and is protected from cost overruns. The contractor, having agreed to a fixed sum, must complete the full scope regardless of whether actual quantities are higher than the approximate numbers given. This transfers quantity risk entirely to the contractor.","bloom":"Understand","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":1001,"section":"lecture","text":"Why is BOT specifically used for infrastructure projects when there are no government financial appropriations?","options":["Because infrastructure projects are always profitable for private companies","Because the private company finances, builds, and recoups its investment through operating revenue — removing the need for upfront government funding","Because international law requires BOT for all infrastructure","Because BOT contracts are exempt from the tenders and auctions law"],"answer":1,"explanation":"BOT solves the funding gap problem: the government gets critical infrastructure built without spending public money upfront. The private company invests its own capital, recovers it through operation (tolls, fees, etc.), earns a profit, and eventually transfers a fully operational asset to the government.","bloom":"Understand","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]},{"id":1002,"section":"lecture","text":"Why might a cost-plus contract with a \"fixed profit + share of savings\" be more efficient than a pure \"percentage of costs\" cost-plus contract?","options":["Because fixed profit contracts always cost less than percentage contracts","Because the percentage model gives the contractor no incentive to control costs — spending more means more profit — while the savings-sharing model directly rewards efficiency","Because fixed profit contracts are required by FIDIC standards","Because savings-sharing eliminates the need for a BOQ"],"answer":1,"explanation":"A pure percentage-of-costs model creates a perverse incentive: the contractor earns more by spending more. The savings-sharing variant flips this by giving the contractor a financial stake in spending less. If the contractor finds ways to cut costs below a target, both parties benefit — aligning contractor and employer interests rather than opposing them.","bloom":"Analyze","lecture":"","source":"lecture7_quiz.html","sources":["lecture7_quiz.html"]}];
const LETTERS = ['A','B','C','D','E','F'];
const state = { section:'lecture', search:'', source:'all', page:1, pageSize:20, revealed:new Set() };
const el = {secLecture:document.getElementById('secLecture'),secExam:document.getElementById('secExam'),search:document.getElementById('search'),source:document.getElementById('source'),prev:document.getElementById('prev'),next:document.getElementById('next'),pageInfo:document.getElementById('pageInfo'),countInfo:document.getElementById('countInfo'),cards:document.getElementById('cards'),empty:document.getElementById('empty')};
function escapeHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#39;');}
function getSectionData(){return QUESTIONS.filter((q)=>q.section===state.section);}
function buildSourceFilter(){const sectionData=getSectionData();const set=new Set(sectionData.map((q)=>q.source));const sources=['all',...Array.from(set).sort()];el.source.innerHTML=sources.map((s)=>'<option value="'+escapeHtml(s)+'">'+(s==='all'?'All sources':escapeHtml(s))+'</option>').join('');if(!sources.includes(state.source))state.source='all';el.source.value=state.source;}
function filteredData(){const s=state.search.trim().toLowerCase();return getSectionData().filter((q)=>{if(state.source!=='all'&&q.source!==state.source)return false;if(!s)return true;const hay=[q.text,q.explanation,q.options.join(' '),q.source,q.lecture,q.bloom].join(' ').toLowerCase();return hay.includes(s);});}
function render(){el.secLecture.classList.toggle('active',state.section==='lecture');el.secExam.classList.toggle('active',state.section==='exam');const data=filteredData();const totalPages=Math.max(1,Math.ceil(data.length/state.pageSize));if(state.page>totalPages)state.page=totalPages;const start=(state.page-1)*state.pageSize;const rows=data.slice(start,start+state.pageSize);el.countInfo.textContent=String(data.length)+' question(s)';el.pageInfo.textContent='Page '+state.page+' / '+totalPages;el.prev.disabled=state.page<=1;el.next.disabled=state.page>=totalPages;if(!rows.length){el.cards.innerHTML='';el.empty.style.display='block';return;}el.empty.style.display='none';el.cards.innerHTML=rows.map((q,idx)=>{const displayIndex=start+idx+1;const shown=state.revealed.has(q.id);const optionsHtml=(q.options||[]).map((opt,oi)=>{const isCorrect=shown&&q.answer===oi;return '<div class="opt '+(isCorrect?'correct':'')+'"><strong>'+(LETTERS[oi]||(oi+1))+'.</strong> '+escapeHtml(opt)+'</div>';}).join('');const sourceCount=q.sources&&q.sources.length>1?' · merged from '+q.sources.length+' files':'';const answerNote=shown?(q.answer==null?'<span class="note">Answer key not available.</span>':'<span class="note">Correct answer: '+(LETTERS[q.answer]||(q.answer+1))+'</span>'):'';const expHtml=shown&&q.explanation?'<div class="exp"><strong>Explanation:</strong> '+escapeHtml(q.explanation)+'</div>':'';return '<article class="card"><div class="meta"><span class="badge">#'+displayIndex+'</span><span class="badge section-'+q.section+'">'+(q.section==='exam'?'Exam':'Lecture')+'</span>'+(q.lecture?'<span class="badge">'+escapeHtml(q.lecture)+'</span>':'')+(q.bloom?'<span class="badge">'+escapeHtml(q.bloom)+'</span>':'')+'<span class="badge">'+escapeHtml(q.source)+sourceCount+'</span></div><div class="q">'+escapeHtml(q.text)+'</div><div class="opts">'+(optionsHtml||'<div class="note">Options not available in source.</div>')+'</div><div class="actions"><button class="btn" type="button" onclick="toggleReveal('+q.id+')">'+(shown?'Hide answer':'Show answer')+'</button>'+answerNote+'</div>'+expHtml+'</article>';}).join('');}
function resetToFirstPage(){state.page=1;render();}
function toggleReveal(id){if(state.revealed.has(id))state.revealed.delete(id);else state.revealed.add(id);render();}
window.toggleReveal=toggleReveal;
el.secLecture.addEventListener('click',()=>{if(state.section==='lecture')return;state.section='lecture';state.source='all';buildSourceFilter();resetToFirstPage();});
el.secExam.addEventListener('click',()=>{if(state.section==='exam')return;state.section='exam';state.source='all';buildSourceFilter();resetToFirstPage();});
el.search.addEventListener('input',()=>{state.search=el.search.value;resetToFirstPage();});
el.source.addEventListener('change',()=>{state.source=el.source.value;resetToFirstPage();});
el.prev.addEventListener('click',()=>{if(state.page>1){state.page-=1;render();}});
el.next.addEventListener('click',()=>{const total=Math.max(1,Math.ceil(filteredData().length/state.pageSize));if(state.page<total){state.page+=1;render();}});
buildSourceFilter();
render();
</script>
</body>
</html>
