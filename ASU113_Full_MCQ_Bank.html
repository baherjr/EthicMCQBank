ontrols, identifying deficiencies, and determining what changes should be made to get improved controls.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":871,"section":"lecture","text":"A construction worker collapses on site. You check his airway — he is breathing. He has a deep cut on his leg actively bleeding. According to First Aid priorities, what should you do next?","options":["Look for other simple injuries on the body","Address the blood loss immediately","Treat shock before addressing the bleeding","Check for fractures first"],"answer":1,"explanation":"Breathing is checked (✔). The next priority is Check Blood Loss . Active bleeding is priority #2 and must be addressed before checking for shock, fractures, or simple injuries. The priority order is designed around life-threat severity.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":872,"section":"lecture","text":"A lab technician who has worked with benzene daily for 20 years develops leukemia. This is an example of a:","options":["Acute health effect","Chronic health effect","Direct workplace injury","Mechanical hazard consequence"],"answer":1,"explanation":"This is a chronic health effect — it developed after exposure over many years (20 years). Acute effects appear within hours or days. Chronic effects may not appear until long after initial exposure.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":873,"section":"lecture","text":"A university chemistry lab introduces a new highly corrosive acid that was not previously used. According to OSHA's Lab Standards, what must the institution do?","options":["Update the fire safety plan only","Conduct additional training because a new hazard has been introduced","Wait until the next annual inspection","Only notify the Chemical Hygiene Officer without further action"],"answer":1,"explanation":"OSHA's Lab Standards require institutions to \"conduct initial training & additional training if a new hazard is introduced into the lab .\" Introducing a new corrosive acid triggers this requirement immediately — not at the next annual review.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":874,"section":"lecture","text":"A worker falls from a roof and is caught by a harness connected to an anchor above. Which fall protection system was used?","options":["Safety monitors","Guardrails and warning lines","Personal fall arrest system","Safety nets"],"answer":2,"explanation":"A harness connected to an anchor point that stops (arrests) a fall mid-air is a Personal Fall Arrest System . Safety nets catch falls but are not connected to the worker. Guardrails and warning lines prevent approach to the edge. Safety monitors are designated observers.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":875,"section":"lecture","text":"A worker is about to use an angle grinder they have never operated before. According to the tool protection guidelines, what should they do FIRST?","options":["Put on PPE immediately and start using the tool","Inspect the tool and read the Tool Owner's Manual before use","Ask a colleague to demonstrate first without stopping","Store it until a certified trainer is available"],"answer":1,"explanation":"The first protection steps listed are: Inspect the tool before use and Read the Tool Owner's Manual prior to use . PPE use, guards, and safe handling are all required but come after knowing how to safely operate the equipment.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":876,"section":"lecture","text":"According to OSHA's 2022 Top 10 Cited Hazards, which hazard ranked #1?","options":["Scaffolding","Hazard Communication","Fall Protection – General Requirements","Machine Guarding"],"answer":2,"explanation":"Fall Protection – General Requirements (1926.501) ranked #1 in OSHA's 2022 Top 10 Cited Hazards. Falls are consistently the leading cause of fatalities in construction. Machine Guarding (#10) and Scaffolding (#5) also appear on the list.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":877,"section":"lecture","text":"According to the lecture definition, First Aid is help given until the arrival of:","options":["A senior engineer","OSHA inspectors","Medical help","The site manager"],"answer":2,"explanation":"The lecture defines First Aid as help given \"till the arrival of Medical Help .\" It is a temporary, immediate response — not a substitute for professional medical treatment. Its goal is to prevent the condition from worsening.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":878,"section":"lecture","text":"According to the lecture, scaffolding must have guardrails installed when the working height exceeds which measurement?","options":["6 feet","8 feet","10 feet","12 feet"],"answer":2,"explanation":"The lecture specifically states scaffolding must have guardrails over 10 feet . This is a testable numerical threshold — memorize it exactly as stated in the slides.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":879,"section":"lecture","text":"According to the scaffolding protection rules, scaffolding must be tied-in when the height-to-base ratio exceeds:","options":["2:1","3:1","4:1","5:1"],"answer":2,"explanation":"The lecture states scaffolding must be tied-in over 4:1 height to base ratio . This means if the scaffold height is more than 4 times its base width, it must be secured to the structure.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":880,"section":"lecture","text":"An \"acute\" health effect from a hazardous chemical is defined as one that occurs:","options":["After exposure over many years","Only after repeated exposure to the same chemical","Within hours or days of exposure","Only when the chemical is inhaled"],"answer":2,"explanation":"Acute = occurring within hours or days of exposure. Chronic = occurring after exposure over many years. This is a critical distinction often tested as a direct definition recall question.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":881,"section":"lecture","text":"During maintenance on a dump truck, the engine must be kept from accidentally starting. Which prevention measure should the mechanic apply?","options":["Wear high visibility clothing","Barricade the swing radius","Lockout or tag out the equipment during maintenance","Load the equipment properly before starting"],"answer":2,"explanation":"The lecture explicitly states: Lockout or tag out the equipment during maintenance . This procedure ensures no one can accidentally start or energize the equipment while workers are servicing it — directly addressing the maintenance hazard category.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":882,"section":"lecture","text":"During Step 2 (Analyze Workplace Hazards), which of the following is NOT listed as a method for finding existing and potential hazards?","options":["Records","Screening surveys","Social media monitoring","Existing controls"],"answer":2,"explanation":"The four listed hazard analysis methods are: Records, Incidents, Screening surveys, and Existing controls. Social media monitoring is not mentioned in the lecture slides.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":883,"section":"lecture","text":"How many Safety Achievement Steps are described in the lecture for creating a safe workplace?","options":["4","5","6","8"],"answer":2,"explanation":"The lecture outlines 6 Safety Achievement Steps : (1) Define scope of work, (2) Analyze workplace hazards, (3) Develop & implement controls, (4) Training & education, (5) Perform work within controls, (6) Record keeping & evaluation.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":884,"section":"lecture","text":"In the First Aid Priority list, which action comes SECOND after checking breathing?","options":["Treat fracture","Look for simple injuries","Check blood loss","Treat shock"],"answer":2,"explanation":"The First Aid priority order is: (1) Check Breathing → (2) Check Blood Loss → (3) Treat Shock → (4) Treat Fracture → (5) Look For Simple Injuries → (6) Disposal. Life-threatening conditions (airway, hemorrhage) are always addressed before less critical ones.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":885,"section":"lecture","text":"On what date did President Nixon sign the OSHA Act into law?","options":["April 28, 1970","January 1, 1971","December 29, 1970","July 4, 1972"],"answer":2,"explanation":"The OSHA Act was signed by President Nixon on December 29, 1970 . The agency itself formally came into being on April 28, 1971 — a common trap question confusing the signing date with the operational date.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":886,"section":"lecture","text":"Section 5(a)(1) of the OSHA Act places the primary duty of providing a hazard-free workplace on whom?","options":["The employees themselves","The employer","The government contractor","The insurance provider"],"answer":1,"explanation":"Section 5(a)(1) states: \"Each employer shall furnish to each of his employees employment and a place of employment which are free from recognized hazards that are causing or are likely to cause death or serious physical harm.\"","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":887,"section":"lecture","text":"The lecture covers both OSHA Lab Standards and First Aid for engineering students. What is the most likely reason these two seemingly different topics appear in the same Health & Safety lecture?","options":["First Aid and Lab Standards share the same OSHA standard code","Engineers work in labs and on sites, so they need both preventive legislation and immediate response skills","Lab Standards are only taught to avoid OSHA fines; First Aid is optional","First Aid training satisfies the Chemical Hygiene Plan requirement"],"answer":1,"explanation":"The lecture reflects a complete safety philosophy: prevention (OSHA standards, hazard analysis, lab hygiene plans) combined with response (First Aid priorities, recovery position, transportation). Engineers work across both lab environments and construction sites, requiring competence in both domains.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":888,"section":"lecture","text":"The lecture recommends two methods for avoiding conflicting movement of trucks, equipment, and workers. What are they?","options":["Separation by color coding and separation by training level","Separation by space (barriers) and separation by time","Separation by signage and separation by speed limits","Separation by shift work and separation by PPE type"],"answer":1,"explanation":"The lecture specifies exactly two separation strategies: Separation by space (barriers) — physically keeping trucks/workers in different zones, and Separation by time — scheduling activities so they don't overlap.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":889,"section":"lecture","text":"The lecture states that safety training should include which group of personnel?","options":["Only frontline workers who face direct hazards","Only new employees on probation","All employees including managers","Only employees who have had previous accidents"],"answer":2,"explanation":"The lecture explicitly states: \"Training should include all employees including managers .\" Safety is a shared organizational responsibility, not limited to specific groups.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":890,"section":"lecture","text":"The Recovery Position is specifically used in which situation?","options":["When a worker has a broken arm","In case of an unconscious casualty","To treat electric shock injuries","When performing CPR on a conscious patient"],"answer":1,"explanation":"The lecture explicitly labels the Recovery Position for use in case of unconscious casualty . It keeps the airway open and prevents choking if the person vomits. It is not used when the patient is conscious or when CPR is being performed.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":891,"section":"lecture","text":"Under OSHA's Lab Standards, which document must each school or institution develop to protect lab workers from chemical hazards?","options":["Emergency Response Protocol","Chemical Hygiene Plan","Hazard Communication Report","Material Safety Data Manual"],"answer":1,"explanation":"OSHA's Lab Standards require each school to develop a Chemical Hygiene Plan (CHP). The CHP covers exposure controls, fume hood maintenance, staff training, medical consultations, respiratory protection, recordkeeping, and hazard identification.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":892,"section":"lecture","text":"What are the three steps of First Aid as listed in the lecture?","options":["Assess, Treat, Document","Diagnosis, Treatment, Disposal","Identify, Isolate, Inform","Triage, Stabilize, Transport"],"answer":1,"explanation":"The lecture lists exactly three First Aid steps: Diagnosis → Treatment → Disposal . \"Disposal\" in this context refers to the safe transfer/transportation of the patient to proper medical care.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":893,"section":"lecture","text":"What does the acronym OSHA stand for?","options":["Operational Safety and Hazard Administration","Occupational Health and Safety Administration","Official Standards for Hazardous Activities","Organizational System for Health Auditing"],"answer":1,"explanation":"OSHA stands for Occupational Health and Safety Administration . It was created by the OSHA Act signed on December 29, 1970, and formally came into being on April 28, 1971.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":894,"section":"lecture","text":"What is OSHA's stated mission?","options":["Regulate building codes and fire standards","Save lives, prevent injuries, and protect the health of workers","Manage workers' compensation insurance claims","Inspect manufacturing quality and product safety"],"answer":1,"explanation":"OSHA's mission is to save lives, prevent injuries, and protect the health of workers . This is achieved through developing standards, enforcing them, tracking injuries, and providing training programs.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":895,"section":"lecture","text":"What is the OSHA standard code for Lockout/Tagout?","options":["1910.134","1926.451","1910.147","1910.212"],"answer":2,"explanation":"Lockout/Tagout is standard 1910.147 (ranked #6). 1910.134 = Respiratory Protection, 1926.451 = Scaffolding, 1910.212 = Machine Guarding.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":896,"section":"lecture","text":"Which injury type is listed among those caused by hand and power tools?","options":["Hypothermia from cold exposure","Ergonomic injuries","Radiation poisoning","Altitude sickness"],"answer":1,"explanation":"The listed tool injuries include: electric shock, flash burns, falling hand and eye injuries, hearing loss, crushing/cuts/loss of body part, and ergonomic injuries . Ergonomic injuries result from repetitive motion or awkward postures during tool use.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":897,"section":"lecture","text":"Which of the following is an example of an INDIRECT cost of a workplace accident?","options":["Medical expenses for the injured worker","Insurance premium increase","Cancelled contracts due to the accident","Fines issued by OSHA inspectors"],"answer":2,"explanation":"Indirect costs include items like cancelled contracts and investigation time . Direct costs are monetary, measurable costs: medical expenses, insurance, lost time, and fines. Indirect costs are harder to quantify but can be equally significant.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":898,"section":"lecture","text":"Which of the following is listed as a HAZARD associated with hand and power tools?","options":["Improper storage of materials","Vibration and impact","Conflicting movement of vehicles","Backing equipment on job sites"],"answer":1,"explanation":"Listed hand/power tool hazards are: objects that fall/fly/are abrasive/splash, harmful dusts/fumes/mists/vapors/gases, frayed electrical cords, and vibration and impact . Options C and D relate to cranes/motor vehicles, not tools.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":899,"section":"lecture","text":"Which of the following is listed as a hazard specific to cranes and motor vehicles?","options":["Frayed electrical cords","Equipment rolling over","Harmful dusts and fumes","Falls from scaffolding"],"answer":1,"explanation":"Crane/motor vehicle hazards listed include: crane tip over & failure, striking worker on foot, pinned in/under equipment, equipment rolling over , backing equipment, maintenance hazards, collisions, and materials handling. Options A and C are tool hazards; D is a scaffolding hazard.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":900,"section":"lecture","text":"Which of the following is NOT listed as one of OSHA's four main actions?","options":["Develop job safety and health standards","Enforce standards through worksite inspections","Issue fines directly to individual workers for unsafe behavior","Keep track of job-related injuries and illnesses"],"answer":2,"explanation":"OSHA's four actions are: developing standards, enforcing standards through worksite inspections, keeping track of job-related injuries/illnesses, and providing training programs. Issuing fines directly to individual workers is not one of them — enforcement targets employers, not individual workers.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":901,"section":"lecture","text":"Which of the following is NOT required to be included in a Chemical Hygiene Plan?","options":["Designation of a Chemical Hygiene Officer","Respiratory protection program","Annual financial budget for safety equipment","Recordkeeping procedure"],"answer":2,"explanation":"The CHP must include: Chemical Hygiene Officer designation, exposure control measures, fume hood measures, staff training, medical consultation provisions, respiratory protection program, recordkeeping procedure, and hazard identification system. An annual financial budget is not listed as a required CHP component.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":902,"section":"lecture","text":"Which of the following scaffolding hazards does the lecture identify?","options":["Falls, falling items, and electrical hazards","Chemical spills and toxic fume exposure","Vibration and ergonomic injuries only","Machine guarding and lockout failures"],"answer":0,"explanation":"The lecture lists three scaffolding hazards: Falls, Falling items, and Electrical . Chemical spills and vibration relate to different hazard categories covered elsewhere in the lecture.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":903,"section":"lecture","text":"Why does the lecture distinguish between \"fixed fire extinguishers\" and \"portable fire extinguishers\" as separate protection measures?","options":["They target different chemical classes of fire","They are used at different stages: fixed systems for early suppression, portable for manual response at any location","Fixed ones are for buildings; portables are only for outdoor sites","Portable extinguishers replace the need for a fire safety plan"],"answer":1,"explanation":"The distinction reflects complementary layers of fire protection. Fixed systems (like sprinklers) provide automatic suppression at the point of origin. Portable extinguishers allow human operators to manually fight fires at any accessible location. Together they form a layered defense.","bloom":"","lecture":"L4","source":"L4_HealthSafety_Quiz.html","sources":["L4_HealthSafety_Quiz.html"]},{"id":904,"section":"lecture","text":"A city's waste management team is evaluating whether to recycle plastic, paper, rubber, and food residue. The main reason given in the lecture for doing this correctly is:","options":["Recycling generates revenue from material sales","Improper treatment or disposal of these materials can have harmful effects on the environment","Recycling reduces indoor air pollution from building materials","These materials cause acid rain if left unprocessed"],"answer":1,"explanation":"The lecture notes that materials such as plastic, paper, rubber, and food residue can have harmful effects on the environment if they are not properly treated or recycled.","bloom":"apply","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":905,"section":"lecture","text":"A construction engineer notices that a nearby river is becoming clogged with plant growth after a new development. The most likely explanation based on the lecture is:","options":["Ozone depletion from CFC releases","Acid rain from industrial emissions upstream","Nutrient pollution from sewage or fertilizers causing excessive algae growth","Groundwater contamination from waste disposal"],"answer":2,"explanation":"The lecture links excess nutrients (nitrates, phosphates) from sewage and fertilizers to over-stimulation of aquatic plant and algae growth, which clogs waterways — the scenario matches this cause.","bloom":"apply","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":906,"section":"lecture","text":"A factory is considering relocating from Europe to a developing country partly because environmental enforcement is weaker there. According to the lecture, this is an example of:","options":["Industrialization as the 1st fundamental driver of pollution","Population growth increasing demand for goods","Globalization enabling 'pollution havens'","Material recycling failure"],"answer":2,"explanation":"The lecture explicitly identifies globalization as the 3rd fundamental driver, noting that industries prefer to move to developing countries with looser laws — calling these places 'pollution havens.'","bloom":"apply","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":907,"section":"lecture","text":"According to the Kyoto Protocol as presented in the lecture, which statement is accurate?","options":["All nations signed and ratified the Protocol","175 parties ratified it; 36 countries plus the EEC must reduce emissions; the US and Australia are notable exceptions","The Protocol was signed in 2005 and requires all countries to reduce CO₂ by 50%","The Protocol only applies to industrialized nations in Asia"],"answer":1,"explanation":"The lecture slide states: Kyoto Protocol (1997), 175 parties ratified it, 36 countries and the EEC must reduce greenhouse gas emissions, and notable exceptions include the United States and Australia.","bloom":"remember","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":908,"section":"lecture","text":"According to the lecture, what percentage of their lives do people spend indoors?","options":["40–50%","60–70%","80–90%","95–100%"],"answer":2,"explanation":"The slide specifically states that people spend almost 80–90% of our lives indoors in enclosed environments where air circulation may be restricted.","bloom":"remember","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":909,"section":"lecture","text":"Air is composed of approximately what percentage of nitrogen, oxygen, water vapor, and inert gases?","options":["50%","75%","99.9%","88%"],"answer":2,"explanation":"The lecture states air is 99.9% nitrogen, oxygen, water vapor, and inert gases. The remaining 0.1% consists of other trace substances.","bloom":"remember","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":910,"section":"lecture","text":"An engineer designing a federally funded bridge must assess potential impacts on nearby wetlands. According to the lecture, this assessment would be documented in:","options":["A FIDIC contract clause","A health and safety audit","An Environmental Impact Statement","A Kyoto Protocol compliance report"],"answer":2,"explanation":"The lecture states that when proposed federally funded projects are planned, the potential environmental impacts and their magnitude are reported in Environmental Impact Statements, which are important in environmental regulation.","bloom":"apply","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":911,"section":"lecture","text":"An engineer is evaluating two solutions to reduce a city's smog problem: (A) improving public transport to cut car use, and (B) mandating stricter industrial emission filters. Based on the lecture's definition of smog, which approach is more comprehensive?","options":["A only, since cars are the sole cause of smog","B only, since industry is the primary cause","Both A and B together, since smog results from chemical reactions between automobile exhaust AND industrial emissions","Neither, since smog is mainly caused by natural factors"],"answer":2,"explanation":"The lecture defines smog as caused by chemical reactions between pollutants from automobile exhaust AND industrial emissions. Addressing only one source is incomplete; a comprehensive solution must target both.","bloom":"evaluate","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":912,"section":"lecture","text":"During which period of the year are cities like Cairo especially prone to smog formation?","options":["Cold winter months","Rainy season","Warm months","During sandstorms"],"answer":2,"explanation":"The slide states that cities are often centers of smog-producing activities especially during the warm months of the year.","bloom":"remember","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":913,"section":"lecture","text":"How does excess growth of aquatic plants and algae (caused by nutrient pollution) harm water bodies?","options":["It increases dissolved oxygen and brightens the water","It clogs waterways, uses up dissolved oxygen as they decompose, and blocks light to deeper waters","It neutralizes acid rain and improves water chemistry","It absorbs heavy metals from industrial runoff"],"answer":1,"explanation":"The lecture explains that excessive growth of aquatic plants and algae clogs waterways, uses up dissolved oxygen as organisms decompose, and blocks light to deeper waters — harming aquatic life.","bloom":"understand","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":914,"section":"lecture","text":"Production is identified as the PRIMARY cause of pollution (rather than consumption) because:","options":["Consumers produce more waste than manufacturers","Production involves the whole cycle of extracting and processing natural resources and selling products in major sectors","Production is easier to regulate than individual consumption","Only production involves burning fossil fuels"],"answer":1,"explanation":"The lecture states production is the primary cause because the whole cycle of extracting and processing natural resources and then selling processed goods in major sectors generates pollution upstream of consumption.","bloom":"understand","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":915,"section":"lecture","text":"Smog is primarily caused by chemical reactions between pollutants from which two main sources?","options":["Acid rain and ozone depletion","Groundwater contamination and fertilizers","Automobile exhaust and industrial emissions","Indoor tobacco smoke and building vapors"],"answer":2,"explanation":"The lecture defines smog as resulting from chemical reactions between pollutants derived from automobile exhaust and industrial emissions.","bloom":"remember","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":916,"section":"lecture","text":"To control indoor air pollution effectively, the lecture recommends:","options":["Installing outdoor exhaust stacks instead of indoor ventilation","Adequate ventilation and proper exhaust systems to control exposure","Burning incense to neutralize indoor pollutants","Limiting building occupancy to reduce CO₂ build-up"],"answer":1,"explanation":"The lecture recommends that adequate ventilation controls exposure to indoor air pollution, and that home and work environments should be monitored for adequate air flow with proper exhaust systems installed.","bloom":"apply","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":917,"section":"lecture","text":"What happens when acid rain — for example, contaminated with sulfuric acid — combines with water droplets in the air?","options":["It neutralizes water and makes it safe","It makes the water or snow become acidified","It accelerates ozone formation","It removes carbon dioxide from the atmosphere"],"answer":1,"explanation":"The lecture explains that when a pollutant such as sulfuric acid combines with droplets of water in air, the water or snow becomes acidified — this is how acid rain forms.","bloom":"understand","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":918,"section":"lecture","text":"What is the primary greenhouse gas responsible for the greenhouse effect according to the lecture?","options":["Methane (CH₄)","Carbon dioxide (CO₂)","Nitrogen oxide (NOₓ)","Ozone (O₃)"],"answer":1,"explanation":"The lecture states the greenhouse effect is believed to come from the build-up of carbon dioxide gas (CO₂) in the atmosphere when fuels are burned.","bloom":"remember","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":919,"section":"lecture","text":"What is the relationship between ozone depletion and acid rain according to the lecture?","options":["They are the same phenomenon caused by CO₂","Both are caused by CFCs from aerosol cans","They are distinct outdoor air pollution problems — ozone depletion is caused by CFCs while acid rain is caused by pollutants like sulfuric acid","Acid rain directly destroys the ozone layer"],"answer":2,"explanation":"The lecture treats them as separate outdoor air pollution issues: ozone depletion results from CFC release affecting the stratosphere, while acid rain results from sulfuric acid and other industrial/auto pollutants contaminating rainwater.","bloom":"analyze","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":920,"section":"lecture","text":"What percentage of all fresh water on Earth is groundwater?","options":["50%","75%","85%","95%"],"answer":3,"explanation":"The lecture states that 95% of all fresh water on Earth is groundwater, found in natural rock formations.","bloom":"remember","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":921,"section":"lecture","text":"Which atmospheric layer contains the ozone layer that protects Earth from ultraviolet radiation?","options":["Troposphere","Mesosphere","Thermosphere","Stratosphere"],"answer":3,"explanation":"The lecture clearly states the ozone layer is found in the stratosphere, which protects the earth from harmful ultraviolet radiation from the sun.","bloom":"remember","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":922,"section":"lecture","text":"Which chemical compound is primarily responsible for depleting the ozone layer?","options":["Carbon dioxide (CO₂)","Sulfuric acid","Chlorofluorocarbons (CFCs)","Nitrogen oxide (NOₓ)"],"answer":2,"explanation":"CFCs released from aerosol cans, cooling systems, and refrigerator equipment are identified in the lecture as the chemicals that remove ozone, causing holes in the ozone layer.","bloom":"remember","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":923,"section":"lecture","text":"Which of the following best describes what an Environmental Impact Statement does?","options":["It sets emission limits for industrial factories","It reports the potential environmental impacts and their magnitude for proposed engineering projects","It is a contract between engineers and the government for environmental compliance","It replaces the need for safety regulations on construction sites"],"answer":1,"explanation":"The lecture defines Environmental Impact Statements as reports describing what environmental impacts proposed projects may have and the magnitude of their effect — important in environmental regulation and litigation.","bloom":"understand","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":924,"section":"lecture","text":"Which of the following correctly pairs a fundamental pollution driver with its description from the lecture?","options":["Industrialization — demand increases as population grows","Population growth — fossil fuel usage is the main source","Globalization — developing countries have looser environmental laws","Consumption — extracting and processing natural resources in major sectors"],"answer":2,"explanation":"The lecture pairs each driver precisely: Industrialization = fossil fuels as main source; Population growth = rising demand with population increase; Globalization = looser laws in developing countries. Consumption is a cause, not a fundamental driver.","bloom":"analyze","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":925,"section":"lecture","text":"Which of the following effects of acid rain on the environment is NOT mentioned in the lecture?","options":["Damages plants by destroying their leaves","Poisons the soil","Causes skin cancer in humans","Changes the chemistry of lakes and streams"],"answer":2,"explanation":"Skin cancer is linked to UV radiation from ozone depletion, not acid rain. The lecture lists acid rain effects as: damages plant leaves, poisons soil, changes lake/stream chemistry, and negatively affects wildlife.","bloom":"analyze","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":926,"section":"lecture","text":"Which of the following is listed as a source of indoor air pollution?","options":["Automobile exhaust","Burning of rice stubble","Tobacco smoke and vapors from building materials","Fertilizer runoff"],"answer":2,"explanation":"The lecture lists indoor air pollution sources as tobacco smoke, cooking and heating appliances, and vapors from building materials, paints, and furniture.","bloom":"remember","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":927,"section":"lecture","text":"Which of the following is NOT listed as one of the three fundamental drivers of pollution in the lecture?","options":["Industrialization","Population growth","Globalization","Urbanization"],"answer":3,"explanation":"The lecture lists exactly three fundamental drivers: Industrialization (1st), Population growth (2nd), and Globalization (3rd). Urbanization is not identified as a separate fundamental driver.","bloom":"remember","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":928,"section":"lecture","text":"Which of the following sequences correctly represents the pollution causation chain described in the lecture?","options":["Consumption → Production → Unrecycled Waste → Pollution","Fundamental Drivers → Primary & Secondary Causes → Sources of Pollution","Sources of Pollution → Fundamental Drivers → Primary Causes","Environmental Impact → Fundamental Drivers → Pollution"],"answer":1,"explanation":"The lecture's diagram shows: Fundamental Drivers (Industrialization, Population Growth, Globalization) → Primary & Secondary Causes (Production & Consumption) → Sources of Pollution (Manufacturing, Power Generation, Other Industries).","bloom":"analyze","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":929,"section":"lecture","text":"Which two main sources cause Cairo's 'Black Cloud' phenomenon?","options":["Industrial factories and sewage","Annual burning of rice stubble and car exhaust fumes","Desert dust storms and ozone depletion","Power plants and acid rain"],"answer":1,"explanation":"The slide explicitly lists the annual burning of rice stubble in rural areas and car exhaust fumes as the two causes of Cairo's Black Cloud.","bloom":"remember","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":930,"section":"lecture","text":"Why do developing countries sometimes become 'pollution havens' under globalization?","options":["They have stronger environmental regulations that attract cleaner industries","They have looser environmental protection laws, cheap labor, and population growth that attract polluting industries","They produce more fossil fuels than developed nations","They have the most advanced recycling technologies"],"answer":1,"explanation":"The lecture explains that developing countries often have looser environmental laws combined with population growth and cheap labor, making them attractive to big industries that prefer to avoid regulated markets.","bloom":"understand","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":931,"section":"lecture","text":"Why does the greenhouse effect worsen when forests are removed?","options":["Trees produce CO₂ which then accumulates","Plants convert CO₂ back to O₂, so deforestation reduces this conversion","Trees absorb harmful UV radiation from the ozone layer","Forests cool the atmosphere through evaporation alone"],"answer":1,"explanation":"The lecture explains that plants convert CO₂ back to oxygen. When forests are removed, this conversion capacity decreases, making the build-up of CO₂ worse and intensifying the greenhouse effect.","bloom":"understand","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":932,"section":"lecture","text":"Why is consumption considered a secondary (rather than primary) cause of pollution?","options":["Consumption produces fewer emissions than production","Consumption occurs after production and depends on it","Consumption only affects groundwater, not air","Individual consumers have no impact on pollution levels"],"answer":1,"explanation":"The lecture states consumption is the secondary cause of pollution because this stage comes after, and depends on, production. Production is primary since it drives the entire cycle.","bloom":"understand","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":933,"section":"lecture","text":"Why is groundwater contamination particularly serious compared to surface water pollution, based on information in the lecture?","options":["Groundwater is only found in urban areas","Groundwater represents 95% of all fresh water on Earth, and a large percentage of people — especially in rural areas — rely on it as drinking water","Groundwater contamination is temporary and self-corrects quickly","Groundwater is protected from sewage by rock formations and cannot be contaminated"],"answer":1,"explanation":"The lecture highlights that 95% of all fresh water is groundwater, a large percentage of the population relies on it for drinking (especially in rural areas), and significant contamination can occur from sewage leakage and waste disposal — making it a serious public health risk.","bloom":"evaluate","lecture":"","source":"L8_Environmental_Quiz.html","sources":["L8_Environmental_Quiz.html"]},{"id":934,"section":"lecture","text":"A student always studies for exams the night before and feels rushed and stressed. Based on the lecture, which TWO guidelines most directly address this problem?","options":["Use SQ3R and turn off cell phones","Begin preparing a week in advance and use scheduling to prevent cramming","Maintain eye contact with the speaker and review notes before class","Study difficult classes early afternoon and answer all questions"],"answer":1,"explanation":"The lecture specifically identifies cramming as a problem that scheduling prevents (Why Scheduling? slide), and Guideline 6 says to begin preparing for tests a week in advance — both directly address the cramming habit.","bloom":"apply","lecture":"","source":"L9_Study_Skills_Quiz.html","sources":["L9_Study_Skills_Quiz.html"]},{"id":935,"section":"lecture","text":"A student attends a lecture but keeps checking their phone during class. Which good-listener guideline are they violating MOST directly?","options":["Review your notes before class","Go to class a few minutes early","Be sure to turn off cell phones","Show by your posture that you are alert and interested"],"answer":2,"explanation":"Guideline 7 specifically says 'Be sure to turn off cell phones.' Checking a phone is also a distraction (Guideline 5), but turning it off is the most direct match.","bloom":"apply","lecture":"","source":"L9_Study_Skills_Quiz.html","sources":["L9_Study_Skills_Quiz.html"]},{"id":936,"section":"lecture","text":"A student is skilled at highlighting textbooks but never converts headings into questions before reading. Which step of SQ3R are they skipping?","options":["Survey","Question","Read","Recite"],"answer":1,"explanation":"The 'Question' step in SQ3R involves turning section headings and key points into questions to answer while reading, promoting active engagement. The student is doing Survey (overview) and Read but skipping Question.","bloom":"analyze","lecture":"","source":"L9_Study_Skills_Quiz.html","sources":["L9_Study_Skills_Quiz.html"]},{"id":937,"section":"lecture","text":"According to the lecture, what are the THREE benefits of scheduling your study time?","options":["Improves memory, increases speed, reduces stress","Reduces wasted time, separates work and play, helps prevent cramming","Creates a semester calendar, improves focus, prevents laziness","Saves money, promotes balance, improves grades"],"answer":1,"explanation":"The lecture's 'Why Scheduling?' slide lists exactly three benefits: reduces the amount of time wasted (saves time), separates work and play (promotes balance), and helps prevent cramming.","bloom":"remember","lecture":"","source":"L9_Study_Skills_Quiz.html","sources":["L9_Study_Skills_Quiz.html"]},{"id":938,"section":"lecture","text":"According to the lecture, what does SQ3R stand for?","options":["Survey, Question, Read, Record, Repeat","Survey, Question, Read, Recite, Review","Scan, Query, Read, Recite, Revise","Study, Question, Read, Record, Review"],"answer":1,"explanation":"The lecture clearly defines SQ3R as: Survey, Question, Read, Recite, Review — presented as an effective active reading technique by George Wilson.","bloom":"remember","lecture":"","source":"L9_Study_Skills_Quiz.html","sources":["L9_Study_Skills_Quiz.html"]},{"id":939,"section":"lecture","text":"According to the lecture, what is the BEST time to study?","options":["Early morning before classes begin","Late at night when it is quiet","Right after class","During free periods on weekends"],"answer":2,"explanation":"Guideline 8 in the lecture states explicitly: 'Best Time to study is right after class.' This is consistent with the Forgetting Curve shown in the lecture.","bloom":"remember","lecture":"","source":"L9_Study_Skills_Quiz.html","sources":["L9_Study_Skills_Quiz.html"]},{"id":940,"section":"lecture","text":"According to the lecture, which of the following is the FIRST recommended step to becoming a better listener?","options":["Maintain natural eye contact with the speaker","Ignore distractions such as side talks","Review your notes before class","Turn off your cell phone"],"answer":2,"explanation":"The lecture lists 7 steps and places 'Review your notes before class' as step 1, before arriving early or making eye contact.","bloom":"remember","lecture":"","source":"L9_Study_Skills_Quiz.html","sources":["L9_Study_Skills_Quiz.html"]},{"id":941,"section":"lecture","text":"According to the lecture's test-taking tips, what should a student do immediately upon receiving the test paper — before answering any question?","options":["Answer the easiest questions first","Do a memory dump and read directions carefully","Budget time and start with difficult questions","Practice relaxation and then begin"],"answer":1,"explanation":"The 'More Tips on Taking Test' slide lists: Arrive on time, Do a memory dump, Read directions carefully — these are the first actions before answering any question.","bloom":"apply","lecture":"","source":"L9_Study_Skills_Quiz.html","sources":["L9_Study_Skills_Quiz.html"]},{"id":942,"section":"lecture","text":"How many steps for being a good listener does the lecture present in total?","options":["5","6","7","8"],"answer":2,"explanation":"The lecture slide lists exactly 7 steps for being a good listener, from reviewing notes before class through turning off cell phones.","bloom":"remember","lecture":"","source":"L9_Study_Skills_Quiz.html","sources":["L9_Study_Skills_Quiz.html"]},{"id":943,"section":"lecture","text":"The Cornell Note Taking Method mentioned in the lecture is built around what framework?","options":["The 5 'P's","The 5 'R's","The SQ3R method","The 3 'C's"],"answer":1,"explanation":"The lecture slide on the Cornell Note Taking Method explicitly labels it 'The 5 R's'. The Cornell page layout divides into a Cue Column, Note Taking Area, and Summaries section.","bloom":"remember","lecture":"","source":"L9_Study_Skills_Quiz.html","sources":["L9_Study_Skills_Quiz.html"]},{"id":944,"section":"lecture","text":"The Forgetting Curve shown in the lecture compares two groups of students. What is the KEY difference between them?","options":["Students who studied daily vs. those who studied weekly","Students who reviewed their lecture on the same day of class vs. those who did not","Students who used SQ3R vs. those who did not","Students who attended class vs. those who were absent"],"answer":1,"explanation":"The Forgetting Curve graph compares students who reviewed their lecture on the same day of class (maintaining ~70% recall at nine weeks) against students who did not (dropping to ~15%), illustrating the value of same-day review.","bloom":"understand","lecture":"","source":"L9_Study_Skills_Quiz.html","sources":["L9_Study_Skills_Quiz.html"]},{"id":945,"section":"lecture","text":"The lecture recommends studying 'difficult classes early afternoon' (Guideline 5) AND studying 'right after class' (Guideline 8). What principle connects both recommendations?","options":["Both recommendations prioritize rest over active studying","Both recommend avoiding night studying entirely","Both target periods when retention and focus are optimized — immediately after learning and during peak alertness hours","Both are designed to separate work and play time"],"answer":2,"explanation":"Studying right after class takes advantage of the material still being fresh (as illustrated by the Forgetting Curve), while early afternoon targets natural alertness peaks. Both strategies optimize when the brain is best positioned to consolidate difficult material.","bloom":"evaluate","lecture":"","source":"L9_Study_Skills_Quiz.html","sources":["L9_Study_Skills_Quiz.html"]},{"id":946,"section":"lecture","text":"When should a student begin preparing for a test, according to the lecture's study guidelines?","options":["The night before the test","Two days before the test","A week in advance","At the start of the semester"],"answer":2,"explanation":"Guideline 6 states: 'Begin to prepare for tests a week in advance.' This directly counters cramming, which scheduling is also meant to prevent.","bloom":"remember","lecture":"","source":"L9_Study_Skills_Quiz.html","sources":["L9_Study_Skills_Quiz.html"]},{"id":947,"section":"lecture","text":"Which of the following is step 6 in the lecture's guidelines for being a good listener?","options":["Show by your posture that you are alert and interested","Go to class a few minutes early","Take notes on the speaker's most important points and prepare questions","Maintain natural eye contact with the speaker"],"answer":2,"explanation":"Step 6 in the lecture is: 'Take notes on the speaker's most important points and prepare questions.' Steps 3 and 4 cover eye contact and posture respectively.","bloom":"remember","lecture":"","source":"L9_Study_Skills_Quiz.html","sources":["L9_Study_Skills_Quiz.html"]},{"id":948,"section":"lecture","text":"A contracting authority tries to convert a public tender into a public practice after bids have been submitted. Is this permitted, and why?","options":["Yes — the authority has full discretion to change procurement methods","Yes — but only if fewer than 3 bids were submitted","No — the law explicitly prohibits converting a tender into any form of practice under any circumstances","No — only if the Prime Minister objects"],"answer":2,"explanation":"The law contains an explicit prohibition: a tender may never be converted into a public practice or a limited practice. This protection preserves the integrity of the bidding process — competitors submitted their sealed bids under tender rules and cannot retroactively be subjected to a different competitive mechanism.","bloom":"Analyze","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":949,"section":"lecture","text":"A contractor delays delivery of consulting study reports. The maximum fine the authority can impose is capped at what percentage of the contract value?","options":["3% — the cap for services, consulting studies, and technical works","10% — the universal cap for all government contracts","5% — matching the final insurance percentage","15% — for professional service delays"],"answer":0,"explanation":"The law sets two different delay fine caps: 3% for purchasing movables, services, consulting studies, and technical works; and 10% for business contracting and transport works. Consulting studies fall in the 3% category.","bloom":"Apply","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":950,"section":"lecture","text":"A contractor delays on a construction contract. The authority imposes the maximum delay fine. The contractor's delay also caused the authority to lose a major client worth EGP 2 million. Can the authority recover more than the fine cap?","options":["No — the fine is the only remedy and caps the authority's recovery","Yes — imposing the fine does not prevent the authority from separately claiming full compensation for all damages caused by the delay","Yes — but only if the authority waives the fine first","No — double recovery is prohibited under Egyptian law"],"answer":1,"explanation":"The law explicitly states that imposing the delay fine does not prejudice the authority's right to claim full compensation for all losses caused by the delay. The fine and damages claims are independent — the fine is an automatic penalty; full compensation is a separate legal remedy for proven losses.","bloom":"Analyze","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":951,"section":"lecture","text":"A contractor is 15 days late completing a government construction project. The authority wants to penalize him. Can they impose a fine immediately without issuing a warning?","options":["No — a formal warning must precede any fine","No — the contractor must be given a cure period first","Yes — the fine is imposed automatically upon delay, without any warning or additional procedure","Yes — but only if the delay exceeds 30 days"],"answer":2,"explanation":"The delay fine under the tenders law is imposed automatically the moment delay occurs — no warning, no notice, no additional action required. This is a deliberate design to incentivize timely performance on government contracts.","bloom":"Apply","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":952,"section":"lecture","text":"A contractor is delayed 20 days on a movables supply contract valued at EGP 1,000,000. The authority has accumulated a fine. The contractor then proves the last 8 days of delay were caused by a force majeure flood. How should the authority proceed?","options":["Exempt the contractor from all 20 days of fines since force majeure occurred","Maintain all 20 days of fines — force majeure exemption requires a court ruling","Apply fines for the 12 days within the contractor's control; seek exemption via State Council consultation for the 8 days attributable to force majeure","Cancel the contract and forfeit the final insurance"],"answer":2,"explanation":"The principle is proportionality. Fines apply automatically for delay within the contractor's control (12 days). For the 8 days caused by factors outside his control (the flood), the exemption mechanism — consulting the State Council's legal authority — can be triggered. The two periods are treated independently based on their respective causes.","bloom":"Evaluate","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":953,"section":"lecture","text":"A contractor struck from the register due to bribery allegations was later acquitted by a final court verdict. Can he be reinstated?","options":["No — once deleted, the deletion is permanent","Yes — reinstatement can be requested and must be granted after a final acquittal verdict, a public prosecutor's decision of no case, or administrative filing of the case","Yes — but only after 5 years have passed regardless of the verdict","Only if a minister personally approves the reinstatement"],"answer":1,"explanation":"Reinstatement is possible upon the contractor's request when the basis for deletion is removed — specifically: a final acquittal verdict, a public prosecutor's decision that there is no case to answer, or administrative filing. The reinstatement decision is also published through official channels.","bloom":"Apply","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":954,"section":"lecture","text":"A contractor submits a bid with primary insurance of 1.5% of the estimated project value, but the announcement required 2%. What happens to his bid?","options":["It is accepted with a warning to pay the remainder","It is automatically disqualified — bids not accompanied by the full primary insurance are excluded","The committee may accept it if the bid price is low enough","It is placed on hold until the contractor tops up the insurance"],"answer":1,"explanation":"The law is strict: any bid not accompanied by the full primary insurance amount specified by the authority is disqualified. There is no grace period or partial acceptance — the full amount must accompany the bid at submission.","bloom":"Apply","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":955,"section":"lecture","text":"A contractor violates a condition of his government contract but the authority does not want to terminate it. What alternative does the law give the authority?","options":["The authority must terminate — no other option exists for contract violations","Issue a formal warning and wait 30 days","Execute the contract at the contractor's expense — hire another party to complete it and charge the costs to the original contractor","Reduce the final insurance as a penalty"],"answer":2,"explanation":"The authority has two options when a contractor violates contract conditions: (1) terminate the contract, or (2) execute the contract at the contractor's expense — meaning the authority can bring in another contractor to complete the work and recover all associated costs from the original contractor.","bloom":"Apply","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":956,"section":"lecture","text":"A contractor wins a tender and is notified of acceptance on March 1st. He is based in Egypt. By what date must he pay the final insurance?","options":["March 11th — within 10 days of notification","March 21st — within 20 days for local contractors","April 1st — within 30 days","March 15th — within 14 days"],"answer":0,"explanation":"The 10-day period starts from the day following notification. Notified on March 1st, the period begins March 2nd, making the deadline March 11th. The 20-day period applies only to foreign contractors. Local contractors always have 10 days.","bloom":"Apply","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":957,"section":"lecture","text":"A defense ministry needs to urgently procure classified communication equipment. Which method is legally available to them?","options":["Public tender only — the military must be transparent","Limited practice — contracts requiring national security considerations may be conducted confidentially","Direct agreement — only if the value is below EGP 50,000","Public practice — because the military is a government body"],"answer":1,"explanation":"Limited practice is explicitly authorized for contracts that national security considerations require to be conducted confidentially. Defense procurement of classified equipment squarely falls under this exception.","bloom":"Apply","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":958,"section":"lecture","text":"A delay fine has been accumulating on a contractor, but the delay was caused entirely by the authority's failure to provide the agreed site access on time. Can the contractor be exempted from the fine?","options":["No — delay fines are automatic and non-waivable under any circumstances","Yes — if the delay is proven to result from causes outside the contractor's will, exemption is possible after consulting the competent State Council legal authority","Yes — the contractor simply needs to submit a written objection","No — exemption is only available for natural disasters, not government failures"],"answer":1,"explanation":"The law provides for exemption from delay fines when the delay is proven to result from causes outside the contractor's control — after consulting the State Council's competent legal authority (إدارة الفتوى). An authority's failure to fulfill its own contractual obligations (site access) is a cause outside the contractor's control, making exemption arguable.","bloom":"Analyze","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":959,"section":"lecture","text":"A government authority has a contractor who violated a minor contract condition causing no measurable harm. The authority is considering termination. What does the law offer, and what is the most proportionate response?","options":["Terminate immediately — any violation mandates termination","The authority has discretion: terminate OR execute at the contractor's expense. Given no measurable harm, neither may be warranted — the authority could also consider waiving the fine if no damage resulted","Issue the contractor a warning and escalate to the Prime Minister","Accept the violation silently to maintain the working relationship"],"answer":1,"explanation":"The authority has discretionary power — not a mandatory obligation — to terminate or execute at the contractor's expense. Crucially, the law also allows exemption from delay fines when no harm resulted from the delay. For a minor violation causing no measurable damage, proportionality favors exploring the no-harm exemption route rather than the nuclear option of termination or costly re-execution.","bloom":"Evaluate","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":960,"section":"lecture","text":"A government authority needs to procure a highly specialized radar system that only one foreign manufacturer produces. Which contracting method applies?","options":["Public tender — all procurements must be advertised publicly","Local tender — restricted to local suppliers","Limited practice — for items manufactured or imported only by specific entities","Direct agreement — only for emergencies under EGP 50,000"],"answer":2,"explanation":"Limited practice applies when items are manufactured or imported exclusively by specific entities. A radar system with a single foreign manufacturer fits this case precisely — there is no competitive market to tender into, so limited practice is the correct method.","bloom":"Apply","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":961,"section":"lecture","text":"A government contract is terminated due to the contractor's bankruptcy. The final insurance was EGP 200,000 and the authority suffered EGP 350,000 in losses. How does the authority recover?","options":["It can only recover up to the EGP 200,000 final insurance — nothing more","It keeps the final insurance and deducts remaining losses from any other amounts owed to the contractor by any other administrative authority","It files a civil lawsuit for the remaining EGP 150,000 as the only option","It writes off the remaining loss as unrecoverable"],"answer":1,"explanation":"In all contract termination cases, the final insurance becomes the authority's right. But the authority can also deduct fines and losses from any amounts the contractor is owed — across any administrative authority, not just the contracting one. This \"cross-authority\" deduction closes the gap when the final insurance is insufficient.","bloom":"Apply","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":962,"section":"lecture","text":"A government ministry needs direct agreement for construction works worth EGP 250,000. Who has the authority to approve this?","options":["The head of the authority — he can approve any direct agreement","The competent minister or governor — they can authorize direct agreement for business contracting up to EGP 300,000","The Prime Minister — all direct agreements above EGP 100,000 require his approval","No one — this value exceeds all direct agreement limits and must go to public tender"],"answer":1,"explanation":"The competent minister (or governor) can authorize direct agreement for business contracting up to EGP 300,000. At EGP 250,000 for construction (business contracting), this falls within the minister's authorization limit — not the head of authority's lower EGP 100,000 construction limit.","bloom":"Apply","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":963,"section":"lecture","text":"A local municipality needs to repair a road. The total estimated value is EGP 180,000. Which contracting method is most appropriate?","options":["Public tender — all government contracts must use public tender","Local tender — for contracts not exceeding EGP 200,000, limited to local suppliers in the same province","Limited practice — road repairs require specialist firms","Direct agreement — municipalities may always use direct agreement"],"answer":1,"explanation":"Local tender is specifically designed for contracts not exceeding EGP 200,000, restricted to local suppliers and contractors operating within the province where the contract is executed. At EGP 180,000, this municipality's road repair fits exactly within that threshold.","bloom":"Apply","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":964,"section":"lecture","text":"A ministry urgently needs to procure medical equipment worth EGP 80,000. The head of the authority wants to use direct agreement. The competent minister argues the ministry's head lacks authority for this value. Who is correct for this category of procurement?","options":["The head of authority — he can approve direct agreement for any value in emergencies","The minister — for services and movables above EGP 50,000, the minister's authorization is required","The head of authority — medical equipment is always exempt from value limits","Neither — medical equipment requires a public tender regardless of urgency"],"answer":1,"explanation":"The head of authority may authorize direct agreement for services/movables/technical works only up to EGP 50,000. At EGP 80,000 for medical equipment (movables), this exceeds the head's limit. The competent minister (or governor) can authorize up to EGP 100,000 for this category — making the minister's authorization the correct one here.","bloom":"Evaluate","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":965,"section":"lecture","text":"A primary insurance paid was EGP 150,000. After winning, the final insurance calculation comes to EGP 120,000. What must happen?","options":["The contractor pays an additional EGP 120,000 on top of the primary insurance","The contractor pays nothing extra and the primary insurance stands as the final insurance","The excess EGP 30,000 must be returned to the contractor immediately without requiring him to request it","The EGP 30,000 excess is forfeited to the authority as an administrative fee"],"answer":2,"explanation":"When the primary insurance exceeds the calculated final insurance, the excess must be returned to the contractor immediately and automatically — no request needed. The final insurance is 5% of contract value, and if the primary already covered more than that, the surplus goes back.","bloom":"Analyze","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":966,"section":"lecture","text":"A public tender receives 5 bids. After technical evaluation, 4 are accepted. The lowest accepted bid price exceeds the estimated project value. The authority also has the option to simply no longer need the project. Which cancellation grounds apply?","options":["Only the \"lowest bid exceeds estimated value\" ground — the other is not a cancellation ground","Only the \"public interest\" ground — price excess alone is insufficient","Both grounds independently apply: lowest bid exceeding estimated value, and dispensing with the project entirely","Neither ground applies — the authority must award to the lowest bidder regardless"],"answer":2,"explanation":"The law provides independent cancellation grounds. \"Dispensing with the project entirely\" is always a valid cancellation reason. Separately, when the lowest bid exceeds the estimated value, that is also independently sufficient for cancellation. Both grounds exist simultaneously here.","bloom":"Analyze","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":967,"section":"lecture","text":"A tender for technical works receives 6 bids. Five include reservations (comments/conditions); one does not. Can the authority cancel the tender?","options":["No — there is one clean bid, so the authority must award it","Yes — \"all or most bids accompanied by comments\" is a valid cancellation ground, and 5 out of 6 qualifies as \"most\"","Yes — but only if the one clean bid exceeds the estimated value","No — the authority must accept the one clean bid as the winner"],"answer":1,"explanation":"The law allows cancellation when all or most bids are accompanied by reservations/comments. Five out of six bids (83%) qualifies as \"most.\" Cancellation in this case is permissible — the competitive process has been compromised by widespread conditions attached to bids.","bloom":"Analyze","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":968,"section":"lecture","text":"A tender receives only one valid bid after others are disqualified. What should the authority do?","options":["Award the contract to the sole remaining bidder automatically","Cancel the tender — only one bid remaining after disqualifications is a valid cancellation ground","Reduce the primary insurance requirements and re-open","Award only if the sole bid is below the estimated value"],"answer":1,"explanation":"The law specifically lists \"only one bid remaining after disqualified bids\" as a permissible ground for cancellation. Having a single remaining bidder eliminates the competitive element the tender process is meant to achieve, justifying cancellation.","bloom":"Apply","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":969,"section":"lecture","text":"An investigation proves that a contractor bribed a government employee to win a contract. What are the two consequences beyond contract termination?","options":["A warning letter and a temporary ban from future tenders","The contractor is struck from the suppliers/contractors register, and the General Authority for Government Services is notified to publish the deletion","The contractor forfeits only the final insurance and may re-bid after 2 years","The contractor's employees are also personally banned from future tenders"],"answer":1,"explanation":"Beyond automatic contract termination, a bribery conviction leads to: (1) deletion from the suppliers/contractors register, and (2) notification of the General Authority for Government Services to publish the deletion decision. This creates a public record of disqualification.","bloom":"Apply","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":970,"section":"lecture","text":"An urgent situation arises requiring immediate procurement of consulting services worth EGP 40,000. The head of the authority wants to use direct agreement. Is this permitted?","options":["No — consulting services always require a public tender","Yes — the head of authority may authorize direct agreement for services up to EGP 50,000","Yes — but only if the Prime Minister approves","No — direct agreement is only for construction works"],"answer":1,"explanation":"The law permits the head of the authority (or equivalent) to authorize direct agreement for purchasing movables, services, consulting studies, technical works, or transport contracting up to EGP 50,000. At EGP 40,000 for consulting services, this falls within that limit.","bloom":"Apply","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":971,"section":"lecture","text":"For a tender with an estimated value of EGP 40,000, the law allows one committee to handle both opening envelopes and deciding the outcome. Why does the law make a single committee permissible here?","options":["Because low-value contracts do not need any committee","Because the law assumes small contracts are always awarded correctly","Because the additional oversight of a second committee adds administrative cost disproportionate to the low contract value","Because EGP 40,000 contracts are exempt from all tenders law provisions"],"answer":2,"explanation":"The two-committee system (one to open envelopes, one to decide the outcome) provides a separation of duties that prevents bias. For small contracts not exceeding EGP 50,000, the law recognizes that the overhead of maintaining two separate committees is disproportionate to the risk involved, so one committee may handle both functions.","bloom":"Analyze","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":972,"section":"lecture","text":"How does a \"practice\" (ممارسة) differ from a tender?","options":["A practice uses open envelopes; a tender uses sealed ones","A practice allows bidders to compete in-session to further reduce their price; a tender does not","A practice is only for government ministries; a tender is open to all","A practice always results in direct agreement"],"answer":1,"explanation":"A practice is similar to a tender but adds one key element: applicants are allowed to compete during the session itself to reduce their price further. This live price negotiation element distinguishes it from a tender.","bloom":"Remember","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":973,"section":"lecture","text":"To what total percentage must the accepted bidder complete his insurance, and within how many days?","options":["3% within 5 days","5% within 10 days (or 20 days for foreign contractors)","7% within 15 days","10% within 30 days"],"answer":1,"explanation":"After acceptance, the winning bidder must top up the primary insurance to reach 5% of the contract value within 10 days of being notified (20 days for contracts with foreign contractors). This is the final insurance.","bloom":"Remember","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":974,"section":"lecture","text":"Under what condition is the final insurance NOT required to be paid?","options":["When the contractor is a well-known company with prior contracts","When the contractor completes and delivers all items and the authority finally accepts them within the final insurance payment window","When the primary insurance exceeds 3% of the contract value","When the contract value is below EGP 50,000"],"answer":1,"explanation":"If the winning bidder manages to fully supply and have all items finally accepted by the authority within the same period allotted for paying the final insurance, then paying the final insurance separately becomes unnecessary — the performance itself substitutes for it.","bloom":"Understand","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":975,"section":"lecture","text":"What are the four governing principles that both public tender and public practice must follow?","options":["Confidentiality, speed, efficiency, and cost-minimization","Publicity, equal opportunity, equality, and freedom of competition","National preference, transparency, security, and documentation","Ministerial approval, price control, local content, and audit"],"answer":1,"explanation":"The law explicitly requires both public tenders and public practices to adhere to four principles: publicity (public announcement), equal opportunity (open to all qualifying parties), equality (same treatment for all bidders), and freedom of competition (no artificial barriers).","bloom":"Understand","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":976,"section":"lecture","text":"What are the two automatic grounds for contract termination under the tenders law?","options":["Late delivery and price increase requests","Bribery (proven or attempted) and bankruptcy/insolvency of the contractor","Subcontracting without permission and quality defects","Failure to submit final insurance and missing a deadline"],"answer":1,"explanation":"The law specifies exactly two cases of automatic contract termination: (a) proven or attempted bribery — directly or indirectly — of an employee of the contracting authority, and (b) bankruptcy or insolvency of the contracting party.","bloom":"Remember","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":977,"section":"lecture","text":"What happens to the primary insurance of unsuccessful bidders after the tender concludes?","options":["It is forfeited and kept by the authority","It is transferred to the winning bidder to cover part of the final insurance","It must be returned to unsuccessful bidders automatically, without waiting for their request, immediately after bid validity expires","It is held for 6 months as a dispute buffer"],"answer":2,"explanation":"The law protects unsuccessful bidders: their primary insurance must be returned to them automatically — without requiring them to ask — as soon as the bid validity period expires. The authority cannot retain it without cause.","bloom":"Understand","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":978,"section":"lecture","text":"What is the primary goal a project owner seeks to achieve through a tender?","options":["Selecting the most technically innovative bid","Obtaining the lowest price among technically acceptable bids submitted in sealed envelopes","Awarding the contract to the most reputable company regardless of price","Ensuring the fastest possible project delivery"],"answer":1,"explanation":"A tender is defined as a mechanism through which the project owner seeks the lowest prices from among technically acceptable proposals submitted in closed (sealed) envelopes. Price minimization — within technical acceptability — is the defining purpose.","bloom":"Remember","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":979,"section":"lecture","text":"What percentage of the estimated project value is the maximum allowed for primary (temporary) insurance?","options":["1%","2%","5%","10%"],"answer":1,"explanation":"Primary insurance, paid with each bid, is set by the administrative authority in the tender announcement and must not exceed 2% of the estimated project value. Any bid not accompanied by the full amount is disqualified.","bloom":"Remember","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":980,"section":"lecture","text":"When a tender is cancelled, what must the cancellation decision always contain?","options":["A list of all submitted bids and their prices","The reasons on which the cancellation was based","The names of disqualified bidders","The new estimated project value"],"answer":1,"explanation":"Cancellation decisions are not arbitrary — the law requires that any cancellation decision include the reasons on which it was based, providing accountability and protecting bidders from unexplained cancellations.","bloom":"Understand","lecture":"","source":"lecture6_quiz.html","sources":["lecture6_quiz.html"]},{"id":981,"section":"lecture","text":"Why are bids submitted in two separate sealed envelopes — one technical and one financial?","options":["To make the process more bureaucratic and formal","To allow the authority to evaluate technical merit independently before any price is revealed, preventing price from biasing technical assessment","To allow different committees to meet on different days","Because international law requires dual-envelope systems for all public tenders"],"answer":1,"explan
